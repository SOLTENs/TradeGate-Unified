let editingCard = null;
let editState   = {};

function evoStartEdit(id, context) {
  id = Number(id);
  const t = allTrades.find(e => Number(e.id) === id);
  if (!t) return;
  const fromDash = (context === 'dash');
  editingCard = id;
  if (fromDash) {
    expandedCardDash = id;
    expandedCard = null;
  } else {
    expandedCard = id;
    expandedCardDash = null;
  }
  editState = {
    outcome: t.outcome,
    folder:  t.folder || '',
    htf:     (t.data['HTF POI'] || '').split(', ').filter(Boolean),
    extra:   (t.data['Extra körülmény'] || '').split(', ').filter(Boolean),
    against: (t.data['Kötés ellen'] || '').replace('—','').trim(),
    setup:   Array.isArray(t.setup) ? t.setup.slice() : [],
    qualitySetup: Array.isArray(t.qualitySetup) ? t.qualitySetup.slice() : [],
    wrongSetup: Array.isArray(t.wrongSetup) ? t.wrongSetup.slice() : [],
    stf:     t.stf || 0,
    zeroStop: !!t.zeroStop,
    bigWin:   !!t.bigWin
  };
  if (fromDash) {
    if (currentView !== 'dashboard') evoSwitchView('dashboard');
    else evoRenderDashboard();
  } else {
    if (currentView !== 'log') evoSwitchView('log');
    else evoRenderLog();
  }
  function tryFill() {
    const cont = document.getElementById('edit-card-container');
    if (cont) { renderEditCard(); }
    else { setTimeout(tryFill, 30); }
  }
  setTimeout(tryFill, 0);
}

  if (editState.outcome === 'loss') {

    outcomeHtml += '<div style="display:flex;gap:8px;margin-top:6px;">'
      + '<div style="flex:0 0 calc((100% - 16px) * 2 / 3 + 8px);"></div>'

      + (zs ? 'var(--yellow)' : 'var(--border)') + ';color:'
      + (zs ? 'var(--yellow)' : 'var(--muted)') + ';background:'
      + (zs ? 'rgba(255,204,0,0.18)' : 'var(--surface)') + ';'
      + 'font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;'
      + 'letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:0;">0% stop</button></div>';
  }
  if (editState.outcome === 'win') {
    const bw = editState.bigWin;
    outcomeHtml += '<div style="display:flex;gap:8px;margin-top:6px;">'
      + '<button onclick="evoEditBigWin()" style="flex:1;padding:7px 6px;border:1px solid '
      + (bw ? 'var(--win)' : 'var(--border)') + ';color:'
      + (bw ? 'var(--win)' : 'var(--muted)') + ';background:'
      + (bw ? 'rgba(0,232,122,0.18)' : 'var(--surface)') + ';'
      + 'font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;'
      + 'letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:0;">🚀 700%<</button>'
      + '<div style="flex:0 0 calc((100% - 16px) * 2 / 3 + 8px);"></div></div>';
  }

  // Chip builder
  function chips(opts, selected, field) {
    return opts.map(function(o) {
      const sel = selected.indexOf(o) >= 0;
      return '<button onclick="evoEditChip(\'' + field + '\',\'' + o.replace(/'/g, '&#39;') + '\')" class="edit-chip' + (sel ? ' selected' : '') + '">' + o + '</button>';
    }).join('');
  }

  // Against select
  let againstSelect = '<select class="edit-select" onchange="evoEditAgainst(this.value)">'
    + '<option value="">—</option>'
    + EVO_AGAINST_OPTS.map(function(o) {
        return '<option value="' + o + '"' + (editState.against === o ? ' selected' : '') + '>' + o + '</option>';
      }).join('')
    + '</select>';

  cont.innerHTML =
    '<div class="edit-body">'
    + '<div class="edit-field"><span class="edit-field-label">Eredmény</span>' + outcomeHtml + '</div>'
    + '<div class="edit-field"><span class="edit-field-label">HTF POI</span><div class="edit-chips">' + chips(EVO_HTF_OPTS, editState.htf, 'htf') + '</div></div>'
    + '<div class="edit-field"><span class="edit-field-label">Extra körülmény</span><div class="edit-chips">' + chips(EVO_EXTRA_OPTS, editState.extra, 'extra') + '</div></div>'
    + '<div class="edit-field"><span class="edit-field-label">Kötés ellen</span>' + againstSelect + '</div>'
    + '<div class="edit-field"><span class="edit-field-label">Setup</span><div class="edit-chips">' + chips(EVO_SETUP_OPTS, editState.setup, 'setup') + '</div></div>'
    + '<div class="edit-field"><span class="edit-field-label">Minőségi Setup</span>'
    + '<div class="edit-chips">'  
    + ['MA/SMA cross kis-k', 'LD + Flat', 'STF csúzli'].map(function(o) {
        var sel = editState.qualitySetup && editState.qualitySetup.indexOf(o) >= 0;

        return '<button onclick="evoEditQualityToggle(\'' + o.replace(/\'/g, "&#39;") + '\')" style="' + qst + 'padding:10px 14px;border:1px solid;font-family:\'Barlow Condensed\',sans-serif;font-size:17px;text-align:left;cursor:pointer;border-radius:0;width:100%;">' + o + '</button>';

    + '</div></div>'

        var sel = editState.wrongSetup && editState.wrongSetup.indexOf(o) >= 0;
        var st = sel ? 'border-color:var(--yellow);color:var(--yellow);background:rgba(255,204,0,0.1);' : 'border-color:var(--border);color:var(--muted);background:var(--surface);';
        return '<button onclick="evoEditWrongToggle(\'' + o.replace(/\'/g, "&#39;") + '\')" style="' + st + 'padding:10px 14px;border:1px solid;font-family:\'Barlow Condensed\',sans-serif;font-size:17px;text-align:left;cursor:pointer;border-radius:0;width:100%;">' + o + '</button>';

    + '</div></div>'

    + '<div class="stf-presets">' + STF_PRESETS.map(function(s) { var sel = editState.stf === s; return '<button onclick="evoEditStf(' + s + ')" class="stf-preset-btn' + (sel ? ' stf-selected' : '') + '" data-secs="' + s + '">' + stfLabel(s) + '</button>'; }).join('') + '</div>'
    + '<div class="stf-custom-row"><span class="stf-custom-lbl">Egyéni (s):</span><input class="stf-custom-input" type="number" min="1" max="3600" value="' + (editState.stf || '') + '" oninput="evoEditStfCustom(this.value)" /><span class="stf-display" id="edit-stf-display">' + (editState.stf ? stfLabel(editState.stf) : '') + '</span></div>'

function evoEditQualityToggle(o) { if(!Array.isArray(editState.qualitySetup))editState.qualitySetup=[]; var i=editState.qualitySetup.indexOf(o); if(i>=0)editState.qualitySetup.splice(i,1); else editState.qualitySetup.push(o); renderEditCard(); }
function evoEditOutcome(val) { editState.outcome = val; if (val !== 'loss') editState.zeroStop = false; if (val !== 'win') editState.bigWin = false; renderEditCard(); }
function evoEditZeroStop() { editState.zeroStop = !editState.zeroStop; renderEditCard(); }
function evoEditBigWin() { editState.bigWin = !editState.bigWin; renderEditCard(); }

function evoEditStfCustom(val) {

function evoEditChip(field, val) {

  if (field === 'setup') {
    // Single-select for setup
    editState.setup = (arr.length === 1 && arr[0] === val) ? [] : [val];

function evoSaveEdit(id) {

  if (idx < 0) return;
  const t = allTrades[idx];
  t.outcome = editState.outcome;
  t.folder  = editState.folder.trim() || t.folder;
  t.data['HTF POI']          = editState.htf.join(', ')   || '—';
  t.data['Extra körülmény']  = editState.extra.join(', ') || '—';
  t.data['Kötés ellen']      = editState.against           || '—';

  t.qualitySetup = editState.qualitySetup && editState.qualitySetup.length > 0 ? editState.qualitySetup.slice() : null;
  t.wrongSetup = editState.wrongSetup && editState.wrongSetup.length > 0 ? editState.wrongSetup.slice() : null;
  t.stf   = editState.stf > 0 ? editState.stf : null;
  t.zeroStop = editState.zeroStop || undefined;

// ── IMPORT ────────────────────────────────────────────────────────────────────
function evoImportFolder(input) {
  const files = Array.from(input.files).filter(f => f.name.endsWith('.json'));
  if (files.length === 0) {
    setImportStatus('Nem találhatók .json fájlok.', 'err');
    return;
  }

  let loaded = 0, skipped = 0, errors = 0;
  let pending = files.length;

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const entry = JSON.parse(e.target.result);
        // Accept single entry or array
        const entries = Array.isArray(entry) ? entry : [entry];
        entries.forEach(en => {
          if (en.id && en.outcome && en.data) {
            const exists = allTrades.some(t => t.id === en.id);
            if (!exists) { allTrades.push(en); loaded++; }
            else skipped++;
          } else { errors++; }
        });
      } catch(err) { errors++; }
      pending--;
      if (pending === 0) {
        evoSaveToStorage();
        evoRenderAll();
        const msg = `${loaded} új bejegyzés importálva` +
          (skipped  ? `, ${skipped} már létezett` : '') +
          (errors   ? `, ${errors} hiba` : '') + '.';
        setImportStatus(msg, loaded > 0 ? 'ok' : 'err');
        showToast(loaded > 0 ? `${loaded} bejegyzés importálva` : 'Nincs új adat', loaded > 0 ? false : true);
      }
    };
    reader.readAsText(file);
  });

  // Reset input so same folder can be re-imported
  input.value = '';
}

function evoSyncFromTradeGate() {
  let gateTrades = [];
  try { gateTrades = JSON.parse(localStorage.getItem(GATE_KEY) || '[]'); } catch(e) {}
  if (gateTrades.length === 0) {
    showToast('Nincs TradeGate adat', true);
    return;
  }
  let added = 0;
  gateTrades.forEach(t => {
    if (!allTrades.some(e => e.id === t.id)) {
      allTrades.push(t); added++;
    }
  });
  if (added > 0) { evoSaveToStorage(); evoRenderAll(); }
  showToast(added > 0 ? `${added} új bejegyzés szinkronizálva` : 'Nincs új adat', added === 0);
}

function evoExportAllJSON() {
  if (allTrades.length === 0) { showToast('Nincs exportálható adat', true); return; }
  const blob = new Blob([JSON.stringify(allTrades, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'tradegate_evo_export_' + todayStr() + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('Export letöltve');
}

function setImportStatus(msg, type) {
  const el = document.getElementById('import-status');
  if (!el) return;
  el.textContent = msg;
  el.className = 'import-status' + (type ? ' ' + type : '');
}

function gapSwitchView(name) {

  document.querySelectorAll('#pane-gap .nav-btn').forEach(function(b){ b.classList.remove('active'); });

function gapInitChart() {
  var canvas = document.getElementById('gap-wr-chart');
  if (!canvas || !_gapDates || !_gapDates.length) return;
  var dpr = window.devicePixelRatio || 1;
  var PAD = {l:38, r:12, t:10, b:28};
  var tip = document.getElementById('gap-tooltip');

  var allVals = _gapDates.map(function(d){ return [_gapEvoByDate[d], _gapRealByDate[d]]; })
    .reduce(function(a,b){ return a.concat(b); }, [])
    .filter(function(v){ return v !== undefined; });
  var minV = allVals.length ? Math.max(0,  Math.floor((Math.min.apply(null,allVals)-10)/10)*10) : 0;
  var maxV = allVals.length ? Math.min(100, Math.ceil( (Math.max.apply(null,allVals)+10)/10)*10) : 100;

  function xPos(i, W) { return PAD.l + (i / ((_gapDates.length-1)||1)) * (W - PAD.l - PAD.r); }
  function yPos(v, H) { return PAD.t + (1 - (v-minV)/((maxV-minV)||1)) * (H - PAD.t - PAD.b); }

  function draw() {
    var W = canvas.width, H = canvas.height;
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);
    ctx.font = (9*dpr) + 'px Space Mono,monospace';
    ctx.fillStyle = '#888899'; ctx.textAlign = 'right';
    [0,25,50,75,100].forEach(function(v) {
      if (v < minV || v > maxV) return;
      var y = yPos(v, H);
      ctx.fillText(v + '%', PAD.l - 4, y + 3*dpr);
      ctx.beginPath(); ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = dpr;
      ctx.moveTo(PAD.l, y); ctx.lineTo(W - PAD.r, y); ctx.stroke();
    });
    var step = Math.max(1, Math.floor(_gapDates.length / 6));
    _gapDates.forEach(function(d, i) {
      if (i % step !== 0 && i !== _gapDates.length - 1) return;
      ctx.fillStyle = '#888899'; ctx.textAlign = 'center'; ctx.font = (8*dpr) + 'px Space Mono,monospace';
      ctx.fillText(d.slice(5), xPos(i, W), H - PAD.b + 14*dpr);
    });
    // Draw filled gap area between EVO and REAL
    // Green fill where EVO > REAL (EVO is better), yellow fill where REAL > EVO
    var gapPts = [];
    _gapDates.forEach(function(d, i) {
      var ev = _gapEvoByDate[d], rv = _gapRealByDate[d];
      if (ev !== undefined && rv !== undefined) {
        gapPts.push({i:i, ev:ev, rv:rv});
      }
    });
    if (gapPts.length > 1) {
      // Draw segments: where EVO > REAL fill green (EVO performing better), where REAL > EVO fill yellow
      for (var si = 0; si < gapPts.length - 1; si++) {
        var p0 = gapPts[si], p1 = gapPts[si+1];
        var x0 = xPos(p0.i, W), x1 = xPos(p1.i, W);
        var yEvo0 = yPos(p0.ev, H), yEvo1 = yPos(p1.ev, H);
        var yReal0 = yPos(p0.rv, H), yReal1 = yPos(p1.rv, H);
        var fillColor = (p0.ev + p1.ev) >= (p0.rv + p1.rv)
          ? 'rgba(255,255,255,0.18)'
          : 'rgba(255,204,0,0.18)';
        ctx.beginPath();
        ctx.moveTo(x0, yEvo0);
        ctx.lineTo(x1, yEvo1);
        ctx.lineTo(x1, yReal1);
        ctx.lineTo(x0, yReal0);
        ctx.closePath();
        ctx.fillStyle = fillColor;
        ctx.fill();
      }
    }

    function drawLine(byDate, color) {
      ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2*dpr; ctx.lineJoin = 'round';
      var started = false;
      _gapDates.forEach(function(d, i) {
        var v = byDate[d];
        if (v === undefined) return;
        var x = xPos(i, W), y = yPos(v, H);
        if (!started) { ctx.moveTo(x, y); started = true; } else { ctx.lineTo(x, y); }
      });
      ctx.stroke();
    }
    drawLine(_gapEvoByDate,  '#00e87a');
    drawLine(_gapRealByDate, '#ffcc00');
    // Endpoint dots
    var lastEvoIdx = -1, lastRealIdx = -1;
    _gapDates.forEach(function(d, i) {
      if (_gapEvoByDate[d]  !== undefined) lastEvoIdx  = i;
      if (_gapRealByDate[d] !== undefined) lastRealIdx = i;
    });
    if (lastEvoIdx >= 0) {
      ctx.beginPath(); ctx.arc(xPos(lastEvoIdx, W), yPos(_gapEvoByDate[_gapDates[lastEvoIdx]], H), 4*dpr, 0, 2*Math.PI);
      ctx.fillStyle = '#00e87a'; ctx.fill();
    }
    if (lastRealIdx >= 0) {
      ctx.beginPath(); ctx.arc(xPos(lastRealIdx, W), yPos(_gapRealByDate[_gapDates[lastRealIdx]], H), 4*dpr, 0, 2*Math.PI);
      ctx.fillStyle = '#ffcc00'; ctx.fill();
    }
  }

  function resize() {
    canvas.width  = (canvas.offsetWidth  || 400) * dpr;
    canvas.height = 180 * dpr;
    canvas.style.height = '180px';
    draw();
  }

  if (tip) {
    canvas.addEventListener('mousemove', function(e) {
      var rect = canvas.getBoundingClientRect();
      var mx = (e.clientX - rect.left) * (canvas.width / rect.width);
      var nearest = 0, minDist = Infinity;
      _gapDates.forEach(function(_, i) {
        var d = Math.abs(xPos(i, canvas.width) - mx);
        if (d < minDist) { minDist = d; nearest = i; }
      });
      var d = _gapDates[nearest];
      var ev = _gapEvoByDate[d], rv = _gapRealByDate[d];
      var html = '<b>' + d + '</b><br>';
      if (ev !== undefined) html += '<span style="color:#00e87a">EVO: ' + ev + '%</span><br>';
      if (rv !== undefined) html += '<span style="color:#ffcc00">REAL: ' + rv + '%</span><br>';
      if (ev !== undefined && rv !== undefined) html += '<span style="color:#888899">\u0394: ' + (rv-ev>0?'+':'') + (rv-ev) + '%</span>';
      tip.innerHTML = html;
      var tx = e.clientX - rect.left + 10;
      var ty = e.clientY - rect.top - 40;
      if (tx + 150 > rect.width) tx = e.clientX - rect.left - 155;
      tip.style.left = tx + 'px'; tip.style.top = ty + 'px'; tip.style.display = 'block';
    });
    canvas.addEventListener('mouseleave', function() { tip.style.display = 'none'; });
  }
  resize();
  window.addEventListener('resize', resize);
}



// ── Win Rate chart ────────────────────────────────────────────────────────────
var _wrChartState = { evo: { open: false, year: null, month: null, mode: 'line', lineMonths: 1 },
                      real:{ open: false, year: null, month: null, mode: 'line', lineMonths: 1 } };

function wrChartToggle(db) {
  var st = _wrChartState[db];
  st.open = !st.open;
  if (st.open) {
    if (!st.year) { var now = new Date(); st.year = now.getFullYear(); st.month = now.getMonth() + 1; }
    if (_openOrder[db].indexOf('wr') < 0) _openOrder[db].push('wr');
  } else {
    _openOrder[db] = _openOrder[db].filter(function(x){return x!=='wr';});
  }
  if (db === 'evo') _evoRenderDashboard();
  else realRenderDashboard();
}

function wrChartNav(db, dir) {
  var st = _wrChartState[db];
  st.month += dir;
  if (st.month > 12) { st.month = 1;  st.year++; }
  if (st.month < 1)  { st.month = 12; st.year--; }
  if (db === 'evo') _evoRenderDashboard();
  else realRenderDashboard();
}

function wrChartJump(db, val) {
  // val = "YYYY-MM"
  var parts = val.split('-');
  if (parts.length === 2) {
    _wrChartState[db].year  = parseInt(parts[0], 10);
    _wrChartState[db].month = parseInt(parts[1], 10);
    if (db === 'evo') _evoRenderDashboard();
    else realRenderDashboard();
  }
}

function wrBuildChart(db, trades) {
  var st = _wrChartState[db];
  if (!st.open) return '';
  if (st.mode === 'line') return wrBuildLineChart(db, trades);

  var y = st.year, m = st.month;
  var monthStr = y + '-' + String(m).padStart(2,'0');
  var MONTHS = ['Január','Február','Március','Április','Május','Június','Július','Augusztus','Szeptember','Október','November','December'];
  var label = MONTHS[m-1] + ' ' + y;

  // Collect all available year-months for select
  var allMonths = {};
  trades.forEach(function(t) {
    if (t.folder && t.folder.length >= 7) allMonths[t.folder.slice(0,7)] = true;
  });
  var monthKeys = Object.keys(allMonths).sort().reverse();
  var selectOpts = monthKeys.map(function(k) {
    var p = k.split('-');
    var ml = MONTHS[parseInt(p[1],10)-1] + ' ' + p[0];
    return '<option value="'+k+'"'+(k===monthStr?' selected':'')+'>'+ml+'</option>';
  }).join('');

  // Filter trades for this month
  var monthTrades = trades.filter(function(t) {
    return t.folder && t.folder.slice(0,7) === monthStr;
  });

  // Group by day
  var dayMap = {};
  monthTrades.forEach(function(t) {
    var day = t.folder;
    if (!dayMap[day]) dayMap[day] = { win:0, be:0, loss:0, total:0 };
    dayMap[day].total++;
    if (t.outcome === 'win') dayMap[day].win++;
    else if (t.outcome === 'be') dayMap[day].be++;
    else if (t.outcome === 'loss') dayMap[day].loss++;
  });
  var days = Object.keys(dayMap).sort();

  // Month summary
  var mWins = monthTrades.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length;
  var mTotal = monthTrades.length;
  var mWr = mTotal > 0 ? Math.round(mWins/mTotal*100) : null;
  var mWrCol = mWr === null ? 'var(--muted)' : mWr >= 55 ? 'var(--win)' : mWr >= 45 ? 'var(--yellow)' : 'var(--loss)';
  var summaryHtml = mTotal > 0
    ? '<span style="color:var(--text);">' + label + '</span>'
    + ' &mdash; <span style="color:'+mWrCol+';font-weight:700;">' + (mWr !== null ? mWr+'%' : '—') + '</span>'
    + ' &mdash; <span style="color:var(--win);">' + monthTrades.filter(function(t){return t.outcome==='win';}).length + 'W</span>'
    + ' / <span style="color:var(--be);">' + monthTrades.filter(function(t){return t.outcome==='be';}).length + 'BE</span>'
    + ' / <span style="color:var(--loss);">' + monthTrades.filter(function(t){return t.outcome==='loss';}).length + 'L</span>'
    + ' &mdash; ' + mTotal + ' kötés'
    : '<span style="color:var(--muted);">Nincs adat ebben a hónapban</span>';

  var barsHtml;
  if (days.length === 0) {
    barsHtml = '<div class="wr-empty">Nincs kereskedett nap ebben a hónapban</div>';
  } else {
    var maxH = 100; // px total height = 100% WR
    var bars = days.map(function(day) {
      var d = dayMap[day];
      var wr = d.total > 0 ? Math.round((d.win+d.be)/d.total*100) : 0;
      var wrCol = wr >= 55 ? 'var(--win)' : wr >= 45 ? 'var(--yellow)' : 'var(--loss)';
      // Total bar height proportional to WR%
      var totalH = Math.max(1, Math.round(wr / 100 * maxH));
      // Within totalH, split win/be proportionally
      var winFrac = (d.win+d.be) > 0 ? d.win/(d.win+d.be) : 0;
      var winH = Math.round(winFrac * totalH);
      var beH  = totalH - winH;
      var dayNum = day.slice(8);
      var goLog = 'wrGoLog(\'' + db + '\',\'' + day + '\')' ;
      return '<div class="wr-bar-col" onclick="'+goLog+'">' 
        + '<div class="wr-bar-pct" style="color:'+wrCol+';">'+wr+'%</div>'
        + '<div class="wr-bar-stack" style="height:'+maxH+'px;justify-content:flex-end;">'
        + (winH > 0 ? '<div class="wr-bar win-seg" style="height:'+winH+'px;"></div>' : '')
        + (beH  > 0 ? '<div class="wr-bar be-seg"  style="height:'+beH+'px;"></div>'  : '')
        + '</div>'
        + '<div class="wr-bar-day">'+dayNum+'</div>'
        + '</div>';
    }).join('');
    barsHtml = '<div class="wr-bars-wrap">'
      + '<div class="wr-bars">'
      + '<div class="wr-baseline" style="bottom:55px;"></div>'
      + bars
      + '</div></div>';
  }

  return '<div class="wr-chart-nav">'
    +   '<button class="wr-chart-nav-btn" onclick="event.stopPropagation();wrChartNav(\'' + db + '\',-1)">&#8592;</button>'
    +   '<span class="wr-chart-month-label" onclick="event.stopPropagation();var s=this.nextElementSibling;s.style.display=s.style.display===\'block\'?\'none\':\'block\';">' + label + '</span>'
    +   '<button class="wr-chart-nav-btn" onclick="event.stopPropagation();wrChartNav(\'' + db + '\',1)">&#8594;</button>'
    + '</div>'
    + '<select class="wr-month-select" onclick="event.stopPropagation();" onchange="wrChartJump(\'' + db + '\',this.value)">' + selectOpts + '</select>'
    + '<div class="wr-chart-summary">' + summaryHtml + '</div>'
    + barsHtml;
}


function wrGoLog(db, day) {

    ['tg','evo','real','gap'].forEach(function(p) {

function tcBuildChart(db, trades) {

  var y = st.year, m = st.month;
  var monthStr = y + '-' + String(m).padStart(2,'0');
  var MONTHS = ['Január','Február','Március','Április','Május','Június','Július','Augusztus','Szeptember','Október','November','December'];
  var label = MONTHS[m-1] + ' ' + y;

  var allMonths = {};
  trades.forEach(function(t) {
    if (t.folder && t.folder.length >= 7) allMonths[t.folder.slice(0,7)] = true;
  });
  var monthKeys = Object.keys(allMonths).sort().reverse();
  var selectOpts = monthKeys.map(function(k) {

    var ml = MONTHS[parseInt(p[1],10)-1] + ' ' + p[0];

  }).join('');

  var monthTrades = trades.filter(function(t) {
    return t.folder && t.folder.slice(0,7) === monthStr;
  });

  var dayMap = {};
  var dayMap2 = {};
  monthTrades.forEach(function(t) {
    var day = t.folder;
    if (!dayMap[day]) dayMap[day] = 0;
    dayMap[day]++;
    if (!dayMap2[day]) dayMap2[day] = {win:0,be:0,loss:0,total:0};
    dayMap2[day].total++;
    if (t.outcome==='win') dayMap2[day].win++;
    else if (t.outcome==='be') dayMap2[day].be++;
    else if (t.outcome==='loss') dayMap2[day].loss++;
  });
  var days = Object.keys(dayMap).sort();

  var mTotal = monthTrades.length;

    + (days.length > 0 ? ' &mdash; max <span style="color:var(--text);">' + Math.max.apply(null, days.map(function(d){return dayMap[d];})) + '/nap</span>' : '')

    var maxH = 100;

    var bars = days.map(function(day) {
      var cnt = dayMap[day];
      var barH = Math.max(2, Math.round(cnt / maxCount * maxH));
      var d2 = dayMap2[day] || {win:0,be:0,loss:0,total:cnt};
      var winH2  = d2.total > 0 ? Math.round(d2.win /d2.total * barH) : 0;
      var beH2   = d2.total > 0 ? Math.round(d2.be  /d2.total * barH) : 0;
      var lossH2 = Math.max(0, barH - winH2 - beH2);
      var dayNum = day.slice(8);
      var goLog = 'wrGoLog(\'' + db + '\',\'' + day + '\')';

        + '<div class="wr-bar-pct" style="color:var(--muted);">'+cnt+'</div>'
        + '<div class="wr-bar-stack" style="height:'+maxH+'px;justify-content:flex-end;">'
        + (winH2  > 0 ? '<div class="wr-bar win-seg"  style="height:'+winH2+'px;"></div>' : '')

        + '</div>'

    + '<button class="wr-chart-nav-btn" onclick="event.stopPropagation();tcChartNav(\'' + db + '\',1)">&#8594;</button>'
    + '</div>'
    + '<select class="wr-month-select" onclick="event.stopPropagation();" onchange="tcChartJump(\'' + db + '\',this.value)">' + selectOpts + '</select>'
    + '<div class="wr-chart-summary">' + summaryHtml + '</div>'
    + barsHtml;

function wrSetChartMode(db, mode) {
  _wrChartState[db].mode = mode;
  if (db === 'evo') _evoRenderDashboard();
  else realRenderDashboard();
}

function wrSetLineMonths(db, n) {
  _wrChartState[db].lineMonths = n;
  if (db === 'evo') _evoRenderDashboard();
  else realRenderDashboard();
}

function wrBuildLineChart(db, trades) {
  var st = _wrChartState[db];
  var nMonths = st.lineMonths || 1;

  // Determine end date = today or latest trade
  var allFolders = trades.map(function(t){return t.folder||'';}).filter(Boolean).sort();
  if (allFolders.length === 0) return '<div class="wr-empty">Nincs adat</div>';
  var latestDate = allFolders[allFolders.length-1];
  var startStr, endStr = latestDate;
  if (nMonths >= 9999) {
    startStr = allFolders[0];
  } else {
    var endD = new Date(latestDate);
    var startD = new Date(endD);
    startD.setMonth(startD.getMonth() - nMonths + 1);
    startD.setDate(1);
    startStr = startD.getFullYear() + '-' + String(startD.getMonth()+1).padStart(2,'0') + '-01';
  }

  // Filter and sort trades in range
  var inRange = trades.filter(function(t){
    return t.folder && t.folder >= startStr && t.folder <= endStr;
  }).sort(function(a,b){ return (a.timestamp||a.folder) > (b.timestamp||b.folder) ? 1 : -1; });

  if (inRange.length === 0) return '<div class="wr-empty">Nincs adat ebben az időszakban</div>';

  // Build cumulative WR by day
  var days = [];
  var dayMap = {};
  inRange.forEach(function(t) {
    var d = t.folder;
    if (!dayMap[d]) dayMap[d] = {win:0,total:0};
    dayMap[d].total++;
    if (t.outcome==='win'||t.outcome==='be') dayMap[d].win++;
  });
  var sortedDays = Object.keys(dayMap).sort();
  var cumWin=0, cumTotal=0;
  var points = sortedDays.map(function(d) {
    cumWin   += dayMap[d].win;
    cumTotal += dayMap[d].total;
    return { d: d, wr: Math.round(cumWin/cumTotal*100), dayWr: Math.round(dayMap[d].win/dayMap[d].total*100), total: dayMap[d].total };
  });

  // SVG line chart
  var W=460, H=100, PL=6, PR=6, PT=12, PB=18;
  var cW=W-PL-PR, cH=H-PT-PB;
  var n = points.length;
  var xStep = n > 1 ? cW/(n-1) : cW;

  function px(i) { return PL + (n>1 ? i*xStep : cW/2); }
  function py(v) { return PT + cH - Math.round(v/100*cH); }

  // Line path
  var path = points.map(function(p,i){ return (i===0?'M':'L') + px(i) + ',' + py(p.wr); }).join(' ');

  // 55% baseline
  var baseY = py(55);

  // Area fill
  var areaPath = 'M'+px(0)+','+py(points[0].wr)+' '+points.slice(1).map(function(p,i){ return 'L'+px(i+1)+','+py(p.wr); }).join(' ');
  areaPath += ' L'+px(n-1)+','+(PT+cH)+' L'+px(0)+','+(PT+cH)+' Z';

  // Day labels (max 8)
  var labelStep = Math.max(1, Math.floor(n/8));
  var labels = '';
  points.forEach(function(p,i) {
    if (i%labelStep===0 || i===n-1) {
      labels += '<text x="'+px(i)+'" y="'+(PT+cH+13)+'" text-anchor="middle" fill="#44445a" font-size="7" font-family="Space Mono,monospace">'+p.d.slice(5)+'</text>';
    }
  });

  // Hover dots + invisible rects for mouse tracking
  var dots = points.map(function(p,i) {
    return '<circle class="wr-line-dot" cx="'+px(i)+'" cy="'+py(p.wr)+'" r="3" fill="'+( p.wr>=55?'#00e87a':p.wr>=45?'#ffcc00':'#ff4455')+'" stroke="var(--bg)" stroke-width="1.5" data-i="'+i+'" />';
  }).join('');

  var hitRects = points.map(function(p,i) {
    var x0 = i>0 ? (px(i-1)+px(i))/2 : PL;
    var x1 = i<n-1 ? (px(i)+px(i+1))/2 : PL+cW;
    return '<rect x="'+x0+'" y="'+PT+'" width="'+(x1-x0)+'" height="'+cH+'" fill="transparent"'
      +' onmouseenter="wrLineHoverIdx('+i+')" onmouseleave="wrLineHoverOut()" data-db="'+db+'" />';
  }).join('');

  var tooltipId = 'wrl-tt-'+db;
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:'+H+'px;display:block;overflow:visible;">'
    + '<defs><linearGradient id="wrlg'+db+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00e87a" stop-opacity="0.18"/><stop offset="100%" stop-color="#00e87a" stop-opacity="0.01"/></linearGradient></defs>'
    + '<line x1="'+PL+'" y1="'+baseY+'" x2="'+(PL+cW)+'" y2="'+baseY+'" stroke="#44445a" stroke-width="1" stroke-dasharray="3,3" />'
    + '<text x="'+(PL+cW-2)+'" y="'+(baseY-3)+'" text-anchor="end" fill="#44445a" font-size="7" font-family="Space Mono,monospace">55%</text>'
    + '<path d="'+areaPath+'" fill="url(#wrlg'+db+')" />'
    + '<path d="'+path+'" fill="none" stroke="#00e87a" stroke-width="1.5" stroke-linejoin="round" />'
    + dots
    + hitRects
    + labels
    + '</svg>';

  // Tooltip el (rendered outside SVG)
  var tooltipHtml = '<div id="'+tooltipId+'" style="display:none;position:absolute;background:var(--surface);border:1px solid var(--border);padding:6px 10px;font-family:Space Mono,monospace;font-size:9px;letter-spacing:0.1em;pointer-events:none;z-index:20;white-space:nowrap;"></div>';

  // Interval buttons
  var intervals = [1,3,6,12,9999];
  var intervalLabels = {1:'1 hó',3:'3 hó',6:'6 hó',12:'1 év',9999:'ALL'};
  var btnRow = '<div style="display:flex;gap:6px;padding:8px 12px 0;align-items:center;">'
    + '<span style="font-family:Space Mono,monospace;font-size:8px;color:var(--muted);letter-spacing:0.1em;margin-right:4px;">IDŐSZAK:</span>'
    + intervals.map(function(n){
        var sel = (st.lineMonths||1)===n;
        var lbl = intervalLabels[n] || (n+'m');
        return '<button onclick="event.stopPropagation();wrSetLineMonths(\'' + db + '\',' + n + ')" style="background:'+(sel?'var(--accent)':'transparent')+';border:1px solid '+(sel?'var(--accent)':'var(--border)')+';color:'+(sel?'#0a0a0c':'var(--muted)')+';font-family:Space Mono,monospace;font-size:8px;padding:3px 8px;cursor:pointer;border-radius:0;">'+lbl+'</button>';
      }).join('')
    + '</div>';

  return '<div style="position:relative;" onmouseenter="_wrLineHoverDb=\'' + db + '\'" onmouseleave="_wrLineHoverDb=null">'
    + btnRow
    + '<div style="padding:8px 12px 10px;position:relative;">'
    + svg
    + tooltipHtml
    + '</div></div>';
}

function wrLineHoverIdx(idx) {
  var db = _wrLineHoverDb; if (!db) return;
  var evt = window.event || {};
  wrLineHover(idx, evt, db);
}

  if (!allFolders.length) return;
  var latestDate = allFolders[allFolders.length-1];
  var endD = new Date(latestDate);
  var startD = new Date(endD);
  startD.setMonth(startD.getMonth() - nMonths + 1);
  startD.setDate(1);
  var startStr = startD.getFullYear() + '-' + String(startD.getMonth()+1).padStart(2,'0') + '-01';
  var inRange = trades.filter(function(t){ return t.folder && t.folder >= startStr && t.folder <= latestDate; });
  var dayMap = {};
  inRange.forEach(function(t) {
    if (!dayMap[t.folder]) dayMap[t.folder] = {win:0,total:0};
    dayMap[t.folder].total++;
    if (t.outcome==='win'||t.outcome==='be') dayMap[t.folder].win++;

function avgBuildChart(db, trades) {
  var st = _avgChartState[db];
  if (!st.open) return '';

  var nMonths = st.lineMonths || 1;

  // Build folder counts from ALL trades (for cumulative avg)
  var allFolders = {};
  trades.forEach(function(t) {
    if (t.folder) allFolders[t.folder] = (allFolders[t.folder]||0)+1;
  });
  var allSortedDays = Object.keys(allFolders).sort();
  if (allSortedDays.length === 0) return '<div class="wr-empty">Nincs adat</div>';

  var latestDate = allSortedDays[allSortedDays.length-1];
  var startStr;
  if (nMonths >= 9999) { startStr = allSortedDays[0]; }
  else {
    var endD = new Date(latestDate); var startD = new Date(endD);
    startD.setMonth(startD.getMonth() - nMonths + 1); startD.setDate(1);
    startStr = startD.getFullYear() + '-' + String(startD.getMonth()+1).padStart(2,'0') + '-01';
  }
  var inDays = allSortedDays.filter(function(d){ return d >= startStr && d <= latestDate; });
  if (inDays.length === 0) return '<div class="wr-empty">Nincs adat ebben az időszakban</div>';

  // Cumulative average up to each day (using ALL days, not just visible window)
  // Find index of startStr in allSortedDays
  var cumTrades = 0, cumDays = 0;
  var startIdx = allSortedDays.indexOf(inDays[0]);
  // Pre-sum days before window
  for (var pi = 0; pi < startIdx; pi++) {
    cumTrades += allFolders[allSortedDays[pi]];
    cumDays++;
  }
  // Build cumulative avg points
  var points = inDays.map(function(d) {
    cumTrades += allFolders[d];
    cumDays++;
    return { d: d, cnt: allFolders[d], cumAvg: Math.round(cumTrades / cumDays * 10) / 10 };
  });

  // Max trades day info (from ALL days)
  var maxCount = Math.max.apply(null, Object.values(allFolders));
  var maxDays  = allSortedDays.filter(function(d){return allFolders[d]===maxCount;});

  // Y scale: based on max cumAvg visible + some headroom
  var maxAvg = Math.max.apply(null, points.map(function(p){return p.cumAvg;}));
  var yMax   = Math.max(maxAvg * 1.15, 1);

  var W=460, H=100, PL=6, PR=6, PT=12, PB=18;
  var cW=W-PL-PR, cH=H-PT-PB;
  var n = points.length;

  function px(i) { return PL + (n>1 ? i*(cW/(n-1)) : cW/2); }
  function py(v) { return PT + cH - Math.round(v/yMax*cH); }

  var path = points.map(function(p,i){ return (i===0?'M':'L')+px(i)+','+py(p.cumAvg); }).join(' ');
  var areaPath = 'M'+px(0)+','+py(points[0].cumAvg)+' '+points.slice(1).map(function(p,i){return 'L'+px(i+1)+','+py(p.cumAvg);}).join(' ')+' L'+px(n-1)+','+(PT+cH)+' L'+px(0)+','+(PT+cH)+' Z';

  var labelStep = Math.max(1, Math.floor(n/8));
  var labels = '';
  points.forEach(function(p,i) {
    if (i%labelStep===0 || i===n-1) {
      labels += '<text x="'+px(i)+'" y="'+(PT+cH+13)+'" text-anchor="middle" fill="#44445a" font-size="7" font-family="Space Mono,monospace">'+p.d.slice(5)+'</text>';
    }
  });

  var dots = points.map(function(p,i) {
    return '<circle cx="'+px(i)+'" cy="'+py(p.cumAvg)+'" r="2.5" fill="#888899" stroke="var(--bg)" stroke-width="1" />';
  }).join('');

  var hitRects = points.map(function(p,i) {
    var x0 = i>0 ? (px(i-1)+px(i))/2 : PL;
    var x1 = i<n-1 ? (px(i)+px(i+1))/2 : PL+cW;
    return '<rect x="'+x0+'" y="'+PT+'" width="'+(x1-x0)+'" height="'+cH+'" fill="transparent" style="cursor:pointer;" onmouseenter="avgLineHoverIdx('+i+')" onmouseleave="avgLineHoverOut()" onclick="avgGoLog('+i+')" />';
  }).join('');

  var tooltipId = 'avgl-tt-'+db;

  var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:'+H+'px;display:block;overflow:visible;">'
    + '<defs><linearGradient id="avglg'+db+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#888899" stop-opacity="0.2"/><stop offset="100%" stop-color="#888899" stop-opacity="0.02"/></linearGradient></defs>'
    + '<path d="'+areaPath+'" fill="url(#avglg'+db+')" />'
    + '<path d="'+path+'" fill="none" stroke="#888899" stroke-width="1.5" stroke-linejoin="round" />'
    + dots
    + hitRects
    + labels
    + '</svg>';

  var tooltipHtml = '<div id="'+tooltipId+'" style="display:none;position:absolute;background:var(--surface);border:1px solid var(--border);padding:6px 10px;font-family:Space Mono,monospace;font-size:9px;letter-spacing:0.1em;pointer-events:none;z-index:20;white-space:nowrap;"></div>';

  var intervals = [1,3,6,12,9999];
  var intervalLabels = {1:'1 hó',3:'3 hó',6:'6 hó',12:'1 év',9999:'ALL'};
  var btnRow = '<div style="display:flex;gap:6px;padding:8px 12px 0;align-items:center;flex-wrap:wrap;">'
    + '<span style="font-family:Space Mono,monospace;font-size:8px;color:var(--muted);letter-spacing:0.1em;margin-right:4px;">IDŐSZAK:</span>'
    + intervals.map(function(nn){
        var sel = (st.lineMonths||1)===nn;
        var lbl = intervalLabels[nn] || (nn+'m');
        return '<button onclick="event.stopPropagation();avgSetLineMonths(\'' + db + '\',' + nn + ')" style="background:'+(sel?'var(--accent)':'transparent')+';border:1px solid '+(sel?'var(--accent)':'var(--border)')+';color:'+(sel?'#0a0a0c':'var(--muted)')+';font-family:Space Mono,monospace;font-size:8px;padding:3px 8px;cursor:pointer;border-radius:0;">'+lbl+'</button>';
      }).join('')
    + '</div>';

  // Max day button — navigate log to all max days
  // Store maxDays in global so onclick can reference it safely
  _avgMaxDaysStore[db] = maxDays;
  var maxBtn = '<div style="padding:4px 12px 0;">'
    + '<button onclick="event.stopPropagation();avgGoMaxLog(\'' + db + '\')" style="background:transparent;border:none;color:var(--accent);font-family:Space Mono,monospace;font-size:9px;padding:0;cursor:pointer;letter-spacing:0.08em;">'
    + 'Max: ' + maxCount + ' kötés — ' + (maxDays.length > 1 ? maxDays.length + ' nap' : maxDays[0]) + ' &#9660;</button>'
    + '</div>';

  return '<div style="position:relative;" onmouseenter="_avgLineHoverDb=\'' + db + '\';" onmouseleave="_avgLineHoverDb=null;">'
    + btnRow
    + maxBtn
    + '<div style="padding:8px 12px 10px;position:relative;">'
    + svg
    + tooltipHtml
    + '</div></div>';
}

function evoCopyToReal(id) {
  id = Number(id);
  var t = allTrades.find(function(e){ return Number(e.id) === id; });
  if (!t) return;

  // Build REAL entry from EVO data — outcome left null for user to fill in
  var entry = {
    id:           Date.now(),
    folder:       t.folder || todayStr(),
    timestamp:    new Date().toISOString(),
    outcome:      t.outcome,          // carry over EVO outcome as default
    vanHely:      'igen',
    data: {
      'HTF POI':         t.data ? (t.data['HTF POI'] || '—') : '—',
      'Extra körülmény': t.data ? (t.data['Extra körülmény'] || '—') : '—',
      'Kötés ellen':     t.data ? (t.data['Kötés ellen'] || 'semmi') : 'semmi'
    },
    setup:        Array.isArray(t.setup) ? t.setup.slice() : null,
    wrongSetup:   [],
    stf:          t.stf || null,
    image:        t.image || null,
    linkedEvoId:  id    // the link back to EVO
  };

  // Mark EVO entry as copied
  var idx = allTrades.findIndex(function(e){ return Number(e.id) === id; });
  if (idx >= 0) {
    allTrades[idx].copiedToReal = true;
    evoSaveToStorage();
    ghAutoUpload('evo', allTrades[idx]);
  }

  // Add to REAL
  realTrades.push(entry);
  realSaveToStorage();
  // Use evo config as fallback since it's the same token
  var uploadCfg = _ghConfig['real'] || _ghConfig['evo'] || GH_DEFAULT;
  if (uploadCfg.token) {
    var uploadPath = 'real/real_' + entry.folder + '_' + entry.id + '.json';
    var uploadUrl  = 'https://api.github.com/repos/' + uploadCfg.user + '/' + uploadCfg.repo + '/contents/' + uploadPath;
    var uploadHdrs = { 'Authorization': 'token ' + uploadCfg.token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
    var uploadBody = JSON.stringify(entry, null, 2);
    fetch(uploadUrl, { headers: uploadHdrs })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(existing) {
        var payload = { message: 'save ' + uploadPath, content: btoa(unescape(encodeURIComponent(uploadBody))) };
        if (existing && existing.sha) payload.sha = existing.sha;
        return fetch(uploadUrl, { method: 'PUT', headers: uploadHdrs, body: JSON.stringify(payload) });
      })
      .then(function(r) {
        if (r && r.ok) console.log('[evoCopyToReal] uploaded:', uploadPath);
        else console.error('[evoCopyToReal] upload failed:', r ? r.status : 'no response');
      })
      .catch(function(e) { console.error('[evoCopyToReal] upload error:', e); });
  }

  showToast('Átmásolva REAL-be');

  // Re-render current EVO view to show the checkmark
  evoRenderAll();
}

function realBoot() {
  idbLoadAll('real', function(cached) {
    realTrades = migrateExtraFields(cached);
    realRenderAll();
    realUpdateSyncIndicator('Betöltés GitHub-ról...');
    ghLoadConfig('real', function(cfg) {
    if (!cfg.token) { realUpdateSyncIndicator('Add meg a GitHub tokent a Szinkron oldalon'); return; }
    var listUrl = 'https://api.github.com/repos/' + cfg.user + '/' + cfg.repo + '/contents/real';
    fetch(listUrl, { headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json' } })
      .then(function(r) {
        if (!r.ok) {
          realUpdateSyncIndicator('GitHub hiba: ' + r.status + ' ' + r.statusText);
          return null;
        }
        return r.json();
      })
      .then(function(items) {
        if (!items) return;
        if (!Array.isArray(items)) {
          realUpdateSyncIndicator('GitHub: váratlan válasz');
          return;
        }
        var files = items.filter(function(f) { return f.type === 'file' && f.name.endsWith('.json'); });
        if (!files.length) { realUpdateSyncIndicator('GitHub: 0 fájl a real mappában'); return; }
        realUpdateSyncIndicator('Letöltés: 0 / ' + files.length);
        var results = [], done = 0, total = files.length;
        files.forEach(function(f) {
          fetch('https://api.github.com/repos/' + cfg.user + '/' + cfg.repo + '/contents/real/' + f.name,
            { headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json' } })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
              if (data && data.content) {
                try {
                  var trade = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g,'')))));
                  if (trade && trade.id && (trade.outcome || trade.linkedEvoId)) results.push(trade);
                } catch(e) {}
              }
              done++;
              realUpdateSyncIndicator('Letöltés: ' + done + ' / ' + total);
              if (done === total) {
                if (results.length > 0) {
                  realTrades = migrateExtraFields(results);
                  idbSaveAll('real', realTrades);
                  // Reconcile EVO copiedToReal flags now that REAL is fresh
                  if (reconcileCopiedToReal()) {
                    idbSaveAll('evo', allTrades);
                    evoRenderAll();
                  }
                  realRenderAll();
                }
                realUpdateSyncIndicator();
              }
            })
            .catch(function() { done++; if (done === total) { realUpdateSyncIndicator(); } });
        });
      })
      .catch(function(e) { realUpdateSyncIndicator('GitHub hálózati hiba'); });
    }); // end ghLoadConfig
  });
}

function realRenderDashboard() {
  var el = document.getElementById('real-dashboard-content');
  if (!el) return;

  if (realTrades.length === 0) {
    el.innerHTML = emptyState('&#9685;', 'Még nincs adat', 'Rögzíts kereskedéseket a Log Trade oldalon.');
    return;
  }

  var total   = realTrades.length;
  var wins    = realTrades.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length;
  var losses  = realTrades.filter(function(t){return t.outcome==='loss';}).length;
  var bes     = realTrades.filter(function(t){return t.outcome==='be';}).length;
  var wr      = total > 0 ? Math.round(wins/total*100) : 0;
  var winPct  = total > 0 ? Math.floor(realTrades.filter(function(t){return t.outcome==='win';}).length/total*100) : 0;
  var lossPct = total > 0 ? Math.floor(losses/total*100) : 0;
  var bePct   = total > 0 ? (100 - winPct - lossPct) : 0;
  var wrColor = wr >= 55 ? 'green' : wr >= 45 ? 'yellow' : 'red';
  var totalColor = total >= 100 ? 'var(--win)' : 'var(--yellow)';

  var folders = {};
  realTrades.forEach(function(t){ folders[t.folder] = (folders[t.folder]||0)+1; });
  var folderCount = Object.keys(folders).length;
  var avgPerDay = folderCount > 0 ? Math.round(total / folderCount * 10) / 10 : 0;
  var maxDayTrades = folderCount > 0 ? Math.max.apply(null, Object.keys(folders).map(function(k){return folders[k];})) : 0;
  var maxTradeDay = folderCount > 0 ? Object.keys(folders).reduce(function(a,b){return folders[b]>folders[a]?b:a;}) : null;
  var dayStats={};
  realTrades.forEach(function(t){if(!dayStats[t.folder])dayStats[t.folder]={win:0,be:0,loss:0,total:0};dayStats[t.folder].total++;if(t.outcome==='win')dayStats[t.folder].win++;else if(t.outcome==='be')dayStats[t.folder].be++;else if(t.outcome==='loss')dayStats[t.folder].loss++;});
  var dayWRs=Object.keys(dayStats).map(function(d){return{d:d,wr:Math.round((dayStats[d].win+dayStats[d].be)/dayStats[d].total*100),total:dayStats[d].total};});
  var scoredDays=dayWRs.map(function(d){return Object.assign({},d,{score:d.wr*Math.sqrt(d.total)});});
  var maxWRDay=scoredDays.length>0?scoredDays.reduce(function(a,b){return b.score>a.score?b:a;}):null;
  var minWRDay=dayWRs.length>0?dayWRs.reduce(function(a,b){return b.wr<a.wr?b:a;}):null;
  var linkedCount = realTrades.filter(function(t){return !!t.linkedEvoId;}).length;
  var linkedPct   = total > 0 ? Math.round(linkedCount/total*100) : 0;
  var linkedColor = linkedPct >= 80 ? 'var(--win)' : linkedPct >= 50 ? 'var(--yellow)' : 'var(--loss)';

  var sortedFolders = Object.keys(folders).sort().reverse();
  var latestFolder  = sortedFolders[0] || '';
  var recent = realTrades.filter(function(t){return t.folder===latestFolder;}).sort(function(a,b){ var ta=a.timestamp||''; var tb=b.timestamp||''; return tb>ta?1:tb<ta?-1:b.id-a.id; });
  var recentRows = recent.map(function(t){return realBuildCard(t,'dash');}).join('');

  var sampleWarn = total < 100
    ? '<div style="border:1px solid var(--yellow);padding:12px 14px;margin-bottom:20px;font-size:15px;color:var(--yellow);line-height:1.4;"><strong>Mintaméret-figyelmeztetés:</strong> ' + total + ' kereskedés — legalább 100 szükséges.</div>'
    : '';

  el.innerHTML = '<div class="view-title">Dashboard</div>'
    + sampleWarn
    + '<div class="stat-grid">'
    + (function(){
        var wrCard = '<div class="wr-stat-card' + (_wrChartState.real.open ? ' open' : '') + '" onclick="wrChartToggle(\'real\')">'
          + '<div class="wr-stat-card-header">'
          + '<div class="stat-label" style="margin-bottom:8px;">Win Rate <span style="font-size:9px;color:var(--muted);">&#9660;</span></div>'
          + '<div class="stat-value ' + wrColor + '">' + wr + '%</div>'
          + '<div class="stat-sub"><span style="color:var(--win);">' + wins + 'W</span> / <span style="color:var(--be);">' + bes + 'BE</span> / <span style="color:var(--loss);">' + losses + 'L</span></div>'
          + '</div>'
          + '<div class="wr-stat-card-body' + (_wrChartState.real.open ? ' open' : '') + '">' + wrBuildChart('real', realTrades) + '</div>'
          + '</div>';
        var tcCard = '<div class="wr-stat-card' + (_tcChartState.real.open ? ' open' : '') + '" onclick="tcChartToggle(\'real\')">'
          + '<div class="wr-stat-card-header">'
          + '<div class="stat-label" style="margin-bottom:8px;">Összes trade <span style="font-size:9px;color:var(--muted);">&#9660;</span></div>'
          + '<div class="stat-value" style="color:' + totalColor + ';">' + total + '</div>'
          + '<div class="stat-sub" style="color:var(--muted);">' + folderCount + ' nap</div>'
          + '</div>'
          + '<div class="wr-stat-card-body' + (_tcChartState.real.open ? ' open' : '') + '">' + tcBuildChart('real', realTrades) + '</div>'
          + '</div>';
        var order = _openOrder.real; return (order.length > 0 && order[0] === 'tc') ? tcCard + wrCard : wrCard + tcCard;
      }())
  + '<div class="wr-stat-card' + (_avgChartState.real.open ? ' open' : '') + '" onclick="avgChartToggle(\'real\')">'  
  +   '<div class="wr-stat-card-header">'  
  +     '<div class="stat-label" style="margin-bottom:8px;">Napi átlag trade <span style="font-size:9px;color:var(--muted);">&#9660;</span></div>'  
  +     '<div class="stat-value" style="color:var(--muted);">' + avgPerDay + '</div>'  
  +     '<div class="stat-sub">Max: ' + maxDayTrades + ' / nap</div>'  
  +   '</div>'  
  +   '<div class="wr-stat-card-body' + (_avgChartState.real.open ? ' open' : '') + '">'  
  +     avgBuildChart('real', realTrades)  
  +   '</div>'  
  + '</div>'
      + ((maxWRDay||minWRDay) ? '<div class="stat-card">'
    + '<div class="stat-label" style="margin-bottom:10px;">Legjobb / Legrosszabb nap</div>'
    + (maxWRDay ? '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;cursor:pointer;" onclick="realDateFrom=\'' + maxWRDay.d + '\';realDateTo=\'' + maxWRDay.d + '\';realCurrentView=\'log\';realSwitchView(\'log\')">'  
      + '<span class="stat-label" style="color:var(--win);">&#9650; Legjobb</span><span style="color:var(--win);font-weight:900;font-size:20px;">' + maxWRDay.wr + '%</span><span class="stat-sub">' + maxWRDay.d + ' (' + maxWRDay.total + 'db)</span></div>' : '')
    + (minWRDay && minWRDay.d !== (maxWRDay ? maxWRDay.d : '') ? '<div style="display:flex;justify-content:space-between;align-items:baseline;cursor:pointer;" onclick="realDateFrom=\'' + minWRDay.d + '\';realDateTo=\'' + minWRDay.d + '\';realCurrentView=\'log\';realSwitchView(\'log\')">'  
      + '<span class="stat-label" style="color:var(--loss);">&#9660; Legrosszabb</span><span style="color:var(--loss);font-weight:900;font-size:20px;">' + minWRDay.wr + '%</span><span class="stat-sub">' + minWRDay.d + ' (' + minWRDay.total + 'db)</span></div>' : '')
    + '</div>' : '')
    + '</div>'
    + '<div class="wlb-bar-wrap"><div class="wlb-label-row">'
    +   '<span class="wlb-label" style="color:var(--win)">Win ' + winPct + '%</span>'
    +   '<span class="wlb-label" style="color:var(--be)">BE ' + bePct + '%</span>'
    +   '<span class="wlb-label" style="color:var(--loss)">Loss ' + lossPct + '%</span>'
    + '</div>'
    + '<table class="wlb-bar"><tr>'
    +   '<td class="wlb-seg win" style="width:' + winPct + '%"></td>'
    +   '<td class="wlb-seg be" style="width:' + bePct + '%"></td>'
    +   '<td class="wlb-seg loss" style="width:' + lossPct + '%"></td>'
    + '</tr></table></div>'
    + '<div class="section-hdr">Legutóbbi munkamenet: <span style="color:var(--accent)">' + latestFolder + '</span> (' + recent.length + ' trade) — <span style="color:var(--win)">' + recent.filter(function(t){return t.outcome==='win';}).length + 'W</span> <span style="color:var(--be)">' + recent.filter(function(t){return t.outcome==='be';}).length + 'BE</span> <span style="color:var(--loss)">' + recent.filter(function(t){return t.outcome==='loss';}).length + 'L</span> — <span style="color:' + (function(){var dwr=recent.length>0?Math.round(recent.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length/recent.length*100):0;return dwr>=55?'var(--win)':dwr>=45?'var(--yellow)':'var(--loss)';}()) + '">' + (recent.length > 0 ? Math.round(recent.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length/recent.length*100) : 0) + '%</span></div>'
    + recentRows;
}

function realEvoCompare() {
  if (!allTrades || allTrades.length === 0) return '';
  var evoWr   = Math.round(allTrades.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length / allTrades.length * 100);
  var evoCopied = allTrades.filter(function(t){return t.copiedToReal;}).length;
  var evoCovBase = realTrades.length > 0 ? realTrades.length : allTrades.length;
  var evoCovPct = evoCovBase > 0 ? Math.round(evoCopied / evoCovBase * 100) : 0;

  var linkedTrades = realTrades.filter(function(t){return !!t.linkedEvoId;});
  var realLinkedPct = realTrades.length > 0 ? Math.round(linkedTrades.length / realTrades.length * 100) : 0;
  var linkedWr = linkedTrades.length > 0
    ? Math.round(linkedTrades.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length / linkedTrades.length * 100)
    : null;

  var realWr  = realTrades.length > 0 ? Math.round(realTrades.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length / realTrades.length * 100) : 0;
  var diff    = realWr - evoWr;
  var diffCol = diff >= 0 ? 'var(--win)' : 'var(--loss)';
  var diffStr = (diff >= 0 ? '+' : '') + diff + '%';

  var html = '<div style="border:1px solid var(--border);padding:14px 16px;margin-bottom:20px;">'
    + '<div class="stat-label" style="margin-bottom:12px;">REAL vs EVO összehasonlítás</div>'
    + '<div style="display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px;">'
    +   '<div><div class="stat-label">EVO Win Rate</div><div style="font-size:28px;font-weight:900;color:var(--win);">' + evoWr + '%</div><div class="stat-sub">' + allTrades.length + ' trade</div></div>'
    +   (realTrades.length > 0
        ? '<div><div class="stat-label">REAL Win Rate</div><div style="font-size:28px;font-weight:900;color:var(--accent);">' + realWr + '%</div><div class="stat-sub">' + realTrades.length + ' trade</div></div>'
          + '<div><div class="stat-label">Különbség</div><div style="font-size:28px;font-weight:900;color:' + diffCol + ';">' + diffStr + '</div></div>'
        : '')
    + '</div>'
    + '<div style="border-top:1px solid var(--border);padding-top:10px;display:flex;gap:16px;flex-wrap:wrap;">'
    +   '<div><div class="stat-label">EVO lefedettség</div>'
    +     '<div style="font-size:22px;font-weight:900;color:' + (evoCovPct>=80?'var(--win)':evoCovPct>=50?'var(--yellow)':'var(--loss)') + ';">' + evoCovPct + '%</div>'
    +     '<div class="stat-sub">' + evoCopied + ' / ' + evoCovBase + ' REAL kötésből EVO-alapú</div>'
    +   '</div>'
    +   (linkedWr !== null
        ? '<div><div class="stat-label">EVO-alapú REAL WR</div>'
          +   '<div style="font-size:22px;font-weight:900;color:' + (linkedWr>=55?'var(--win)':linkedWr>=45?'var(--yellow)':'var(--loss)') + ';">' + linkedWr + '%</div>'
          +   '<div class="stat-sub">' + linkedTrades.length + ' EVO-alapú REAL kötés</div>'
          + '</div>'
        : '')
    + '</div>'
    + '</div>';
  return html;
}

// ── LOG TRADE ────────────────────────────────────────────────
// ── LOG TRADE (step-by-step) ────────────────────────────────
var realStep = 1; // current step 1-7
var REAL_TOTAL_STEPS = 7;

function realResetLogState() {
  realLogState = {
    outcome:null, folder:todayStr(),
    htf:[], vanHely:null, extra:[], kotesEllen:[],
    setup:[], wrongSetup:[], stf:0, image:null,
    imageContext:null, imageTrigger:null, imageStop:null,
    qualitySetup:[], zeroStop:false, bigWin:false
  };
  realStep = 1;
}

// Returns true if step is complete enough to allow Next
function realStepDone() {
  if (realStep === 1) return realLogState.htf.length > 0;
  if (realStep === 2) return realLogState.vanHely !== null;
  if (realStep === 3) return realLogState.extra.length > 0;
  if (realStep === 4) return true; // kotesEllen optional
  if (realStep === 5) return true; // setup optional
  if (realStep === 6) return true; // wrong setup optional
  if (realStep === 7) return realLogState.outcome !== null;
  return false;
}

function realGoStep(n) { realStep = n; realRenderLogTrade(); }
function realNextStep() { if (realStep < REAL_TOTAL_STEPS) { realStep++; realRenderLogTrade(); } }
function realPrevStep() { if (realStep > 1) { realStep--; realRenderLogTrade(); } }

function realLogChip(field, val) {
  var arr = realLogState[field]; if (!arr) return;
  // 'nincs' on htf field: selecting nincs clears others; selecting anything else clears nincs
  if (field === 'htf') {
    if (val === 'nincs') {
      var wasNincs = arr.indexOf('nincs') >= 0;
      realLogState.htf = wasNincs ? [] : ['nincs'];
      realRenderLogTrade(); return;
    } else {
      var nincsIdx = arr.indexOf('nincs');
      if (nincsIdx >= 0) arr.splice(nincsIdx, 1);
    }
  }
  var idx = arr.indexOf(val);
  if (idx >= 0) arr.splice(idx,1); else arr.push(val);
  realRenderLogTrade();
}
function realLogNincsExtra() {
  // Clicking nincs clears all other extra selections, leaving only nincs
  var wasSelected = realLogState.extra.indexOf('nincs') >= 0;
  realLogState.extra = wasSelected ? [] : ['nincs'];
  realRenderLogTrade();
}
function realToggleSetupBlock(blockId) {
  var key = '_setupOpen_' + blockId;
  realLogState[key] = !realLogState[key];
  realRenderLogTrade();
}
function realLogSetVanHely(v)  { realLogState.vanHely = v; realRenderLogTrade(); }
function realLogQualityToggle(v){
  var qs=realLogState.qualitySetup||[];
  var idx=qs.indexOf(v);
  if(idx>=0)qs.splice(idx,1);else qs.push(v);
  realLogState.qualitySetup=qs;
  realRenderLogTrade();
}
function realLogSetWrong(v)    { var ws=realLogState.wrongSetup; var idx=ws.indexOf(v); if(idx>=0)ws.splice(idx,1); else ws.push(v); realRenderLogTrade(); }
function realLogSetStf(s)      { realLogState.stf = (realLogState.stf === Number(s)) ? 0 : Number(s); realRenderLogTrade(); }
function realLogStfCustom(v)   {
  var n = parseInt(v,10);
  realLogState.stf = (!v||isNaN(n)||n<=0) ? 0 : n;
  var d = document.getElementById('real-stf-display'); if(d) d.textContent = realLogState.stf ? stfLabel(realLogState.stf) : '';
  document.querySelectorAll('#real-logtrade-content .stf-preset-btn').forEach(function(b){ b.className = 'stf-preset-btn' + (Number(b.getAttribute('data-secs'))===realLogState.stf?' stf-selected':''); });
}
function realLogToggleZeroStop() { realLogState.zeroStop = !realLogState.zeroStop; realRenderLogTrade(); }
function realLogToggleBigWin()   { realLogState.bigWin   = !realLogState.bigWin;   realRenderLogTrade(); }
function realLogSetOutcome(v)  {
  realLogState.outcome = realLogState.outcome === v ? null : v;
  if (realLogState.outcome !== 'loss') realLogState.zeroStop = false;
  if (realLogState.outcome !== 'win')  realLogState.bigWin   = false;
  realRenderLogTrade();
}
function realLogHandleImage(slot, input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      // Scale to max 1200px wide per slot
      var MAX = 1200, w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      var cv = document.createElement('canvas'); cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      realLogState[slot] = cv.toDataURL('image/jpeg', 0.80);
      realMergeImages();
      realRenderLogTrade();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function realMergeImages() {
  var slots = ['imageContext','imageTrigger','imageStop'];
  var srcs  = slots.map(function(k){ return realLogState[k] || null; });
  var present = srcs.filter(Boolean);
  if (present.length === 0) { realLogState.image = null; return; }
  if (present.length === 1) { realLogState.image = present[0]; return; }

  var imgs = present.map(function(){ return new Image(); });
  var loaded = 0;
  imgs.forEach(function(img, i) {
    img.onload = function() {
      loaded++;
      if (loaded < imgs.length) return;
      var GAP = 6;
      // Find the tallest image — all others scale up to match it
      var maxH = Math.max.apply(null, imgs.map(function(im){ return im.height; }));
      // Compute scaled widths: keep aspect ratio, scale height to maxH
      var scaledWidths = imgs.map(function(im) {
        return Math.round(im.width * (maxH / im.height));
      });
      var totalW = scaledWidths.reduce(function(s, w){ return s + w; }, 0) + GAP * (imgs.length - 1);
      var cv = document.createElement('canvas'); cv.width = totalW; cv.height = maxH;
      var c2 = cv.getContext('2d');
      c2.fillStyle = '#0a0a0c';
      c2.fillRect(0, 0, totalW, maxH);
      var x = 0;
      imgs.forEach(function(im, idx) {
        c2.drawImage(im, x, 0, scaledWidths[idx], maxH);
        x += scaledWidths[idx] + GAP;
      });
      realLogState.image = cv.toDataURL('image/jpeg', 0.80);
      var el = document.getElementById('real-merged-preview');
      if (el) el.src = realLogState.image;
    };
    img.src = present[i];
  });
}

function realLogRemoveImage(slot) {
  realLogState[slot] = null;
  realMergeImages();
  realRenderLogTrade();
}

function realChips(opts, selected, field, color) {
  color = color || 'var(--win)';
  return opts.map(function(o) {
    var sel = selected.indexOf(o) >= 0;
    var selStyle = sel ? 'border-color:' + color + ';color:' + color + ';background:rgba(0,0,0,0.12);' : '';
    return '<button onclick="realLogChip(\'' + field + '\',\'' + o.replace(/'/g,'&#39;') + '\')" class="option-btn' + (sel ? ' selected-green' : '') + '" style="' + selStyle + ';margin-bottom:0;">' + o + '</button>';
  }).join('');
}

function realRenderLogTrade() {
  var el = document.getElementById('real-logtrade-content');
  if (!el) return;
  if (!realLogState || realLogState.folder === undefined) realResetLogState();

  var step = realStep || 1;
  var STEPS = 7;
  var pct = Math.round(((step - 1) / STEPS) * 100);

  var progress = '<div style="height:2px;background:var(--border);width:100%;">'
    + '<div style="height:2px;background:var(--accent);width:' + pct + '%;transition:width 0.3s;"></div></div>';

  var backBtn = step > 1
    ? '<button onclick="realPrevStep()" style="background:transparent;border:1px solid var(--border);color:var(--muted);font-family:Space Mono,monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:5px 12px;cursor:pointer;">&#8592;</button>'
    : '<span></span>';
  var resetBtn = '<button onclick="realResetLogState();realRenderLogTrade();" style="background:transparent;border:1px solid var(--border);color:var(--muted);font-family:Space Mono,monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:5px 12px;cursor:pointer;">Reset</button>';
  var nav = '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;">'
    + '<span style="font-family:Space Mono,monospace;font-size:10px;color:var(--muted);letter-spacing:0.16em;">' + step + ' / ' + STEPS + '</span>'
    + '<div style="display:flex;gap:8px;">' + backBtn + resetBtn + '</div>'
    + '</div>';

  var body = '';

  if (step === 1) {
    // All items except 'nincs', then nincs separated below
    var htfBtns = REAL_HTF_OPTS.filter(function(o){return o!=='nincs';}).map(function(o) {
      var sel = realLogState.htf.indexOf(o) >= 0;
      return '<button onclick="realLogChip(\'htf\',\'' + o.replace(/'/g,'&#39;') + '\')" class="option-btn' + (sel?' selected-green':'') + '">' + o + '</button>';
    }).join('');
    var htfNincsSel = realLogState.htf.indexOf('nincs') >= 0;
    body = '<div class="screen-title">HTF POI</div>'
      + '<div class="btn-grid">' + htfBtns + '</div>'
      + '<hr class="divider">'
      + '<button onclick="realLogChip(\'htf\',\'nincs\')" class="semmi-btn' + (htfNincsSel?' selected-green':'') + '" style="' + (htfNincsSel?'border-color:var(--green);color:var(--green);':'') + '">nincs</button>'
      + (realLogState.htf.length > 0 ? '<button class="next-btn" onclick="realNextStep()" style="margin-top:20px;">Tovább</button>' : '');
  }

  else if (step === 2) {
    body = '<div class="screen-title">VAN HELY?</div>'
      + '<div class="yesno-grid">'
      + '<button class="yn-btn yes" onclick="realLogSetVanHely(\'igen\');realNextStep();">igen</button>'
      + '<button class="yn-btn no"  onclick="realLogSetVanHely(\'nem\');realNextStep();">nem</button>'
      + '</div>';
  }

  else if (step === 3) {
    var eBtns = REAL_EXTRA_OPTS.filter(function(o){return o!=='nincs';}).map(function(o) {
      var sel = realLogState.extra.indexOf(o) >= 0;
      return '<button onclick="realLogChip(\'extra\',\'' + o.replace(/'/g,'&#39;') + '\')" class="option-btn' + (sel?' selected-green':'') + '">' + o + '</button>';
    }).join('');
    var nSel = realLogState.extra.indexOf('nincs') >= 0;
    body = '<div class="screen-title">EXTRA TÁMOGATÓ KÖRÜLMÉNY</div>'
      + '<div class="btn-grid">' + eBtns + '</div><hr class="divider">'
      + '<button onclick="realLogNincsExtra()" class="semmi-btn' + (nSel?' selected-green':'') + '" style="' + (nSel?'border-color:var(--green);color:var(--green);':'') + '">nincs</button>'
      + (realLogState.extra.length > 0 ? '<button class="next-btn" onclick="realNextStep()" style="margin-top:20px;">Tovább</button>' : '');
  }

  else if (step === 4) {
    var dBtns = REAL_DANGER_OPTS.map(function(o) {
      var sel = realLogState.kotesEllen.indexOf(o) >= 0;

function realLogSave() {
  if (!realLogState.outcome) return;
  var folder = (document.getElementById('real-folder-input') ? document.getElementById('real-folder-input').value : realLogState.folder || todayStr()).trim();
  var entry = {
    id: Date.now(), folder: folder, timestamp: new Date().toISOString(),
    outcome: realLogState.outcome, vanHely: realLogState.vanHely,
    data: {
      'HTF POI':         realLogState.htf.join(', ') || '—',
      'Extra körülmény': realLogState.extra.join(', ') || '—',
      'Kötés ellen':     realLogState.kotesEllen.join(', ') || 'semmi'
    },
    setup:      realLogState.setup.length > 0 ? realLogState.setup : null,
    wrongSetup: realLogState.wrongSetup.length > 0 ? realLogState.wrongSetup.slice() : null,
    qualitySetup: realLogState.qualitySetup && realLogState.qualitySetup.length > 0 ? realLogState.qualitySetup.slice() : null,
    stf:        realLogState.stf > 0 ? realLogState.stf : null,
    image:      realLogState.image || null,
    zeroStop:   realLogState.zeroStop || undefined,
    bigWin:     realLogState.bigWin   || undefined
  };
  realTrades.push(entry);
  realSaveToStorage();
  ghAutoUpload('real', entry);
  showToast('Elmentve');
  realResetLogState();
  realRenderLogTrade();
}

// ── REAL ANALYSIS ─────────────────────────────────────────────────────────────
function realRenderAnalysis() {
  var el = document.getElementById('real-analysis-content');
  if (!el) return;
  if (realTrades.length === 0) { el.innerHTML = emptyState('&#9685;','Még nincs adat','Rögzíts kereskedéseket a Log Trade oldalon.'); return; }
  var fields = ['HTF POI','Extra körülmény','Kötés ellen'];
  var html = '<div class="view-title">Analízis</div>';
  fields.forEach(function(field) {
    var map = {};
    realTrades.forEach(function(t) {
      if (!t.data) return;
      (t.data[field]||'—').split(',').map(function(v){return v.trim();}).filter(Boolean).forEach(function(v) {
        if (!map[v]) map[v]={win:0,be:0,loss:0,total:0};
        map[v][t.outcome]++; map[v].total++;
      });
    });
    var entries = Object.entries(map).sort(function(a,b){return (b[1].win/b[1].total)-(a[1].win/a[1].total);});
    if (!entries.length) return;
    var rows = entries.map(function(e) {
      var val=e[0],s=e[1],wr=s.total>0?Math.round(s.win/s.total*100):0;
      var fc=wr>=55?'':'mid'; if(wr<40)fc='low';
      var flag=s.total<5?'<span style="color:var(--yellow);font-size:10px;"> !</span>':'';
      return '<div class="factor-row"><span class="factor-name" title="'+val+'">'+val+flag+'</span><div class="factor-bar-wrap"><div class="factor-bar-fill '+fc+'" style="width:'+wr+'%"></div></div><span class="factor-stat"><strong>'+wr+'%</strong> ('+s.win+'/'+s.total+')</span></div>';
    }).join('');
    html += '<div class="factor-block"><div class="factor-title">'+field+'</div>'+rows+'</div>';
  });
  var wm = {};
  realTrades.forEach(function(t) {
    var ws=t.wrongSetup; var wsArr=Array.isArray(ws)?(ws.length>0?ws:['nincs hiba']):(ws?[ws]:['nincs hiba']); wsArr.forEach(function(k){
    if(!wm[k])wm[k]={win:0,be:0,loss:0,total:0};
    wm[k][t.outcome]++; wm[k].total++;
    });
  });
  var wr2 = Object.entries(wm).sort(function(a,b){return b[1].total-a[1].total;}).map(function(e) {
    var val=e[0],s=e[1],wr=s.total>0?Math.round(s.win/s.total*100):0;
    var fc=wr>=55?'':'mid'; if(wr<40)fc='low';
    return '<div class="factor-row"><span class="factor-name">'+val+'</span><div class="factor-bar-wrap"><div class="factor-bar-fill '+fc+'" style="width:'+wr+'%"></div></div><span class="factor-stat"><strong>'+wr+'%</strong> ('+s.win+'/'+s.total+')</span></div>';
  }).join('');
  html += '<div class="factor-block"><div class="factor-title">Hibás setup típus</div>'+wr2+'</div>';
  var sm = {};
  realTrades.forEach(function(t) {
    if(!Array.isArray(t.setup))return;
    t.setup.forEach(function(s){if(!sm[s])sm[s]={win:0,be:0,loss:0,total:0};sm[s][t.outcome]++;sm[s].total++;});
  });
  var se = Object.entries(sm).sort(function(a,b){return (b[1].win/b[1].total)-(a[1].win/a[1].total);});
  if(se.length){
    var sr=se.map(function(e){var val=e[0],s=e[1],wr=s.total>0?Math.round(s.win/s.total*100):0;var fc=wr>=55?'':'mid';if(wr<40)fc='low';return '<div class="factor-row"><span class="factor-name">'+val+'</span><div class="factor-bar-wrap"><div class="factor-bar-fill '+fc+'" style="width:'+wr+'%"></div></div><span class="factor-stat"><strong>'+wr+'%</strong> ('+s.win+'/'+s.total+')</span></div>';}).join('');
    html+='<div class="factor-block"><div class="factor-title">Setup</div>'+sr+'</div>';
  }
  el.innerHTML = html;
}

// ── REAL LOG (table) ──────────────────────────────────────────────────────────
var realLogFilter     = 'all';
var realLinkedFilter  = false;
var realDateFrom      = '';
var realDateTo        = '';
var realHtfFilter     = [];
var realExtraFilter   = [];
var realAgainstFilter = [];
var realSetupFilter   = [];
var realExpandedCard  = null;

function realGetFiltered() {
  var f=realTrades.slice();
  if(realLogFilter!=='all')f=f.filter(function(t){return t.outcome===realLogFilter;});
  if(realDateFrom)f=f.filter(function(t){return(t.folder||'')>=realDateFrom;});
  if(realDateTo)f=f.filter(function(t){return(t.folder||'')<=realDateTo;});
  if(realDayPicks.length>0)f=f.filter(function(t){return realDayPicks.indexOf(t.folder)>=0;});
  if(realHtfFilter.length)f=f.filter(function(t){return realHtfFilter.some(function(x){return(t.data&&t.data['HTF POI']||'').split(', ').some(function(v){return v.trim()===x;});});});
  if(realExtraFilter.length)f=f.filter(function(t){return realExtraFilter.some(function(x){return(t.data&&t.data['Extra körülmény']||'').split(', ').some(function(v){return v.trim()===x;});});});
  if(realAgainstFilter.length)f=f.filter(function(t){return realAgainstFilter.some(function(x){return(t.data&&t.data['Kötés ellen']||'').split(', ').some(function(v){return v.trim()===x;});});});
  if(realSetupFilter.length)f=f.filter(function(t){return Array.isArray(t.setup)&&realSetupFilter.some(function(x){return t.setup.some(function(v){return v.trim()===x;});});});
  if(realQualityFilter.length)f=f.filter(function(t){return Array.isArray(t.qualitySetup)&&realQualityFilter.some(function(x){return t.qualitySetup.some(function(v){return v.trim()===x;});});});
  if(realWrongFilter.length)f=f.filter(function(t){return Array.isArray(t.wrongSetup)&&realWrongFilter.some(function(x){return t.wrongSetup.some(function(v){return v.trim()===x;});});});
  if(realStfFilter&&realStfFilter.length)f=f.filter(function(t){return realStfFilter.some(function(x){return t.stf&&stfLabel(t.stf)===x;});});
  if(realVanHelyFilter&&realVanHelyFilter.length)f=f.filter(function(t){return realVanHelyFilter.some(function(x){return (t.vanHely||'—')===x;});});
  if(realLinkedFilter)f=f.filter(function(t){return !!t.linkedEvoId;});
  if(_avgMaxDays)f=f.filter(function(t){return _avgMaxDays.indexOf(t.folder)>=0;});
  return f;
}
function realAnyFilter(){return realDateFrom||realDateTo||realDayPicks.length>0||realHtfFilter.length||realExtraFilter.length||realAgainstFilter.length||realSetupFilter.length||realQualityFilter.length||realWrongFilter.length||(realStfFilter&&realStfFilter.length)||(realVanHelyFilter&&realVanHelyFilter.length);}
function realSetFilter(f){realLogFilter=f;realExpandedCard=null;realRenderLog();}
function realSetDateFrom(v){_avgMaxDays=null;realDayPicks=[];realDateFrom=v;realExpandedCard=null;realRenderLog();}
function realSetDateTo(v){_avgMaxDays=null;realDayPicks=[];realDateTo=v;realExpandedCard=null;realRenderLog();}
function realSetFieldFilter(k,v){
  var maps={htf:realHtfFilter,extra:realExtraFilter,against:realAgainstFilter,setup:realSetupFilter,quality:realQualityFilter,wrong:realWrongFilter,stf:realStfFilter,vanhely:realVanHelyFilter};
  var arr=maps[k]; if(!arr){realExpandedCard=null;realRenderLog();return;}
  var idx=arr.indexOf(v);
  if(!v){arr.length=0;} else if(idx>=0){arr.splice(idx,1);} else{arr.push(v);}
  realExpandedCard=null;realRenderLog();}
function realToggleLinkedFilter(){realLinkedFilter=!realLinkedFilter;realExpandedCard=null;realRenderLog();}
function realClearAllFilters(){_avgMaxDays=null;realDayPicks=[];realDateFrom='';realDateTo='';realHtfFilter=[];realExtraFilter=[];realAgainstFilter=[];realSetupFilter=[];realQualityFilter=[];realWrongFilter=[];realStfFilter=[];realVanHelyFilter=[];realExpandedCard=null;realRenderLog();}

function realRenderLog() {
  var el=document.getElementById('real-log-content');
  if(!el)return;
  if(realTrades.length===0){el.innerHTML=emptyState('&#9685;','Még nincs adat','Rögzíts kereskedéseket a Log Trade oldalon.');return;}
  var filtered=realGetFiltered();
  var sorted=filtered.slice().sort(function(a,b){ var ta=a.timestamp||''; var tb=b.timestamp||''; return ta>tb?1:ta<tb?-1:a.id-b.id; });
  // Group by folder (session), newest session first
  var sessionMap={};
  sorted.forEach(function(t){ if(!sessionMap[t.folder])sessionMap[t.folder]=[]; sessionMap[t.folder].push(t); });
  var sessionKeys=Object.keys(sessionMap).sort().reverse();
  var cards=sessionKeys.map(function(folder){
    var trades=sessionMap[folder];
    var wins=trades.filter(function(t){return t.outcome==='win';}).length;
    var losses=trades.filter(function(t){return t.outcome==='loss';}).length;
    var bes=trades.filter(function(t){return t.outcome==='be';}).length;
    return '<div class="session-group">'
      +'<div class="session-group-header"><span class="session-group-date">'+folder+'</span>'
      +'<span class="session-group-stats"><span style="color:var(--win)">'+wins+'W</span> <span style="color:var(--be)">'+bes+'BE</span> <span style="color:var(--loss)">'+losses+'L</span>'
      +(function(){ var dwr=trades.length>0?Math.round((wins+bes)/trades.length*100):0; var col=dwr>=55?'var(--win)':dwr>=45?'var(--yellow)':'var(--loss)'; return ' <span style="color:'+col+';font-weight:700;">'+dwr+'%</span>'; }())
      +'</span></div>'
      +trades.map(function(t){return realBuildCard(t);}).join('')
      +'</div>';
  }).join('');
  var anyActive=realAnyFilter();
  var allCount=anyActive?sorted.length:realTrades.length;
  var clearBtn=anyActive?'<button class="date-clear-btn" onclick="realClearAllFilters()">&#10005; Összes szűrő törlése</button>':'';
  function mkOpts(opts){return '<option value="">— mind —</option>'+opts.map(function(o){return '<option value="'+o.replace(/"/g,'&quot;')+'">'+o+'</option>';}).join('');}
  var againstAll=REAL_DANGER_OPTS.concat(REAL_YELLOW_OPTS).concat(['semmi']);
  el.innerHTML = `
    <div class="view-title">Trade Log</div>
    <div class="log-filters">
      <button class="filter-btn ${realLogFilter==='all'?'active':''}" onclick="realSetFilter('all')">Összes (${allCount})</button>
      <button class="filter-btn ${realLogFilter==='win'?'active':''}" onclick="realSetFilter('win')">Win</button>
      <button class="filter-btn ${realLogFilter==='be'?'active':''}" onclick="realSetFilter('be')">BE</button>
      <button class="filter-btn ${realLogFilter==='loss'?'active':''}" onclick="realSetFilter('loss')">Loss</button>
    </div>
    <datalist id="real-session-dates">
