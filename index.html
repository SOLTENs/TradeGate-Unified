const EVO_AGAINST_OPTS = ["gyorsulás velünk szemben","P3","HTF ZÓNA","kései RSI cross","△ + kitörés után trendirányba","csúzli","csúzli behalása","C (3-wave)","MOC TF RSI ellen cross + <50/>50","trenddel szemben","Korrekciók méretének növekedése = ue","HTF ZÓNA","Range Breakout","semmi"];

function evoStartEdit(id, context) {

    expandedCard = id;
    expandedCardDash = null;
  }

    outcome: t.outcome,
    folder:  t.folder || '',
    htf:     (t.data['HTF POI'] || '').split(', ').filter(Boolean),
    extra:   (t.data['Extra körülmény'] || '').split(', ').filter(Boolean),
    against: (t.data['Kötés ellen'] || '').replace('—','').trim(),
    setup:   Array.isArray(t.setup) ? t.setup.slice() : [],

function evoImportFolder(input) {
  const files = Array.from(input.files).filter(f => f.name.endsWith('.json'));
  if (files.length === 0) {
    setImportStatus('Nem találhatók .json fájlok.', 'err');
    return;
  }

  let loaded = 0, skipped = 0, errors = 0;
  let pending = files.length;

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const entry = JSON.parse(e.target.result);
        // Accept single entry or array
        const entries = Array.isArray(entry) ? entry : [entry];
        entries.forEach(en => {
          if (en.id && en.outcome && en.data) {
            const exists = allTrades.some(t => t.id === en.id);
            if (!exists) { allTrades.push(en); loaded++; }
            else skipped++;
          } else { errors++; }
        });
      } catch(err) { errors++; }
      pending--;
      if (pending === 0) {
        evoSaveToStorage();
        evoRenderAll();
        const msg = `${loaded} új bejegyzés importálva` +
          (skipped  ? `, ${skipped} már létezett` : '') +
          (errors   ? `, ${errors} hiba` : '') + '.';
        setImportStatus(msg, loaded > 0 ? 'ok' : 'err');
        showToast(loaded > 0 ? `${loaded} bejegyzés importálva` : 'Nincs új adat', loaded > 0 ? false : true);
      }
    };
    reader.readAsText(file);
  });

  // Reset input so same folder can be re-imported
  input.value = '';
}

function evoSyncFromTradeGate() {
  let gateTrades = [];
  try { gateTrades = JSON.parse(localStorage.getItem(GATE_KEY) || '[]'); } catch(e) {}
  if (gateTrades.length === 0) {
    showToast('Nincs TradeGate adat', true);
    return;
  }
  let added = 0;
  gateTrades.forEach(t => {
    if (!allTrades.some(e => e.id === t.id)) {
      allTrades.push(t); added++;
    }
  });
  if (added > 0) { evoSaveToStorage(); evoRenderAll(); }
  showToast(added > 0 ? `${added} új bejegyzés szinkronizálva` : 'Nincs új adat', added === 0);
}

function evoExportAllJSON() {
  if (allTrades.length === 0) { showToast('Nincs exportálható adat', true); return; }
  const blob = new Blob([JSON.stringify(allTrades, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'tradegate_evo_export_' + todayStr() + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('Export letöltve');
}

function setImportStatus(msg, type) {
  const el = document.getElementById('import-status');
  if (!el) return;
  el.textContent = msg;
  el.className = 'import-status' + (type ? ' ' + type : '');
}

function gapSwitchView(name) {
  document.querySelectorAll('#pane-gap .view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('#pane-gap .nav-btn').forEach(function(b){ b.classList.remove('active'); });
  var vEl = document.getElementById('gap-view-' + name);
  var nEl = document.getElementById('gap-nav-' + name);
  if (vEl) vEl.classList.add('active');
  if (nEl) nEl.classList.add('active');
  gapRenderDashboard();
}

function gapRenderDashboard() {
  var el = document.getElementById('gap-dashboard-content');
  if (!el) return;

  var hasEvo  = allTrades  && allTrades.length  > 0;
  var hasReal = realTrades && realTrades.length > 0;

  if (!hasEvo && !hasReal) {
    el.innerHTML = emptyState('&#9671;', 'Nincs adat', 'Az EVO és REAL adatok betöltése után jelenik meg az összehasonlítás.');
    return;
  }

  // ── Win Rate comparison ───────────────────────────────────────────────────
  var evoWr  = hasEvo  ? Math.round(allTrades.filter(function(t){return t.outcome==='win';}).length  / allTrades.length  * 100) : null;
  var realWr = hasReal ? Math.round(realTrades.filter(function(t){return t.outcome==='win';}).length / realTrades.length * 100) : null;
  var diff   = (evoWr !== null && realWr !== null) ? realWr - evoWr : null;

  // ── EVO lefedettség: hány REAL kötés EVO-alapú ───────────────────────────
  var evoCopied  = hasEvo  ? allTrades.filter(function(t){return t.copiedToReal;}).length : 0;
  var covBase    = hasReal ? realTrades.length : (hasEvo ? allTrades.length : 1);
  var evoCovPct  = covBase > 0 ? Math.round(evoCopied / covBase * 100) : 0;

  // ── EVO-alapú REAL kötések WR ────────────────────────────────────────────
  var linkedTrades = hasReal ? realTrades.filter(function(t){return !!t.linkedEvoId;}) : [];
  var linkedWr     = linkedTrades.length > 0
    ? Math.round(linkedTrades.filter(function(t){return t.outcome==='win';}).length / linkedTrades.length * 100)
    : null;

  function wrColor(v) { return v === null ? 'var(--muted)' : v >= 55 ? 'var(--win)' : v >= 45 ? 'var(--yellow)' : 'var(--loss)'; }
  function diffColor(v) { return v === null ? 'var(--muted)' : (Math.abs(v) <= 10 ? 'var(--win)' : 'var(--text)'); }
  function diffStr(v)  { return v === null ? '—' : (v >= 0 ? '+' : '') + v + '%'; }

  var html = '<div class="view-title">GAP — EVO vs REAL</div>';

  // Win rate cards
  html += '<div class="stat-grid">'
    + '<div class="stat-card"><div class="stat-label">EVO Win Rate</div>'
    +   '<div class="stat-value" style="color:' + wrColor(evoWr) + ';">' + (evoWr !== null ? evoWr + '%' : '—') + '</div>'
    +   '<div class="stat-sub">' + (hasEvo ? allTrades.length + ' trade' : 'Nincs adat') + '</div></div>'
    + '<div class="stat-card"><div class="stat-label">REAL Win Rate</div>'
    +   '<div class="stat-value" style="color:' + wrColor(realWr) + ';">' + (realWr !== null ? realWr + '%' : '—') + '</div>'
    +   '<div class="stat-sub">' + (hasReal ? realTrades.length + ' trade' : 'Nincs adat') + '</div></div>'
    + '<div class="stat-card"><div class="stat-label">Különbség</div>'
    +   '<div class="stat-value" style="color:' + diffColor(diff) + ';">' + diffStr(diff) + '</div>'
    +   '<div class="stat-sub">REAL − EVO</div></div>'
    + '<div class="stat-card"><div class="stat-label">EVO lefedettség</div>'
    +   '<div class="stat-value" style="color:' + (evoCovPct>=80?'var(--win)':evoCovPct>=50?'var(--yellow)':'var(--loss)') + ';">' + evoCovPct + '%</div>'
    +   '<div class="stat-sub">' + evoCopied + ' / ' + covBase + ' REAL kötésből EVO-alapú</div></div>'
    + '</div>';

  // EVO-alapú REAL WR
  if (linkedWr !== null) {
    html += '<div style="border:1px solid var(--border);padding:14px 16px;margin-bottom:20px;">'
      + '<div class="stat-label" style="margin-bottom:10px;">EVO-alapú REAL kötések teljesítménye</div>'
      + '<div style="display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap;">'
      +   '<div><div class="stat-label">Win Rate</div><div style="font-size:32px;font-weight:900;color:' + wrColor(linkedWr) + ';">' + linkedWr + '%</div><div class="stat-sub">' + linkedTrades.length + ' EVO-alapú REAL kötés</div></div>'
      +   (evoWr !== null ? '<div><div class="stat-label">EVO Win Rate</div><div style="font-size:32px;font-weight:900;color:var(--win);">' + evoWr + '%</div><div class="stat-sub">referencia</div></div>' : '')
      +   (evoWr !== null ? '<div><div class="stat-label">Különbség</div><div style="font-size:32px;font-weight:900;color:' + diffColor(linkedWr-evoWr) + ';">' + diffStr(linkedWr-evoWr) + '</div><div class="stat-sub">EVO-alapú REAL − EVO</div></div>' : '')
      + '</div></div>';
  }

  el.innerHTML = html;
}

// ── EVO → REAL copy ───────────────────────────────────────────────────────────
function evoCopyToReal(id) {
  id = Number(id);
  var t = allTrades.find(function(e){ return Number(e.id) === id; });
  if (!t) return;

  // Build REAL entry from EVO data — outcome left null for user to fill in
  var entry = {
    id:           Date.now(),
    folder:       t.folder || todayStr(),
    timestamp:    new Date().toISOString(),
    outcome:      t.outcome,          // carry over EVO outcome as default
    vanHely:      'igen',
    data: {
      'HTF POI':         t.data ? (t.data['HTF POI'] || '—') : '—',
      'Extra körülmény': t.data ? (t.data['Extra körülmény'] || '—') : '—',
      'Kötés ellen':     t.data ? (t.data['Kötés ellen'] || 'semmi') : 'semmi'
    },
    setup:        Array.isArray(t.setup) ? t.setup.slice() : null,
    wrongSetup:   [],
    stf:          t.stf || null,
    image:        t.image || null,
    linkedEvoId:  id    // the link back to EVO
  };

  // Mark EVO entry as copied
  var idx = allTrades.findIndex(function(e){ return Number(e.id) === id; });
  if (idx >= 0) {
    allTrades[idx].copiedToReal = true;
    evoSaveToStorage();
    ghAutoUpload('evo', allTrades[idx]);
  }

  // Add to REAL
  realTrades.push(entry);
  realSaveToStorage();
  // Use evo config as fallback since it's the same token
  var uploadCfg = _ghConfig['real'] || _ghConfig['evo'] || GH_DEFAULT;
  if (uploadCfg.token) {
    var uploadPath = 'real/real_' + entry.folder + '_' + entry.id + '.json';
    var uploadUrl  = 'https://api.github.com/repos/' + uploadCfg.user + '/' + uploadCfg.repo + '/contents/' + uploadPath;
    var uploadHdrs = { 'Authorization': 'token ' + uploadCfg.token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
    var uploadBody = JSON.stringify(entry, null, 2);
    fetch(uploadUrl, { headers: uploadHdrs })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(existing) {
        var payload = { message: 'save ' + uploadPath, content: btoa(unescape(encodeURIComponent(uploadBody))) };
        if (existing && existing.sha) payload.sha = existing.sha;
        return fetch(uploadUrl, { method: 'PUT', headers: uploadHdrs, body: JSON.stringify(payload) });
      })
      .then(function(r) {
        if (r && r.ok) console.log('[evoCopyToReal] uploaded:', uploadPath);
        else console.error('[evoCopyToReal] upload failed:', r ? r.status : 'no response');
      })
      .catch(function(e) { console.error('[evoCopyToReal] upload error:', e); });
  }

  showToast('Átmásolva REAL-be');

  // Re-render current EVO view to show the checkmark
  evoRenderAll();
}

function realBoot() {
  idbLoadAll('real', function(cached) {
    realTrades = cached;
    realRenderAll();
    realUpdateSyncIndicator('Betöltés GitHub-ról...');
    ghLoadConfig('real', function(cfg) {
    if (!cfg.token) { realUpdateSyncIndicator('Add meg a GitHub tokent a Szinkron oldalon'); return; }
    var listUrl = 'https://api.github.com/repos/' + cfg.user + '/' + cfg.repo + '/contents/real';
    fetch(listUrl, { headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json' } })
      .then(function(r) {
        if (!r.ok) {
          realUpdateSyncIndicator('GitHub hiba: ' + r.status + ' ' + r.statusText);
          return null;
        }
        return r.json();
      })
      .then(function(items) {
        if (!items) return;
        if (!Array.isArray(items)) {
          realUpdateSyncIndicator('GitHub: váratlan válasz');
          return;
        }
        var files = items.filter(function(f) { return f.type === 'file' && f.name.endsWith('.json'); });
        if (!files.length) { realUpdateSyncIndicator('GitHub: 0 fájl a real mappában'); return; }
        realUpdateSyncIndicator('Letöltés: 0 / ' + files.length);
        var results = [], done = 0, total = files.length;
        files.forEach(function(f) {
          fetch('https://api.github.com/repos/' + cfg.user + '/' + cfg.repo + '/contents/real/' + f.name,
            { headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json' } })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
              if (data && data.content) {
                try {
                  var trade = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g,'')))));
                  if (trade && trade.id && (trade.outcome || trade.linkedEvoId)) results.push(trade);
                } catch(e) {}
              }
              done++;
              realUpdateSyncIndicator('Letöltés: ' + done + ' / ' + total);
              if (done === total) {
                if (results.length > 0) {
                  realTrades = results;
                  idbSaveAll('real', realTrades);
                  // Reconcile EVO copiedToReal flags now that REAL is fresh
                  if (reconcileCopiedToReal()) {
                    idbSaveAll('evo', allTrades);
                    evoRenderAll();
                  }
                  realRenderAll();
                }
                realUpdateSyncIndicator();
              }
            })
            .catch(function() { done++; if (done === total) { realUpdateSyncIndicator(); } });
        });
      })
      .catch(function(e) { realUpdateSyncIndicator('GitHub hálózati hiba'); });
    }); // end ghLoadConfig
  });
}

function realGoStep(n) { realStep = n; realRenderLogTrade(); }

function realLogChip(field, val) {
  var arr = realLogState[field]; if (!arr) return;
  // 'nincs' on htf field: selecting nincs clears others; selecting anything else clears nincs

    } else {
      var nincsIdx = arr.indexOf('nincs');
      if (nincsIdx >= 0) arr.splice(nincsIdx, 1);
    }
  }
  var idx = arr.indexOf(val);
  if (idx >= 0) arr.splice(idx,1); else arr.push(val);
  realRenderLogTrade();
}

function realLogHandleImage(slot, input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      // Scale to max 1200px wide per slot
      var MAX = 1200, w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      var cv = document.createElement('canvas'); cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      realLogState[slot] = cv.toDataURL('image/jpeg', 0.80);
      realMergeImages();
      realRenderLogTrade();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function realMergeImages() {
  var slots = ['imageContext','imageTrigger','imageStop'];
  var srcs  = slots.map(function(k){ return realLogState[k] || null; });
  var present = srcs.filter(Boolean);
  if (present.length === 0) { realLogState.image = null; return; }
  if (present.length === 1) { realLogState.image = present[0]; return; }

  var imgs = present.map(function(){ return new Image(); });
  var loaded = 0;
  imgs.forEach(function(img, i) {
    img.onload = function() {
      loaded++;
      if (loaded < imgs.length) return;
      var GAP = 6;
      // Find the tallest image — all others scale up to match it
      var maxH = Math.max.apply(null, imgs.map(function(im){ return im.height; }));
      // Compute scaled widths: keep aspect ratio, scale height to maxH
      var scaledWidths = imgs.map(function(im) {
        return Math.round(im.width * (maxH / im.height));
      });
      var totalW = scaledWidths.reduce(function(s, w){ return s + w; }, 0) + GAP * (imgs.length - 1);
      var cv = document.createElement('canvas'); cv.width = totalW; cv.height = maxH;
      var c2 = cv.getContext('2d');
      c2.fillStyle = '#0a0a0c';
      c2.fillRect(0, 0, totalW, maxH);
      var x = 0;
      imgs.forEach(function(im, idx) {
        c2.drawImage(im, x, 0, scaledWidths[idx], maxH);
        x += scaledWidths[idx] + GAP;
      });
      realLogState.image = cv.toDataURL('image/jpeg', 0.80);
      var el = document.getElementById('real-merged-preview');
      if (el) el.src = realLogState.image;
    };
    img.src = present[i];
  });
}

function realLogRemoveImage(slot) {
  realLogState[slot] = null;
  realMergeImages();
  realRenderLogTrade();
}

function realLogSave() {
  if (!realLogState.outcome) return;
  var folder = (document.getElementById('real-folder-input') ? document.getElementById('real-folder-input').value : realLogState.folder || todayStr()).trim();
  var entry = {
    id: Date.now(), folder: folder, timestamp: new Date().toISOString(),
    outcome: realLogState.outcome, vanHely: realLogState.vanHely,
    data: {
      'HTF POI':         realLogState.htf.join(', ') || '—',
      'Extra körülmény': realLogState.extra.join(', ') || '—',
      'Kötés ellen':     realLogState.kotesEllen.join(', ') || 'semmi'
    },
    setup:      realLogState.setup.length > 0 ? realLogState.setup : null,
    wrongSetup: realLogState.wrongSetup.length > 0 ? realLogState.wrongSetup.slice() : null,
    qualitySetup: realLogState.qualitySetup && realLogState.qualitySetup.length > 0 ? realLogState.qualitySetup.slice() : null,
    stf:        realLogState.stf > 0 ? realLogState.stf : null,
    image:      realLogState.image || null
  };
  realTrades.push(entry);
  realSaveToStorage();
  ghAutoUpload('real', entry);
  showToast('Elmentve');
  realResetLogState();
  realRenderLogTrade();
}

// ── REAL ANALYSIS ─────────────────────────────────────────────────────────────
function realRenderAnalysis() {
  var el = document.getElementById('real-analysis-content');
  if (!el) return;
  if (realTrades.length === 0) { el.innerHTML = emptyState('&#9685;','Még nincs adat','Rögzíts kereskedéseket a Log Trade oldalon.'); return; }
  var fields = ['HTF POI','Extra körülmény','Kötés ellen'];
  var html = '<div class="view-title">Analízis</div>';
  fields.forEach(function(field) {
    var map = {};
    realTrades.forEach(function(t) {
      if (!t.data) return;
      (t.data[field]||'—').split(',').map(function(v){return v.trim();}).filter(Boolean).forEach(function(v) {
        if (!map[v]) map[v]={win:0,be:0,loss:0,total:0};
        map[v][t.outcome]++; map[v].total++;
      });
    });
    var entries = Object.entries(map).sort(function(a,b){return (b[1].win/b[1].total)-(a[1].win/a[1].total);});
    if (!entries.length) return;
    var rows = entries.map(function(e) {
      var val=e[0],s=e[1],wr=s.total>0?Math.round(s.win/s.total*100):0;
      var fc=wr>=55?'':'mid'; if(wr<40)fc='low';
      var flag=s.total<5?'<span style="color:var(--yellow);font-size:10px;"> !</span>':'';
      return '<div class="factor-row"><span class="factor-name" title="'+val+'">'+val+flag+'</span><div class="factor-bar-wrap"><div class="factor-bar-fill '+fc+'" style="width:'+wr+'%"></div></div><span class="factor-stat"><strong>'+wr+'%</strong> ('+s.win+'/'+s.total+')</span></div>';
    }).join('');
    html += '<div class="factor-block"><div class="factor-title">'+field+'</div>'+rows+'</div>';
  });
  var wm = {};
  realTrades.forEach(function(t) {
    var ws=t.wrongSetup; var wsArr=Array.isArray(ws)?(ws.length>0?ws:['nincs hiba']):(ws?[ws]:['nincs hiba']); wsArr.forEach(function(k){
    if(!wm[k])wm[k]={win:0,be:0,loss:0,total:0};
    wm[k][t.outcome]++; wm[k].total++;
    });
  });
  var wr2 = Object.entries(wm).sort(function(a,b){return b[1].total-a[1].total;}).map(function(e) {
    var val=e[0],s=e[1],wr=s.total>0?Math.round(s.win/s.total*100):0;
    var fc=wr>=55?'':'mid'; if(wr<40)fc='low';
    return '<div class="factor-row"><span class="factor-name">'+val+'</span><div class="factor-bar-wrap"><div class="factor-bar-fill '+fc+'" style="width:'+wr+'%"></div></div><span class="factor-stat"><strong>'+wr+'%</strong> ('+s.win+'/'+s.total+')</span></div>';
  }).join('');
  html += '<div class="factor-block"><div class="factor-title">Hibás setup típus</div>'+wr2+'</div>';
  var sm = {};
  realTrades.forEach(function(t) {
    if(!Array.isArray(t.setup))return;
    t.setup.forEach(function(s){if(!sm[s])sm[s]={win:0,be:0,loss:0,total:0};sm[s][t.outcome]++;sm[s].total++;});
  });
  var se = Object.entries(sm).sort(function(a,b){return (b[1].win/b[1].total)-(a[1].win/a[1].total);});
  if(se.length){
    var sr=se.map(function(e){var val=e[0],s=e[1],wr=s.total>0?Math.round(s.win/s.total*100):0;var fc=wr>=55?'':'mid';if(wr<40)fc='low';return '<div class="factor-row"><span class="factor-name">'+val+'</span><div class="factor-bar-wrap"><div class="factor-bar-fill '+fc+'" style="width:'+wr+'%"></div></div><span class="factor-stat"><strong>'+wr+'%</strong> ('+s.win+'/'+s.total+')</span></div>';}).join('');
    html+='<div class="factor-block"><div class="factor-title">Setup</div>'+sr+'</div>';
  }
  el.innerHTML = html;
}

// ── REAL LOG (table) ──────────────────────────────────────────────────────────
var realLogFilter     = 'all';
var realLinkedFilter  = false;
var realDateFrom      = '';
var realDateTo        = '';
var realHtfFilter     = '';
var realExtraFilter   = '';
var realAgainstFilter = '';
var realSetupFilter   = '';
var realExpandedCard  = null;

function realGetFiltered() {
  var f=realTrades.slice();
  if(realLogFilter!=='all')f=f.filter(function(t){return t.outcome===realLogFilter;});
  if(realDateFrom)f=f.filter(function(t){return(t.folder||'')>=realDateFrom;});
  if(realDateTo)f=f.filter(function(t){return(t.folder||'')<=realDateTo;});
  if(realHtfFilter)f=f.filter(function(t){return t.data&&(t.data['HTF POI']||'').split(', ').some(function(v){return v.trim()===realHtfFilter;});});
  if(realExtraFilter)f=f.filter(function(t){return t.data&&(t.data['Extra körülmény']||'').split(', ').some(function(v){return v.trim()===realExtraFilter;});});
  if(realAgainstFilter)f=f.filter(function(t){return t.data&&(t.data['Kötés ellen']||'').split(', ').some(function(v){return v.trim()===realAgainstFilter;});});
  if(realSetupFilter)f=f.filter(function(t){return Array.isArray(t.setup)&&t.setup.some(function(v){return v.trim()===realSetupFilter;});});
  if(realLinkedFilter)f=f.filter(function(t){return !!t.linkedEvoId;});
  return f;
}
function realAnyFilter(){return realDateFrom||realDateTo||realHtfFilter||realExtraFilter||realAgainstFilter||realSetupFilter;}
function realSetFilter(f){realLogFilter=f;realExpandedCard=null;realRenderLog();}
function realSetDateFrom(v){realDateFrom=v;realExpandedCard=null;realRenderLog();}
function realSetDateTo(v){realDateTo=v;realExpandedCard=null;realRenderLog();}
function realSetFieldFilter(k,v){if(k==='htf')realHtfFilter=v;if(k==='extra')realExtraFilter=v;if(k==='against')realAgainstFilter=v;if(k==='setup')realSetupFilter=v;realExpandedCard=null;realRenderLog();}
function realToggleLinkedFilter(){realLinkedFilter=!realLinkedFilter;realExpandedCard=null;realRenderLog();}
function realClearAllFilters(){realDateFrom='';realDateTo='';realHtfFilter='';realExtraFilter='';realAgainstFilter='';realSetupFilter='';realExpandedCard=null;realRenderLog();}

function realRenderLog() {
  var el=document.getElementById('real-log-content');
  if(!el)return;
  if(realTrades.length===0){el.innerHTML=emptyState('&#9685;','Még nincs adat','Rögzíts kereskedéseket a Log Trade oldalon.');return;}
  var filtered=realGetFiltered();
  var sorted=filtered.slice().sort(function(a,b){ var ta=a.timestamp||''; var tb=b.timestamp||''; return ta>tb?1:ta<tb?-1:a.id-b.id; });
  // Group by folder (session), newest session first
  var sessionMap={};
  sorted.forEach(function(t){ if(!sessionMap[t.folder])sessionMap[t.folder]=[]; sessionMap[t.folder].push(t); });
  var sessionKeys=Object.keys(sessionMap).sort().reverse();
  var cards=sessionKeys.map(function(folder){
    var trades=sessionMap[folder];
    var wins=trades.filter(function(t){return t.outcome==='win';}).length;
    var losses=trades.filter(function(t){return t.outcome==='loss';}).length;
    var bes=trades.filter(function(t){return t.outcome==='be';}).length;
    return '<div class="session-group">'
      +'<div class="session-group-header"><span class="session-group-date">'+folder+'</span>'
      +'<span class="session-group-stats"><span style="color:var(--win)">'+wins+'W</span> <span style="color:var(--be)">'+bes+'BE</span> <span style="color:var(--loss)">'+losses+'L</span></span></div>'
      +trades.map(function(t){return realBuildCard(t);}).join('')
      +'</div>';
  }).join('');
  var anyActive=realAnyFilter();
  var allCount=anyActive?sorted.length:realTrades.length;
  var clearBtn=anyActive?'<button class="date-clear-btn" onclick="realClearAllFilters()">&#10005; Összes szűrő törlése</button>':'';
  function mkOpts(opts){return '<option value="">— mind —</option>'+opts.map(function(o){return '<option value="'+o.replace(/"/g,'&quot;')+'">'+o+'</option>';}).join('');}
  var againstAll=REAL_DANGER_OPTS.concat(REAL_YELLOW_OPTS).concat(['semmi']);
  el.innerHTML='<div class="view-title">Trade Log</div>'
    +'<div class="log-filters">'
    +'<button class="filter-btn '+(realLogFilter==='all'?'active':'')+'" onclick="realSetFilter(\'all\')">Összes ('+allCount+')</button>'
    +'<button class="filter-btn '+(realLogFilter==='win'?'active':'')+'" onclick="realSetFilter(\'win\')">Win</button>'
    +'<button class="filter-btn '+(realLogFilter==='be'?'active':'')+'" onclick="realSetFilter(\'be\')">BE</button>'
    +'<button class="filter-btn '+(realLogFilter==='loss'?'active':'')+'" onclick="realSetFilter(\'loss\')">Loss</button>'
    +'</div>'
    +'<datalist id="real-session-dates">'+Array.from(new Set(realTrades.map(function(t){return t.folder;}).filter(Boolean))).sort().map(function(d){return '<option value="'+d+'">';}).join('')+'</datalist>'
    +'<div class="date-filter-row"><span class="date-filter-lbl">Dátum:</span>'

// ── REAL IMPORT / EXPORT ──────────────────────────────────────────────────────
function realImportFolder(input){
  var files=Array.from(input.files).filter(function(f){return f.name.endsWith('.json');});
  if(!files.length){var s=document.getElementById('real-import-status');if(s)s.textContent='Nem találhatók .json fájlok.';return;}
  var loaded=0,skipped=0,errors=0,pending=files.length;
  files.forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var entry=JSON.parse(e.target.result);
        var entries=Array.isArray(entry)?entry:[entry];
        entries.forEach(function(en){
          if(en.id&&(en.outcome||en.linkedEvoId)){if(!realTrades.some(function(t){return t.id===en.id;})){realTrades.push(en);loaded++;}else skipped++;}else errors++;
        });
      }catch(err){errors++;}
      if(--pending===0){
        realSaveToStorage();realRenderAll();
        var msg=loaded+' új bejegyzés importálva'+(skipped?', '+skipped+' már létezett':'')+(errors?', '+errors+' hiba':'')+'.';
        var s=document.getElementById('real-import-status');if(s)s.textContent=msg;
        showToast(loaded>0?loaded+' bejegyzés importálva':'Nincs új adat',loaded===0);
      }
    };
    reader.readAsText(file);
  });
  input.value='';
}
function realExportAllJSON(){
  if(!realTrades.length){showToast('Nincs exportálható adat',true);return;}
  var blob=new Blob([JSON.stringify(realTrades,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='tradegate_real_export_'+todayStr()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
  showToast('Export letöltve');
}

// ── ANALYSIS ──────────────────────────────────────────────────────────────────
function evoRenderAnalysis() {
  const el = document.getElementById('analysis-content');
  if (allTrades.length === 0) {
    el.innerHTML = emptyState('&#9685;', 'Még nincs adat', 'Importálj kereskedéseket a Szinkron fülön.');
    return;
  }

  const fields = ['HTF POI', 'Extra körülmény', 'Kötés ellen'];
  let html = '<div class="view-title">Analízis</div>';

  // Per-outcome breakdown toggle
  fields.forEach(field => {
    // Collect individual values (comma-separated → split)
    const map = {}; // value → { win, be, loss, total }
    allTrades.forEach(t => {
      const raw = t.data[field] || '—';
      const vals = raw.split(',').map(v => v.trim()).filter(Boolean);
      vals.forEach(v => {
        if (!map[v]) map[v] = { win:0, be:0, loss:0, total:0 };
        map[v][t.outcome]++;
        map[v].total++;
      });
    });

    const entries = Object.entries(map).sort((a,b) => {
      const wrA = a[1].win / a[1].total;
      const wrB = b[1].win / b[1].total;
      return wrB - wrA;
    });

    if (entries.length === 0) return;

    const rows = entries.map(([val, stats]) => {
      const wr = stats.total > 0 ? Math.round(stats.win / stats.total * 100) : 0;
      const fillClass = wr >= 55 ? '' : wr >= 40 ? 'mid' : 'low';
      const sampleFlag = stats.total < 5
        ? `<span style="color:var(--yellow);font-size:10px;" title="Kevés adat (${stats.total})"> !</span>` : '';
      return `<div class="factor-row">
        <span class="factor-name" title="${val}">${val}${sampleFlag}</span>
        <div class="factor-bar-wrap">
          <div class="factor-bar-fill ${fillClass}" style="width:${wr}%"></div>
        </div>
        <span class="factor-stat"><strong>${wr}%</strong> (${stats.win}/${stats.total})</span>
      </div>`;
    }).join('');

    html += `<div class="factor-block">
      <div class="factor-title">${field}</div>
      ${rows}
    </div>`;
  });

  // Combination analysis: HTF POI × Kötés ellen
  const comboMap = {};
  allTrades.forEach(t => {
    const htfs = (t.data['HTF POI'] || '—').split(',').map(v=>v.trim());
    const ke   = t.data['Kötés ellen'] || '—';
    htfs.forEach(htf => {
      const key = htf + ' + ' + ke;
      if (!comboMap[key]) comboMap[key] = { win:0, be:0, loss:0, total:0 };
      comboMap[key][t.outcome]++;
      comboMap[key].total++;
    });
  });

  const combos = Object.entries(comboMap)
    .filter(([,s]) => s.total >= 3)
    .sort((a,b) => (b[1].win/b[1].total) - (a[1].win/a[1].total))
    .slice(0, 10);

  if (combos.length > 0) {
    const comboRows = combos.map(([key, stats]) => {
      const wr = Math.round(stats.win / stats.total * 100);
      const fillClass = wr >= 55 ? '' : wr >= 40 ? 'mid' : 'low';
      return `<div class="factor-row">
        <span class="factor-name" title="${key}" style="font-size:13px;">${key}</span>
        <div class="factor-bar-wrap">
          <div class="factor-bar-fill ${fillClass}" style="width:${wr}%"></div>
        </div>
        <span class="factor-stat"><strong>${wr}%</strong> (${stats.win}/${stats.total})</span>
      </div>`;
    }).join('');

    html += `<div class="factor-block">
      <div class="factor-title">HTF POI × Kötés ellen (min. 3 minta)</div>
      ${comboRows}
    </div>`;
  }

  el.innerHTML = html;
}

// ── TRADE LOG ─────────────────────────────────────────────────────────────────
// ── SHARED CARD BUILDER ───────────────────────────────────────────────────────
function evoBuildCard(t, context) {
  const ctx    = (context === 'dash') ? 'dash' : 'log';
  const htf    = t.data['HTF POI'] || '—';
  const d      = new Date(t.timestamp);
  const ds     = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const time   = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  const tid    = Number(t.id);
  const openId = ctx === 'dash' ? expandedCardDash : expandedCard;
  const isOpen = openId === tid;
  const toggleFn = ctx === 'dash' ? 'evoDashToggle(' + tid + ')' : 'evoToggleCard(' + tid + ')';

  const detailRows = Object.entries(t.data).map(function(entry) {
    return '<div class="trade-detail-row"><span class="trade-detail-key">' + entry[0] + '</span><span class="trade-detail-val">' + entry[1] + '</span></div>';
  }).join('') + (t.setup && t.setup.length > 0
    ? '<div class="trade-detail-row"><span class="trade-detail-key">Setup</span><span class="trade-detail-val">' + t.setup.join(', ') + '</span></div>'
    : '')
  + (t.stf ? '<div class="trade-detail-row"><span class="trade-detail-key">STF</span><span class="trade-detail-val">' + stfLabel(t.stf) + '</span></div>' : '')
  + (t.qualitySetup && t.qualitySetup.length > 0 ? '<div class="trade-detail-row"><span class="trade-detail-key">Minőségi</span><span class="trade-detail-val" style="color:var(--win);"><span class="aplus-badge">A+</span> ' + t.qualitySetup.join(', ') + '</span></div>' : '');

  const snapshotHtml = (t.image && isOpen)
    ? '<img class="trade-snapshot" src="' + t.image + '" alt="snapshot" onclick="event.stopPropagation();openLightbox(' + tid + ')" />'
    : '';

  const camIcon = t.image ? '<span style="color:var(--muted);font-size:13px;" title="Snapshot csatolva">&#128247;</span>' : '';

  return '<div class="trade-card">'
    + '<div class="trade-card-header" onclick="' + toggleFn + '">'
    +   '<div class="trade-card-left">'
    +     '<span class="outcome-dot ' + t.outcome + '"></span>'
    +     '<span class="trade-card-date">' + ds + ' ' + time + '</span>'
    +     '<span class="trade-card-htf">' + htf + '</span>'
    +   '</div>'
    +   '<div style="display:flex;align-items:center;gap:6px;">'
    +     camIcon
    +     (t.qualitySetup && t.qualitySetup.length > 0 ? '<span class="aplus-badge" style="margin-right:4px;">A+</span>' : '')
    +     '<span class="outcome-badge ' + t.outcome + '">' + outcomeLabel(t.outcome) + '</span>'
    +   '</div>'
    + '</div>'
    + '<div class="trade-card-body' + (isOpen ? ' open' : '') + '" id="card-body-' + tid + '">'
    +   (editingCard === tid
        ? '<div id="edit-card-container"></div>'
        : '<div style="margin-bottom:10px;font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);letter-spacing:0.1em;">MAPPA: ' + t.folder + '</div>'
          + snapshotHtml
          + detailRows
          + '<div class="trade-card-footer">'
          +   '<button class="edit-btn" onclick="event.stopPropagation();evoStartEdit(' + tid + ',\'' + ctx + '\')">Szerkesztés</button>'
          +   '<button class="delete-btn" onclick="evoConfirmDeleteTrade(' + tid + ')">Törlés</button>'
          +   (t.copiedToReal ? '<span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--win);color:#0a0a0c;font-family:Space Mono,monospace;font-size:9px;font-weight:700;cursor:pointer;flex-shrink:0;" title="Már REAL-ben is el van mentve — kattints az újramásoláshoz" onclick=\"event.stopPropagation();evoCopyToReal(' + tid + ')\" >R</span>' : '<button class="copy-real-btn" onclick="event.stopPropagation();evoCopyToReal(' + tid + ')">→ REAL</button>')
          + '</div>')
    + '</div>'
    + '</div>';
}

function evoDashToggle(id) {
  id = Number(id);
  expandedCardDash = (expandedCardDash === id) ? null : id;
  evoRenderDashboard();
}

function evoGetFiltered() {
  let f = allTrades.slice();
  if (logFilter !== 'all') f = f.filter(t => t.outcome === logFilter);
  if (logDateFrom) f = f.filter(t => (t.folder || '') >= logDateFrom);
  if (logDateTo)   f = f.filter(t => (t.folder || '') <= logDateTo);
  if (logHtfFilter)     f = f.filter(t => (t.data['HTF POI'] || '').split(', ').some(v => v.trim() === logHtfFilter));
  if (logExtraFilter)   f = f.filter(t => (t.data['Extra körülmény'] || '').split(', ').some(v => v.trim() === logExtraFilter));
  if (logAgainstFilter) f = f.filter(t => (t.data['Kötés ellen'] || '').split(', ').some(v => v.trim() === logAgainstFilter));
  if (logSetupFilter)   f = f.filter(t => Array.isArray(t.setup) && t.setup.some(v => v.trim() === logSetupFilter));
  if (logStfFilter)     f = f.filter(t => t.stf && stfLabel(t.stf) === logStfFilter);
  return f;
}

function evoAnyFilterActive() {
  return logDateFrom || logDateTo || logHtfFilter || logExtraFilter || logAgainstFilter || logSetupFilter;
}

function evoClearAllFilters() {
  logDateFrom = ''; logDateTo = '';
  logHtfFilter = ''; logExtraFilter = ''; logAgainstFilter = ''; logSetupFilter = ''; logStfFilter = '';
  expandedCard = null;
  evoRenderLog();
}

function evoRenderLog() {
  const el = document.getElementById('log-content');
  if (allTrades.length === 0) {
    el.innerHTML = emptyState('&#9685;', 'Még nincs adat', 'Importálj kereskedéseket a Szinkron fülön.');
    return;
  }

  const filtered = evoGetFiltered();
  const sorted = [...filtered].sort((a,b) => { var ta = a.timestamp||''; var tb = b.timestamp||''; return ta > tb ? 1 : ta < tb ? -1 : a.id - b.id; });
  // Group by folder (session), newest session first
  const sessionMap = {};
  sorted.forEach(t => { if (!sessionMap[t.folder]) sessionMap[t.folder] = []; sessionMap[t.folder].push(t); });
  const sessionKeys = Object.keys(sessionMap).sort().reverse();
  const cards = sessionKeys.map(folder => {
    const trades = sessionMap[folder];
    const wins = trades.filter(t=>t.outcome==='win').length;
    const losses = trades.filter(t=>t.outcome==='loss').length;
    const bes = trades.filter(t=>t.outcome==='be').length;
    return '<div class="session-group">'
      + '<div class="session-group-header"><span class="session-group-date">' + folder + '</span>'
      + '<span class="session-group-stats"><span style="color:var(--win)">' + wins + 'W</span> <span style="color:var(--be)">' + bes + 'BE</span> <span style="color:var(--loss)">' + losses + 'L</span></span></div>'
      + trades.map(t => evoBuildCard(t)).join('')
      + '</div>';
  }).join('');

  const anyActive = evoAnyFilterActive();
  const allCount = anyActive ? sorted.length : allTrades.length;
  const clearBtn = anyActive
    ? `<button class="date-clear-btn" onclick="evoClearAllFilters()">&#10005; Összes szűrő törlése</button>`
    : '';

  const htfOpts    = `<option value="">— mind —</option><option value="kis-k zóna">kis-k zóna</option><option value="momentum kiindulási zóna">momentum kiindulási zóna</option><option value="nyitó zóna">nyitó zóna</option><option value="flip zóna">flip zóna</option><option value="anti-zóna">anti-zóna</option><option value="likviditás söprés">likviditás söprés</option><option value="iv">iv</option><option value="iv letörés">iv letörés</option><option value="STF K törés">STF K törés</option><option value="HTF setup">HTF setup</option><option value="MOC">MOC</option><option value="W MOC">W MOC</option>`;
  const extraOpts  = `<option value="">— mind —</option><option value="csúzli">csúzli</option><option value="csúzli behalása">csúzli behalása</option><option value="gyoruslás">gyoruslás</option><option value="P3">P3</option><option value="kontra setup behalása">kontra setup behalása</option><option value="1. trendpárna meggyűrés">1. trendpárna meggyűrés</option><option value="Polaritás váltás">Polaritás váltás</option><option value="Choch">Choch</option><option value="kis-k törés">kis-k törés</option><option value="BOF">BOF</option><option value="STF K törés">STF K törés</option><option value="△ + kitörés után kontra">△ + kitörés után kontra</option><option value="nincs">nincs</option>`;
  const againstOpts= `<option value="">— mind —</option><option value="gyorsulás velünk szemben">gyorsulás velünk szemben</option><option value="P3">P3</option><option value="HTF ZÓNA">HTF ZÓNA</option><option value="kései RSI cross">kései RSI cross</option><option value="△ + kitörés után trendirányba">△ + kitörés után trendirányba</option><option value="csúzli">csúzli</option><option value="csúzli behalása">csúzli behalása</option><option value="C (3-wave)">C (3-wave)</option><option value="MOC TF RSI ellen cross + &lt;50/&gt;50">MOC TF RSI ellen cross + &lt;50/&gt;50</option><option value="trenddel szemben">trenddel szemben</option><option value="Korrekciók méretének növekedése = ue">Korrekciók méretének növekedése = ue</option><option value="HTF ZÓNA">HTF ZÓNA</option><option value="Range Breakout">Range Breakout</option><option value="semmi">semmi</option>`;
  const stfOpts    = '<option value="">— mind —</option>' + STF_PRESETS.map(function(s) { return '<option value="' + stfLabel(s) + '">' + stfLabel(s) + '</option>'; }).join('');
  const setupOpts  = `<option value="">— mind —</option><option value="1-2">1-2</option><option value="W5">W5</option><option value="K2k">K2k</option><option value="DKk">DKk</option><option value="C">C</option><option value="MOC">MOC</option><option value="W MOC">W MOC</option><option value="Öreg trendpárna meggyűrődés + BOF">Öreg trendpárna meggyűrődés + BOF</option><option value="Korai gyűrődés + Kk + (C1 cross + k)">Korai gyűrődés + Kk + (C1 cross + k)</option><option value="RUNNING FLAT">RUNNING FLAT</option><option value="I-AVGH">I-AVGH</option><option value="FLAT-C">FLAT-C</option><option value="NPKP">NPKP</option><option value="NPNP">NPNP</option><option value="Dk">Dk</option><option value="k2'">k2'</option><option value="sdiv">sdiv</option><option value="ss+">ss+</option>`;

  el.innerHTML = `
    <div class="view-title">Trade Log</div>
    <div class="log-filters">
      <button class="filter-btn ${logFilter==='all'  ? 'active':''}" onclick="evoSetFilter('all')">Összes (${allCount})</button>
      <button class="filter-btn ${logFilter==='win'  ? 'active':''}" onclick="evoSetFilter('win')">Win</button>
      <button class="filter-btn ${logFilter==='be'   ? 'active':''}" onclick="evoSetFilter('be')">BE</button>
      <button class="filter-btn ${logFilter==='loss' ? 'active':''}" onclick="evoSetFilter('loss')">Loss</button>
    </div>
    <datalist id="session-dates">
      ${[...new Set(allTrades.map(t => t.folder).filter(Boolean))].sort().map(d => `<option value="${d}">`).join('')}
    </datalist>
    <div class="date-filter-row">
      <span class="date-filter-lbl">Dátum:</span>
      <input class="date-filter-input" type="date" id="date-from-input"
        list="session-dates"
        value="${logDateFrom}" onchange="evoSetDateFrom(this.value)" />
      <span class="date-filter-lbl">—</span>
      <input class="date-filter-input" type="date" id="date-to-input"
        list="session-dates"
        value="${logDateTo}" onchange="evoSetDateTo(this.value)" />
    </div>
    <div class="field-filters">
      <div class="field-filter-row">
        <span class="field-filter-lbl">HTF POI</span>
        <select class="field-filter-select ${logHtfFilter ? 'active' : ''}"
          onchange="evoSetFieldFilter('htf', this.value)">${htfOpts}</select>
      </div>
      <div class="field-filter-row">
        <span class="field-filter-lbl">Extra</span>
        <select class="field-filter-select ${logExtraFilter ? 'active' : ''}"
          onchange="evoSetFieldFilter('extra', this.value)">${extraOpts}</select>
      </div>
      <div class="field-filter-row">
        <span class="field-filter-lbl">Ellene szól</span>
        <select class="field-filter-select ${logAgainstFilter ? 'active' : ''}"
          onchange="evoSetFieldFilter('against', this.value)">${againstOpts}</select>
      </div>
      <div class="field-filter-row">
        <span class="field-filter-lbl">Setup</span>
        <select class="field-filter-select ${logSetupFilter ? 'active' : ''}"
          onchange="evoSetFieldFilter('setup', this.value)">${setupOpts}</select>
      </div>
      <div class="field-filter-row">
        <span class="field-filter-lbl">STF</span>
        <select class="field-filter-select ${logStfFilter ? 'active' : ''}"
          onchange="evoSetFieldFilter('stf', this.value)">${stfOpts}</select>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div class="log-count">${sorted.length} bejegyzés${anyActive ? ' (szűrve)' : ''}</div>
      ${clearBtn}
    </div>
    ${cards || '<div style="color:var(--muted);font-size:15px;padding:20px 0;">Nincs a szűrőnek megfelelő bejegyzés.</div>'}`;

  // Restore select values (innerHTML rebuild resets them)
  const sf = document.getElementById('date-from-input');
  const st = document.getElementById('date-to-input');
  if (sf) sf.value = logDateFrom;
  if (st) st.value = logDateTo;
  document.querySelectorAll('.field-filter-select').forEach(function(sel) {
    const key = sel.getAttribute('onchange');
    if (key.includes("'htf'"))     sel.value = logHtfFilter;
    if (key.includes("'extra'"))   sel.value = logExtraFilter;
    if (key.includes("'against'")) sel.value = logAgainstFilter;
    if (key.includes("'setup'"))   sel.value = logSetupFilter;
  });
}

function evoSetFilter(f) {
  logFilter = f;
  expandedCard = null;
  evoRenderLog();
}

function evoSetDateFrom(val) {
  logDateFrom = val;
  expandedCard = null;
  evoRenderLog();
}

function evoSetDateTo(val) {
  logDateTo = val;
  expandedCard = null;
  evoRenderLog();
}

function evoClearDateFilter() {
  logDateFrom = '';
  logDateTo   = '';
  expandedCard = null;
  evoRenderLog();
}

function evoSetFieldFilter(field, val) {
  if (field === 'htf')     logHtfFilter = val;
  if (field === 'extra')   logExtraFilter = val;
  if (field === 'against') logAgainstFilter = val;
  if (field === 'setup')   logSetupFilter = val;
  if (field === 'stf')     logStfFilter   = val;
  expandedCard = null;
  evoRenderLog();
}


// ── EDIT MODE ────────────────────────────────────────────────────────────────


function evoStartEdit(id, context) {
  id = Number(id);
  const t = allTrades.find(e => Number(e.id) === id);
  if (!t) return;
  const fromDash = (context === 'dash');
  editingCard = id;
  if (fromDash) {
    expandedCardDash = id;
    expandedCard = null;
  } else {
    expandedCard = id;
    expandedCardDash = null;
  }
  editState = {
    outcome: t.outcome,
    folder:  t.folder || '',
    htf:     (t.data['HTF POI'] || '').split(', ').filter(Boolean),
    extra:   (t.data['Extra körülmény'] || '').split(', ').filter(Boolean),
    against: (t.data['Kötés ellen'] || '').replace('—','').trim(),
    setup:   Array.isArray(t.setup) ? t.setup.slice() : [],
    stf:     t.stf || 0
  };
  if (fromDash) {
    if (currentView !== 'dashboard') evoSwitchView('dashboard');
    else evoRenderDashboard();
  } else {
    if (currentView !== 'log') evoSwitchView('log');
    else evoRenderLog();
  }
  function tryFill() {
    const cont = document.getElementById('edit-card-container');
    if (cont) { renderEditCard(); }
    else { setTimeout(tryFill, 30); }
  }
  setTimeout(tryFill, 0);
}

function renderEditCard() {
  const cont = document.getElementById('edit-card-container');
  if (!cont) { setTimeout(renderEditCard, 50); return; }

  // Outcome buttons
  const outcomes = [
    {v:'win', l:'Win', c:'var(--win)'},
    {v:'be',  l:'BE',  c:'var(--be)'},
    {v:'loss',l:'Loss',c:'var(--loss)'}
  ];
  let outcomeHtml = '<div style="display:flex;gap:8px;margin-bottom:4px;">';
  outcomes.forEach(function(o) {
    const active = editState.outcome === o.v;
    outcomeHtml += '<button onclick="evoEditOutcome(\'' + o.v + '\')" style="'
      + 'flex:1;padding:11px 6px;border:1px solid ' + (active ? o.c : 'var(--border)') + ';'
      + 'background:' + (active ? 'rgba(0,0,0,0.15)' : 'var(--surface)') + ';'
      + 'color:' + (active ? o.c : 'var(--muted)') + ';'
      + 'font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:700;'
      + 'letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:0;">'
      + o.l + '</button>';
  });
  outcomeHtml += '</div>';

  // Chip builder
  function chips(opts, selected, field) {
    return opts.map(function(o) {
      const sel = selected.indexOf(o) >= 0;
      return '<button onclick="evoEditChip(\'' + field + '\',\'' + o.replace(/'/g, '&#39;') + '\')" class="edit-chip' + (sel ? ' selected' : '') + '">' + o + '</button>';
    }).join('');
  }

  // Against select
  let againstSelect = '<select class="edit-select" onchange="evoEditAgainst(this.value)">'
    + '<option value="">—</option>'
    + EVO_AGAINST_OPTS.map(function(o) {
        return '<option value="' + o + '"' + (editState.against === o ? ' selected' : '') + '>' + o + '</option>';
      }).join('')
    + '</select>';

  cont.innerHTML =
    '<div class="edit-body">'
    + '<div class="edit-field"><span class="edit-field-label">Eredmény</span>' + outcomeHtml + '</div>'
    + '<div class="edit-field"><span class="edit-field-label">HTF POI</span><div class="edit-chips">' + chips(EVO_HTF_OPTS, editState.htf, 'htf') + '</div></div>'
    + '<div class="edit-field"><span class="edit-field-label">Extra körülmény</span><div class="edit-chips">' + chips(EVO_EXTRA_OPTS, editState.extra, 'extra') + '</div></div>'
    + '<div class="edit-field"><span class="edit-field-label">Kötés ellen</span>' + againstSelect + '</div>'
    + '<div class="edit-field"><span class="edit-field-label">Setup</span><div class="edit-chips">' + chips(EVO_SETUP_OPTS, editState.setup, 'setup') + '</div></div>'
    + '<div class="edit-field"><span class="edit-field-label">STF – Setup Time Frame</span>'
    + '<div class="stf-presets">' + STF_PRESETS.map(function(s) { var sel = editState.stf === s; return '<button onclick="evoEditStf(' + s + ')" class="stf-preset-btn' + (sel ? ' stf-selected' : '') + '" data-secs="' + s + '">' + stfLabel(s) + '</button>'; }).join('') + '</div>'
    + '<div class="stf-custom-row"><span class="stf-custom-lbl">Egyéni (s):</span><input class="stf-custom-input" type="number" min="1" max="3600" value="' + (editState.stf || '') + '" oninput="evoEditStfCustom(this.value)" /><span class="stf-display" id="edit-stf-display">' + (editState.stf ? stfLabel(editState.stf) : '') + '</span></div>'
    + '</div>'
    + '<div class="edit-field"><span class="edit-field-label">Mappa (dátum)</span>'
    + '<input class="edit-input" type="text" value="' + editState.folder + '" oninput="evoEditFolder(this.value)" /></div>'
    + '<div class="edit-action-row">'
    + '<button class="edit-save-btn" onclick="evoSaveEdit(' + editingCard + ')">Mentés</button>'
    + '<button class="edit-cancel-btn" onclick="evoCancelEdit()">Mégse</button>'
    + '</div>'
    + '</div>';
}

function evoEditOutcome(val) { editState.outcome = val; renderEditCard(); }
function evoEditFolder(val)  { editState.folder  = val; }
function evoEditAgainst(val) { editState.against  = val; }
function evoEditStf(secs) {
  editState.stf = Number(secs);
  renderEditCard();
}
function evoEditStfCustom(val) {
  const n = parseInt(val, 10);
  editState.stf = (!val || isNaN(n) || n <= 0) ? 0 : n;
  const disp = document.getElementById('edit-stf-display');
  if (disp) disp.textContent = editState.stf ? stfLabel(editState.stf) : '';
  // Update preset highlights
  document.querySelectorAll('#edit-card-container .stf-preset-btn').forEach(function(btn) {
    const v = Number(btn.getAttribute('data-secs'));
    btn.className = 'stf-preset-btn' + (v === editState.stf ? ' stf-selected' : '');
  });
}
function evoEditChip(field, val) {
  const arr = editState[field];
  if (field === 'setup') {
    // Single-select for setup
    editState.setup = (arr.length === 1 && arr[0] === val) ? [] : [val];
  } else {
    const idx = arr.indexOf(val);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(val);
  }
  renderEditCard();
}

function evoCancelEdit() {
  editingCard = null;
  editState   = {};
  if (expandedCardDash !== null) {
    expandedCard = null;
    evoRenderDashboard();
  } else {
    expandedCardDash = null;
    evoRenderLog();
  }
}

function evoSaveEdit(id) {
  id = Number(id);
  const idx = allTrades.findIndex(e => Number(e.id) === id);
  if (idx < 0) return;
  const t = allTrades[idx];
  t.outcome = editState.outcome;
  t.folder  = editState.folder.trim() || t.folder;
  t.data['HTF POI']          = editState.htf.join(', ')   || '—';
  t.data['Extra körülmény']  = editState.extra.join(', ') || '—';
  t.data['Kötés ellen']      = editState.against           || '—';
  t.setup = editState.setup.length > 0 ? editState.setup : null;
  t.stf   = editState.stf > 0 ? editState.stf : null;
  allTrades[idx] = t;
  evoSaveToStorage();
  ghAutoUpload('evo', t);
  editingCard = null;
  editState   = {};
  showToast('Bejegyzés mentve');
  evoRenderLog();
}

function evoToggleCard(id) {

// ── IMPORT ────────────────────────────────────────────────────────────────────
function evoImportFolder(input) {
  const files = Array.from(input.files).filter(f => f.name.endsWith('.json'));
  if (files.length === 0) {
    setImportStatus('Nem találhatók .json fájlok.', 'err');
    return;
  }

  let loaded = 0, skipped = 0, errors = 0;
  let pending = files.length;

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const entry = JSON.parse(e.target.result);
        // Accept single entry or array
        const entries = Array.isArray(entry) ? entry : [entry];
        entries.forEach(en => {
          if (en.id && en.outcome && en.data) {
            const exists = allTrades.some(t => t.id === en.id);
            if (!exists) { allTrades.push(en); loaded++; }
            else skipped++;
          } else { errors++; }
        });
      } catch(err) { errors++; }
      pending--;
      if (pending === 0) {
        evoSaveToStorage();
        evoRenderAll();
        const msg = `${loaded} új bejegyzés importálva` +
          (skipped  ? `, ${skipped} már létezett` : '') +
          (errors   ? `, ${errors} hiba` : '') + '.';
        setImportStatus(msg, loaded > 0 ? 'ok' : 'err');
        showToast(loaded > 0 ? `${loaded} bejegyzés importálva` : 'Nincs új adat', loaded > 0 ? false : true);
      }
    };
    reader.readAsText(file);
  });

  // Reset input so same folder can be re-imported
  input.value = '';
}

function evoSyncFromTradeGate() {
  let gateTrades = [];
  try { gateTrades = JSON.parse(localStorage.getItem(GATE_KEY) || '[]'); } catch(e) {}
  if (gateTrades.length === 0) {
    showToast('Nincs TradeGate adat', true);
    return;
  }
  let added = 0;
  gateTrades.forEach(t => {
    if (!allTrades.some(e => e.id === t.id)) {
      allTrades.push(t); added++;
    }
  });
  if (added > 0) { evoSaveToStorage(); evoRenderAll(); }
  showToast(added > 0 ? `${added} új bejegyzés szinkronizálva` : 'Nincs új adat', added === 0);
}

function evoExportAllJSON() {
  if (allTrades.length === 0) { showToast('Nincs exportálható adat', true); return; }
  const blob = new Blob([JSON.stringify(allTrades, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'tradegate_evo_export_' + todayStr() + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('Export letöltve');
}

// ── Config stored in IndexedDB under key 'gh_config_evo' / 'gh_config_real' ──
var _ghConfig = { evo: null, real: null };

function ghIdbKey(db) { return 'gh_config_' + db; }

var GH_DEFAULT = { user: 'SOLTENs', repo: 'TradeGate-Unified', token: '' };

// Config is always GH_DEFAULT unless overridden by saved value in IDB meta store
// Simplified: just use GH_DEFAULT directly — no IDB lookup needed for config
function ghLoadConfig(db, callback) {
  // Return cached in-memory config immediately if available
  if (_ghConfig[db] && _ghConfig[db].token) { callback(_ghConfig[db]); return; }
  // Try localStorage — first db-specific key, then evo key as fallback (same token for all)
  var keys = ['gh_cfg_' + db, 'gh_cfg_evo', 'gh_cfg_real'];
  for (var i = 0; i < keys.length; i++) {
    try {
      var raw = localStorage.getItem(keys[i]);
      if (raw) {
        var cfg = JSON.parse(raw);
        if (cfg && cfg.token) { _ghConfig[db] = cfg; callback(cfg); return; }
      }
    } catch(e) {}
  }
  // Fall back to default (no token)
  callback(GH_DEFAULT);
}

function ghWriteConfig(db, cfg, callback) {
  _ghConfig[db] = cfg;
  // Save to localStorage for fast boot access
  try { localStorage.setItem('gh_cfg_' + db, JSON.stringify(cfg)); } catch(e) {}
  if (callback) callback();
}

// ── GitHub API ────────────────────────────────────────────────────────────────
function ghApiUrl(cfg, path) {
  return 'https://api.github.com/repos/' + cfg.user + '/' + cfg.repo + '/contents/' + path;
}
function ghHeaders(cfg) {
  return { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
}
function ghB64Encode(str) { return btoa(unescape(encodeURIComponent(str))); }
function ghB64Decode(b64) { return decodeURIComponent(escape(atob(b64.replace(/\s/g, '')))); }

// List all .json files in a folder — returns array of {name, sha}
function ghListFiles(cfg, folder, callback) {
  var url = ghApiUrl(cfg, folder);
  fetch(url, { headers: ghHeaders(cfg) })
    .then(function(r) {
      if (!r.ok) { console.warn('[GH] ghListFiles', folder, r.status); callback([]); return null; }
      return r.json();
    })
    .then(function(items) {
      if (!items) return;
      if (!Array.isArray(items)) { console.warn('[GH] ghListFiles not array', items); callback([]); return; }
      var files = items.filter(function(f) { return f.type === 'file' && f.name.endsWith('.json'); });
      console.log('[GH] ghListFiles', folder, files.length, 'files');
      callback(files);
    })
    .catch(function(e) { console.error('[GH] ghListFiles error', e); callback([]); });
}

// Download one file by path using contents API (base64 decoded)
function ghDownloadFile(cfg, path, callback) {
  fetch(ghApiUrl(cfg, path), { headers: ghHeaders(cfg) })
    .then(function(r) {
      if (!r.ok) { console.warn('[GH] ghDownloadFile', path, r.status); callback(null); return null; }
      return r.json();
    })
    .then(function(data) {
      if (!data) return;
      if (!data.content) { console.warn('[GH] no content in', path); callback(null); return; }
      try { callback(JSON.parse(ghB64Decode(data.content))); }
      catch(e) { console.error('[GH] parse error', path, e); callback(null); }
    })
    .catch(function(e) { console.error('[GH] download error', path, e); callback(null); });
}

// Upload (create or update) one file
function ghUploadFile(cfg, path, content, callback) {
  var url = ghApiUrl(cfg, path);
  // Get existing SHA first (needed for update)
  fetch(url, { headers: ghHeaders(cfg) })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(existing) {
      var body = { message: 'save ' + path, content: ghB64Encode(content) };
      if (existing && existing.sha) body.sha = existing.sha;
      return fetch(url, { method: 'PUT', headers: ghHeaders(cfg), body: JSON.stringify(body) });
    })
    .then(function(r) {
      console.log('[GH] upload', path, r.status);
      callback(r.ok, r.status);
    })
    .catch(function(e) { console.error('[GH] upload error', path, e); callback(false, 0); });
}

// Delete one file
function ghDeleteFile(cfg, path, callback) {
  var url = ghApiUrl(cfg, path);
  fetch(url, { headers: ghHeaders(cfg) })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(existing) {
      if (!existing || !existing.sha) { callback(true); return null; }
      return fetch(url, { method: 'DELETE', headers: ghHeaders(cfg), body: JSON.stringify({ message: 'delete ' + path, sha: existing.sha }) });
    })
    .then(function(r) { if (r) { console.log('[GH] delete', path, r.status); callback(r.ok); } })
    .catch(function(e) { console.error('[GH] delete error', path, e); callback(false); });
}

// File path convention
function ghPath(db, trade) {
  var prefix = db === 'evo' ? 'trade' : 'real';
  return db + '/' + prefix + '_' + trade.folder + '_' + trade.id + '.json';
}

// ── Boot sync: fetch ALL files from GitHub folder, replace local data ─────────
function ghSyncOnBoot(db, callback) {
  var cfg = _ghConfig[db] || GH_DEFAULT;
  if (!cfg.token) { callback([]); return; }
  console.log('[GH] ghSyncOnBoot', db, 'user:', cfg.user, 'repo:', cfg.repo);
  ghListFiles(cfg, db, function(files) {
    if (!files.length) {
      console.log('[GH] no files found in', db);
      callback([]);
      return;
    }
    var results = [];
    var done    = 0;
    var total   = files.length;
    console.log('[GH] downloading', total, 'files from', db);
    files.forEach(function(f) {
      ghDownloadFile(cfg, db + '/' + f.name, function(trade) {
        if (trade && trade.id && (trade.outcome || trade.linkedEvoId)) results.push(trade);
        done++;
        if (done === total) {
          console.log('[GH] ghSyncOnBoot', db, 'loaded', results.length, '/', total);
          callback(results);
        }
      });
    });
  });
}

// Called silently after every local save/edit
function ghAutoUpload(db, trade) {
  ghLoadConfig(db, function(cfg) {
    var path = ghPath(db, trade);
    ghUploadFile(cfg, path, JSON.stringify(trade, null, 2), function(ok) {
      ghSetStatus(db, ok ? '&#10003; GitHub szinkronizálva' : '&#10007; GitHub feltöltés sikertelen', ok ? 'ok' : 'err');
    });
  });
}

// Called silently after every local delete
function ghAutoDelete(db, trade) {
  ghLoadConfig(db, function(cfg) {
    ghDeleteFile(cfg, ghPath(db, trade), function(ok) {
      ghSetStatus(db, ok ? '&#10003; GitHub törölve' : '&#10007; GitHub törlés sikertelen', ok ? 'ok' : 'err');
    });
  });
}

function ghTestConfig(db) {
  var user  = ((document.getElementById(db + '-gh-user')  || {}).value || 'SOLTENs').trim();
  var repo  = ((document.getElementById(db + '-gh-repo')  || {}).value || 'TradeGate-Unified').trim();

      if (u) u.value = cfg.user || 'SOLTENs';

    } else {
      if (u && !u.value) u.value = 'SOLTENs';
      if (r && !r.value) r.value = 'TradeGate-Unified';
    }
    // Don't pre-fill token for security
  });
}

function ghPushAll(db) {
  ghLoadConfig(db, function(cfg) {
    if (!cfg) { ghSetStatus(db, 'Nincs GitHub konfiguráció. Mentsd el először.', 'err'); return; }
    var trades = db === 'evo' ? allTrades : realTrades;
    if (trades.length === 0) { ghSetStatus(db, 'Nincs feltölthető adat.', ''); return; }
    ghSetStatus(db, 'Feltöltés... (0/' + trades.length + ')', 'busy');
    var done = 0, failed = 0;
    trades.forEach(function(trade) {
      ghUploadFile(cfg, ghPath(db, trade), JSON.stringify(trade, null, 2), function(ok) {
        done++;
        if (!ok) failed++;
        var msg = 'Feltöltés... (' + done + '/' + trades.length + ')';
        if (done === trades.length) {
          if (failed === 0) msg = trades.length + ' fájl sikeresen feltöltve.';
          else msg = (trades.length - failed) + '/' + trades.length + ' sikeresen, ' + failed + ' hiba.';
          ghSetStatus(db, msg, failed === 0 ? 'ok' : 'err');
        } else {
          ghSetStatus(db, msg, 'busy');
        }
      });
    });
  });
}

function ghPullAll(db) {
  ghLoadConfig(db, function(cfg) {
    if (!cfg) { ghSetStatus(db, 'Nincs GitHub konfiguráció. Mentsd el először.', 'err'); return; }
    ghSetStatus(db, 'Letöltés GitHub-ról...', 'busy');
    ghListFiles(cfg, db, function(files) {
      if (files.length === 0) { ghSetStatus(db, 'Nincs adat a GitHub repóban.', ''); return; }
      var trades = db === 'evo' ? allTrades : realTrades;
      var existingIds = {};
      trades.forEach(function(t) { existingIds[t.id] = true; });
      var toFetch = files.filter(function(f) {
        // Extract id from filename: trade_FOLDER_ID.json or real_FOLDER_ID.json
        var m = f.name.match(/_(\d+)\.json$/);
        return m ? !existingIds[parseInt(m[1])] : true;
      });
      if (toFetch.length === 0) { ghSetStatus(db, 'Minden adat már szinkronizálva van.', 'ok'); return; }
      ghSetStatus(db, 'Letöltés... (0/' + toFetch.length + ')', 'busy');
      var done = 0, added = 0;
      toFetch.forEach(function(f) {
        ghDownloadFile(cfg, db + '/' + f.name, function(trade) {
          done++;
          if (trade && trade.id && trade.outcome) {
            trades.push(trade);
            added++;
          }
          if (done === toFetch.length) {
            if (db === 'evo') { evoSaveToStorage(); evoRenderAll(); }
            else { realSaveToStorage(); realRenderAll(); }
            ghSetStatus(db, added + ' új bejegyzés letöltve.', 'ok');
          }
        });
      });
    });
  });
}

function gapSwitchView(name) {

function gapRenderDashboard() {
  var el = document.getElementById('gap-dashboard-content');
  if (!el) return;

  var hasEvo  = allTrades  && allTrades.length  > 0;
  var hasReal = realTrades && realTrades.length > 0;

  if (!hasEvo && !hasReal) {
    el.innerHTML = emptyState('&#9671;', 'Nincs adat', 'Az EVO és REAL adatok betöltése után jelenik meg az összehasonlítás.');
    return;
  }

  // ── Win Rate comparison ───────────────────────────────────────────────────
  var evoWr  = hasEvo  ? Math.round(allTrades.filter(function(t){return t.outcome==='win';}).length  / allTrades.length  * 100) : null;
  var realWr = hasReal ? Math.round(realTrades.filter(function(t){return t.outcome==='win';}).length / realTrades.length * 100) : null;
  var diff   = (evoWr !== null && realWr !== null) ? realWr - evoWr : null;

  // ── EVO lefedettség: hány REAL kötés EVO-alapú ───────────────────────────
  var evoCopied  = hasEvo  ? allTrades.filter(function(t){return t.copiedToReal;}).length : 0;
  var covBase    = hasReal ? realTrades.length : (hasEvo ? allTrades.length : 1);
  var evoCovPct  = covBase > 0 ? Math.round(evoCopied / covBase * 100) : 0;

  // ── EVO-alapú REAL kötések WR ────────────────────────────────────────────
  var linkedTrades = hasReal ? realTrades.filter(function(t){return !!t.linkedEvoId;}) : [];
  var linkedWr     = linkedTrades.length > 0
    ? Math.round(linkedTrades.filter(function(t){return t.outcome==='win';}).length / linkedTrades.length * 100)
    : null;

  function wrColor(v) { return v === null ? 'var(--muted)' : v >= 55 ? 'var(--win)' : v >= 45 ? 'var(--yellow)' : 'var(--loss)'; }
  function diffColor(v) { return v === null ? 'var(--muted)' : (Math.abs(v) <= 10 ? 'var(--win)' : 'var(--text)'); }
  function diffStr(v)  { return v === null ? '—' : (v >= 0 ? '+' : '') + v + '%'; }

  var html = '<div class="view-title">GAP — EVO vs REAL</div>';

  // Win rate cards
  html += '<div class="stat-grid">'
    + '<div class="stat-card"><div class="stat-label">EVO Win Rate</div>'
    +   '<div class="stat-value" style="color:' + wrColor(evoWr) + ';">' + (evoWr !== null ? evoWr + '%' : '—') + '</div>'
    +   '<div class="stat-sub">' + (hasEvo ? allTrades.length + ' trade' : 'Nincs adat') + '</div></div>'
    + '<div class="stat-card"><div class="stat-label">REAL Win Rate</div>'
    +   '<div class="stat-value" style="color:' + wrColor(realWr) + ';">' + (realWr !== null ? realWr + '%' : '—') + '</div>'
    +   '<div class="stat-sub">' + (hasReal ? realTrades.length + ' trade' : 'Nincs adat') + '</div></div>'
    + '<div class="stat-card"><div class="stat-label">Különbség</div>'
    +   '<div class="stat-value" style="color:' + diffColor(diff) + ';">' + diffStr(diff) + '</div>'
    +   '<div class="stat-sub">REAL − EVO</div></div>'
    + '<div class="stat-card"><div class="stat-label">EVO lefedettség</div>'
    +   '<div class="stat-value" style="color:' + (evoCovPct>=80?'var(--win)':evoCovPct>=50?'var(--yellow)':'var(--loss)') + ';">' + evoCovPct + '%</div>'
    +   '<div class="stat-sub">' + evoCopied + ' / ' + covBase + ' REAL kötésből EVO-alapú</div></div>'
    + '</div>';

  // EVO-alapú REAL WR
  if (linkedWr !== null) {
    html += '<div style="border:1px solid var(--border);padding:14px 16px;margin-bottom:20px;">'
      + '<div class="stat-label" style="margin-bottom:10px;">EVO-alapú REAL kötések teljesítménye</div>'
      + '<div style="display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap;">'
      +   '<div><div class="stat-label">Win Rate</div><div style="font-size:32px;font-weight:900;color:' + wrColor(linkedWr) + ';">' + linkedWr + '%</div><div class="stat-sub">' + linkedTrades.length + ' EVO-alapú REAL kötés</div></div>'
      +   (evoWr !== null ? '<div><div class="stat-label">EVO Win Rate</div><div style="font-size:32px;font-weight:900;color:var(--win);">' + evoWr + '%</div><div class="stat-sub">referencia</div></div>' : '')
      +   (evoWr !== null ? '<div><div class="stat-label">Különbség</div><div style="font-size:32px;font-weight:900;color:' + diffColor(linkedWr-evoWr) + ';">' + diffStr(linkedWr-evoWr) + '</div><div class="stat-sub">EVO-alapú REAL − EVO</div></div>' : '')
      + '</div></div>';
  }

  el.innerHTML = html;
}

// ── Init ────────────────────────────────────────────────────
reset();
loginAutoCheck();
ghBoot();

</script>
</body>
</html>
