// ── REAL CARD ─────────────────────────────────────────────────────────────────
var realExpandedCardDash = null;

function realBuildCard(t, context) {
  var ctx  = context === 'dash' ? 'dash' : 'log';
  var htf=t.data?(t.data['HTF POI']||'—'):'—';
  var d=new Date(t.timestamp);
  var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var time=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  var tid=Number(t.id);
  var openId = ctx === 'dash' ? realExpandedCardDash : realExpandedCard;
  var isOpen = openId === tid;
  var isEdit = realEditingCard===tid;
  var toggleFn = ctx === 'dash' ? 'realDashToggle('+tid+')' : 'realToggleCard('+tid+')';
  var detailRows='';
  if(t.data)Object.entries(t.data).forEach(function(e){
    var k=e[0],v=e[1],vc='';
    if(k==='HTF POI'&&(v==='nincs'||v==='—'||!v)) vc='color:var(--loss);';
    else if(k==='Kötés ellen'&&v&&v!=='semmi'&&v!=='—') vc='color:var(--yellow);';
    detailRows+='<div class="trade-detail-row"><span class="trade-detail-key">'+k+'</span><span class="trade-detail-val" style="'+vc+'">'+v+'</span></div>';
  });
  if(t.vanHely)detailRows+='<div class="trade-detail-row"><span class="trade-detail-key">Van hely?</span><span class="trade-detail-val">'+t.vanHely+'</span></div>';
  if(t.setup&&t.setup.length)detailRows+='<div class="trade-detail-row"><span class="trade-detail-key">Setup</span><span class="trade-detail-val">'+t.setup.join(', ')+'</span></div>';
  if(t.wrongSetup&&(Array.isArray(t.wrongSetup)?t.wrongSetup.length>0:true)){var wsLabel=Array.isArray(t.wrongSetup)?t.wrongSetup.join(', '):t.wrongSetup;detailRows+='<div class="trade-detail-row"><span class="trade-detail-key">Hibás setup</span><span class="trade-detail-val" style="color:var(--yellow);">'+wsLabel+'</span></div>';}
  if(t.qualitySetup&&t.qualitySetup.length>0){detailRows+='<div class="trade-detail-row"><span class="trade-detail-key">Minőségi</span><span class="trade-detail-val" style="color:var(--win);"><span class="aplus-badge">A+</span> '+t.qualitySetup.join(', ')+'</span></div>';}
  if(t.stf)detailRows+='<div class="trade-detail-row"><span class="trade-detail-key">STF</span><span class="trade-detail-val">'+stfLabel(t.stf)+'</span></div>';
  var snap=(t.image&&isOpen&&!isEdit)?'<img class="trade-snapshot" src="'+t.image+'" alt="snapshot" onclick="event.stopPropagation();openLightbox('+tid+')" />':'';
  var camIcon=t.image?'<span style="color:var(--muted);font-size:13px;" title="Snapshot csatolva">&#128247;</span>':'';
  var wrongIcon='';
  var bodyContent=isEdit
    ?'<div id="real-edit-container"></div>'
    :'<div style="margin-bottom:10px;font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);letter-spacing:0.1em;">MAPPA: '+t.folder+'</div>'
      +snap+detailRows
      +'<div class="trade-card-footer">'
      +'<button class="edit-btn" onclick="event.stopPropagation();realStartEdit('+tid+')">Szerkesztés</button>'
      +'<button class="delete-btn" onclick="realConfirmDelete('+tid+')">Törlés</button>'
      +'</div>';
  return '<div class="trade-card">'
    +'<div class="trade-card-header" onclick="'+toggleFn+'">'
    +'<div class="trade-card-left"><span class="outcome-dot '+t.outcome+'"></span><span class="trade-card-date">'+ds+' '+time+'</span><span class="trade-card-htf" style="color:'+(htf==='nincs'||htf==='—'?'var(--loss)':'')+'">'+htf+'</span></div>'
    +'<div style="display:flex;align-items:center;gap:6px;">'+wrongIcon+camIcon+(t.linkedEvoId?'<span class="evo-linked-badge">E</span>':'')+(t.qualitySetup&&t.qualitySetup.length>0?'<span class="aplus-badge">A+</span>':'')
  +(t.zeroStop?'<span style="font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;color:var(--yellow);letter-spacing:0.05em;margin-right:4px;border:1px solid var(--yellow);padding:1px 4px;line-height:1;">0%</span>':'')+(t.bigWin?'<span style="font-size:12px;margin-right:4px;">🚀</span>':'')+'<span class="outcome-badge '+t.outcome+'">'+outcomeLabel(t.outcome)+'</span></div>'
    +'</div>'
    +'<div class="trade-card-body'+(isOpen?' open':'')+'">'+bodyContent+'</div>'
    +'</div>';
}
function realToggleCard(id){id=Number(id);realExpandedCard=(realExpandedCard===id?null:id);realRenderLog();}
function realDashToggle(id){id=Number(id);realExpandedCardDash=(realExpandedCardDash===id?null:id);realRenderDashboard();}

// ── REAL EDIT ─────────────────────────────────────────────────────────────────
var realEditingCard = null;
var realEditState   = {};

function realStartEdit(id) {
  id=Number(id);
  var t=realTrades.find(function(e){return Number(e.id)===id;});
  if(!t)return;
  realEditingCard=id; realExpandedCard=id;
  realEditState={
    outcome:t.outcome, folder:t.folder||'',
    htf:(t.data&&t.data['HTF POI']?t.data['HTF POI'].split(', ').filter(Boolean):[]),
    vanHely:t.vanHely||null,
    extra:(t.data&&t.data['Extra körülmény']?t.data['Extra körülmény'].split(', ').filter(Boolean):[]),
    kotesEllen:(t.data&&t.data['Kötés ellen']?t.data['Kötés ellen'].split(', ').filter(Boolean):[]),
    setup:Array.isArray(t.setup)?t.setup.slice():[],
    wrongSetup:Array.isArray(t.wrongSetup)?t.wrongSetup.slice():(t.wrongSetup?[t.wrongSetup]:[]),
    qualitySetup:Array.isArray(t.qualitySetup)?t.qualitySetup.slice():[],
    stf:t.stf||0, image:t.image||null, zeroStop:!!t.zeroStop, bigWin:!!t.bigWin
  };
  if(realCurrentView==='dashboard'){realExpandedCardDash=id;realExpandedCard=null;realRenderDashboard();}

}

    return '<button onclick="realEditChip(\''+field+'\',\''+o.replace(/'/g,'&#39;')+'\')" class="edit-chip'+(sel?' selected':'')+'" style="'+st+'">'+o+'</button>';

function realEditSetOutcome(v){realEditState.outcome=v;if(v!=='loss')realEditState.zeroStop=false;if(v!=='win')realEditState.bigWin=false;realRenderEditCard();}
function realEditToggleZeroStop(){realEditState.zeroStop=!realEditState.zeroStop;realRenderEditCard();}
function realEditToggleBigWin(){realEditState.bigWin=!realEditState.bigWin;realRenderEditCard();}
function realEditSetVanHely(v){realEditState.vanHely=v;realRenderEditCard();}
function realEditQualityToggle(v){if(!Array.isArray(realEditState.qualitySetup))realEditState.qualitySetup=[];var idx=realEditState.qualitySetup.indexOf(v);if(idx>=0)realEditState.qualitySetup.splice(idx,1);else realEditState.qualitySetup.push(v);realRenderEditCard();}
function realEditSetWrong(v){if(!Array.isArray(realEditState.wrongSetup))realEditState.wrongSetup=realEditState.wrongSetup?[realEditState.wrongSetup]:[];var idx=realEditState.wrongSetup.indexOf(v);if(idx>=0)realEditState.wrongSetup.splice(idx,1);else realEditState.wrongSetup.push(v);realRenderEditCard();}
function realEditSetStf(s){realEditState.stf=Number(s);realRenderEditCard();}
function realEditStfCustom(v){var n=parseInt(v,10);realEditState.stf=(!v||isNaN(n)||n<=0)?0:n;var d=document.getElementById('real-edit-stf-disp');if(d)d.textContent=realEditState.stf?stfLabel(realEditState.stf):'';document.querySelectorAll('#real-edit-container .stf-preset-btn').forEach(function(b){b.className='stf-preset-btn'+(Number(b.getAttribute('data-secs'))===realEditState.stf?' stf-selected':'');});}
function realEditChip(field,val){var arr=field==='edit-htf'?realEditState.htf:field==='edit-extra'?realEditState.extra:field==='edit-ke'?realEditState.kotesEllen:realEditState.setup;if(!arr)return;var idx=arr.indexOf(val);if(idx>=0)arr.splice(idx,1);else arr.push(val);realRenderEditCard();}
function realCancelEdit(){
  realEditingCard=null;
  realEditState={};
  realExpandedCard=null;
  realExpandedCardDash=null;
  if(realCurrentView==='dashboard') realRenderDashboard();
  else realRenderLog();
}
function realSaveEdit(id){
  id=Number(id);
  var idx=realTrades.findIndex(function(e){return Number(e.id)===id;});
  if(idx<0)return;
  var t=realTrades[idx];
  t.outcome=realEditState.outcome; t.folder=realEditState.folder.trim()||t.folder;
  t.vanHely=realEditState.vanHely||null;
  if(!t.data)t.data={};
  t.data['HTF POI']=realEditState.htf.join(', ')||'—';
  t.data['Extra körülmény']=realEditState.extra.join(', ')||'—';
  t.data['Kötés ellen']=realEditState.kotesEllen.join(', ')||'semmi';
  t.setup=realEditState.setup.length>0?realEditState.setup:null;
  t.wrongSetup=(Array.isArray(realEditState.wrongSetup)&&realEditState.wrongSetup.length>0)?realEditState.wrongSetup.slice():null;
  t.qualitySetup=(Array.isArray(realEditState.qualitySetup)&&realEditState.qualitySetup.length>0)?realEditState.qualitySetup.slice():null;
  t.stf=realEditState.stf>0?realEditState.stf:null;
  t.zeroStop=realEditState.zeroStop||undefined;
  t.bigWin=realEditState.bigWin||undefined;
  realTrades[idx]=t; realSaveToStorage();
  ghAutoUpload('real', t);
  realEditingCard=null;realEditState={};
  realExpandedCard=null;realExpandedCardDash=null;
  showToast('Bejegyzés mentve');
  if(realCurrentView==='dashboard')realRenderDashboard();else realRenderLog();
}

// ── REAL DELETE / CLEAR ───────────────────────────────────────────────────────
function realConfirmDelete(id){

// ── REAL IMPORT / EXPORT ──────────────────────────────────────────────────────
function realImportFolder(input){
  var files=Array.from(input.files).filter(function(f){return f.name.endsWith('.json');});
  if(!files.length){var s=document.getElementById('real-import-status');if(s)s.textContent='Nem találhatók .json fájlok.';return;}
  var loaded=0,skipped=0,errors=0,pending=files.length;
  files.forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var entry=JSON.parse(e.target.result);
        var entries=Array.isArray(entry)?entry:[entry];
        entries.forEach(function(en){
          if(en.id&&(en.outcome||en.linkedEvoId)){if(!realTrades.some(function(t){return t.id===en.id;})){realTrades.push(en);loaded++;}else skipped++;}else errors++;
        });
      }catch(err){errors++;}
      if(--pending===0){
        realSaveToStorage();realRenderAll();
        var msg=loaded+' új bejegyzés importálva'+(skipped?', '+skipped+' már létezett':'')+(errors?', '+errors+' hiba':'')+'.';
        var s=document.getElementById('real-import-status');if(s)s.textContent=msg;
        showToast(loaded>0?loaded+' bejegyzés importálva':'Nincs új adat',loaded===0);
      }
    };
    reader.readAsText(file);
  });
  input.value='';
}
function realExportAllJSON(){
  if(!realTrades.length){showToast('Nincs exportálható adat',true);return;}
  var blob=new Blob([JSON.stringify(realTrades,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='tradegate_real_export_'+todayStr()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
  showToast('Export letöltve');
}

// ── ANALYSIS ──────────────────────────────────────────────────────────────────
function evoRenderAnalysis() {
  const el = document.getElementById('analysis-content');
  if (allTrades.length === 0) {
    el.innerHTML = emptyState('&#9685;', 'Még nincs adat', 'Importálj kereskedéseket a Szinkron fülön.');
    return;
  }

  const fields = ['HTF POI', 'Extra körülmény', 'Kötés ellen'];
  let html = '<div class="view-title">Analízis</div>';

  // Per-outcome breakdown toggle
  fields.forEach(field => {
    // Collect individual values (comma-separated → split)
    const map = {}; // value → { win, be, loss, total }
    allTrades.forEach(t => {
      const raw = t.data[field] || '—';
      const vals = raw.split(',').map(v => v.trim()).filter(Boolean);
      vals.forEach(v => {
        if (!map[v]) map[v] = { win:0, be:0, loss:0, total:0 };
        map[v][t.outcome]++;
        map[v].total++;
      });
    });

    const entries = Object.entries(map).sort((a,b) => {
      const wrA = a[1].win / a[1].total;
      const wrB = b[1].win / b[1].total;
      return wrB - wrA;
    });

    if (entries.length === 0) return;

    const rows = entries.map(([val, stats]) => {
      const wr = stats.total > 0 ? Math.round(stats.win / stats.total * 100) : 0;
      const fillClass = wr >= 55 ? '' : wr >= 40 ? 'mid' : 'low';
      const sampleFlag = stats.total < 5
        ? `<span style="color:var(--yellow);font-size:10px;" title="Kevés adat (${stats.total})"> !</span>` : '';
      return `<div class="factor-row">
        <span class="factor-name" title="${val}">${val}${sampleFlag}</span>
        <div class="factor-bar-wrap">
          <div class="factor-bar-fill ${fillClass}" style="width:${wr}%"></div>
        </div>
        <span class="factor-stat"><strong>${wr}%</strong> (${stats.win}/${stats.total})</span>
      </div>`;
    }).join('');

    html += `<div class="factor-block">
      <div class="factor-title">${field}</div>
      ${rows}
    </div>`;
  });

  // Combination analysis: HTF POI × Kötés ellen
  const comboMap = {};
  allTrades.forEach(t => {
    const htfs = (t.data['HTF POI'] || '—').split(',').map(v=>v.trim());
    const ke   = t.data['Kötés ellen'] || '—';
    htfs.forEach(htf => {
      const key = htf + ' + ' + ke;
      if (!comboMap[key]) comboMap[key] = { win:0, be:0, loss:0, total:0 };
      comboMap[key][t.outcome]++;
      comboMap[key].total++;
    });
  });

  const combos = Object.entries(comboMap)
    .filter(([,s]) => s.total >= 3)
    .sort((a,b) => (b[1].win/b[1].total) - (a[1].win/a[1].total))
    .slice(0, 10);

  if (combos.length > 0) {
    const comboRows = combos.map(([key, stats]) => {
      const wr = Math.round(stats.win / stats.total * 100);
      const fillClass = wr >= 55 ? '' : wr >= 40 ? 'mid' : 'low';
      return `<div class="factor-row">
        <span class="factor-name" title="${key}" style="font-size:13px;">${key}</span>
        <div class="factor-bar-wrap">
          <div class="factor-bar-fill ${fillClass}" style="width:${wr}%"></div>
        </div>
        <span class="factor-stat"><strong>${wr}%</strong> (${stats.win}/${stats.total})</span>
      </div>`;
    }).join('');

    html += `<div class="factor-block">
      <div class="factor-title">HTF POI × Kötés ellen (min. 3 minta)</div>
      ${comboRows}
    </div>`;
  }


  // ── CLEAN vs DIRTY ────────────────────────────────────────────────────────
  const clean2 = allTrades.filter(t => {
    const ke = (t.data && t.data['Kötés ellen']) ? t.data['Kötés ellen'].trim() : '';
    const hasConflict = ke && ke !== '—' && ke !== 'semmi';
    const hasWrong = t.wrongSetup && (Array.isArray(t.wrongSetup) ? t.wrongSetup.length > 0 : true);
    return !hasConflict && !hasWrong;
  });
  const dirty2 = allTrades.filter(t => {
    const ke = (t.data && t.data['Kötés ellen']) ? t.data['Kötés ellen'].trim() : '';
    const hasConflict = ke && ke !== '—' && ke !== 'semmi';
    const hasWrong = t.wrongSetup && (Array.isArray(t.wrongSetup) ? t.wrongSetup.length > 0 : true);
    return hasConflict || hasWrong;
  });
  function calcWr2(arr) {
    if (!arr.length) return null;
    return Math.round(arr.filter(t => t.outcome==='win'||t.outcome==='be').length / arr.length * 100);
  }
  function wrColX(v) { return v===null?'var(--muted)':v>=55?'var(--win)':v>=45?'var(--yellow)':'var(--loss)'; }
  const cleanWr2 = calcWr2(clean2);
  const dirtyWr2 = calcWr2(dirty2);


  // ── Clean pattern analysis ──────────────────────────────────────────────────
  const cleanPanel = (function() {
    if (!_cleanPanelOpen || clean2.length === 0) return '';
    const patMap = {};
    clean2.forEach(t => {
      const htf   = (t.data && t.data['HTF POI'])         ? t.data['HTF POI'].split(',').map(v=>v.trim()).filter(Boolean) : [];
      const extra = (t.data && t.data['Extra körülmény']) ? t.data['Extra körülmény'].split(',').map(v=>v.trim()).filter(v=>v&&v!=='nincs') : [];
      const parts = [...htf, ...extra].sort();
      if (parts.length === 0) return;
      const key = parts.join(' + ');
      if (!patMap[key]) patMap[key] = {win:0,be:0,loss:0,total:0,label:key};
      patMap[key].total++;
      if (t.outcome==='win') patMap[key].win++;
      else if (t.outcome==='be') patMap[key].be++;
      else if (t.outcome==='loss') patMap[key].loss++;
    });
    const pats = Object.values(patMap).filter(p=>p.total>0);
    if (pats.length === 0) return '<div style="padding:16px 20px;color:var(--muted);font-family:\'Space Mono\',monospace;font-size:9px;">Nincs elegendő kombináció-adat.</div>';
    const scored = pats.map(p => Object.assign({}, p, {wr: Math.round((p.win+p.be)/p.total*100)}));
    const scoredWithPts = scored.map(p => Object.assign({}, p, {pts: p.win - p.loss}));
    const top    = scoredWithPts.reduce((a,b) => b.pts>a.pts||(b.pts===a.pts&&b.total>a.total)?b:a);
    const bottom = scoredWithPts.reduce((a,b) => b.pts<a.pts||(b.pts===a.pts&&b.total>a.total)?b:a);
    const accent = 'var(--win)';
    function getCleanIds(label) {
      return clean2.filter(t => {
        const htf   = (t.data && t.data['HTF POI'])         ? t.data['HTF POI'].split(',').map(v=>v.trim()).filter(Boolean) : [];
        const extra = (t.data && t.data['Extra körülmény']) ? t.data['Extra körülmény'].split(',').map(v=>v.trim()).filter(v=>v&&v!=='nincs') : [];
        return [...htf, ...extra].sort().join(' + ') === label;
      }).map(t => Number(t.id));
    }
    function sumRow(title, p, col) {
      const ids = JSON.stringify(getCleanIds(p.label));
      return '<div style="padding:12px 20px;border-left:2px solid '+accent+';cursor:pointer;" onclick="evoGoLogByIds('+ids+')">'
        + '<div style="font-family:\'Space Mono\',monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:'+col+';margin-bottom:6px;">'+title+'</div>'
        + '<div style="font-family:\'Space Mono\',monospace;font-size:10px;color:var(--text);margin-bottom:6px;line-height:1.5;">'+p.label+'</div>'
        + '<div style="display:flex;gap:16px;align-items:baseline;">'
        +   '<span style="font-size:22px;font-weight:900;color:'+(p.pts>0?'var(--win)':p.pts===0?'var(--be)':'var(--loss)')+';">'+(p.pts>0?'+':'')+p.pts+'</span>'
        +   '<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">'+p.total+' kötés</span>'
        +   '<span style="font-family:\'Space Mono\',monospace;font-size:9px;"><span style="color:var(--win);">'+p.win+'W</span> <span style="color:var(--be);">'+p.be+'BE</span> <span style="color:var(--loss);">'+p.loss+'L</span></span>'
        + '</div></div>';
    }
    const scoredP = scored.map(p => Object.assign({}, p, {pts: p.win - p.loss}));
    const sorted = scoredP.slice().sort((a,b) => _cleanSortAsc ? a.pts-b.pts : b.pts-a.pts);
    const allRows = sorted.map((p,i) => {
      const pts = p.pts;
      const col = pts > 0 ? 'var(--win)' : pts === 0 ? 'var(--be)' : 'var(--loss)';
      const ids2 = JSON.stringify(getCleanIds(p.label));
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 20px;border-bottom:1px solid var(--border);border-left:2px solid '+accent+';cursor:pointer;" onclick="evoGoLogByIds('+ids2+')">' 
        + '<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);flex-shrink:0;">'+(i+1)+'.</span>'
        + '<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--text);flex:1;line-height:1.4;">'+p.label+'</span>'
        + '<span style="font-family:\'Space Mono\',monospace;font-size:11px;font-weight:700;color:'+col+';flex-shrink:0;">'+(pts>0?'+':'')+pts+'</span>'
        + '<span style="font-family:\'Space Mono\',monospace;font-size:8px;flex-shrink:0;"><span style="color:var(--win);">'+p.win+'W</span> <span style="color:var(--be);">'+p.be+'BE</span> <span style="color:var(--loss);">'+p.loss+'L</span></span>'
        + '</div>';
    }).join('');
    const sortBtn = '<div style="display:flex;justify-content:flex-end;padding:6px 12px;border-bottom:1px solid var(--border);border-left:2px solid '+accent+';">'
      + '<button onclick="event.stopPropagation();evoCleanSortToggle()" style="background:transparent;border:1px solid var(--border);color:var(--muted);font-family:\'Space Mono\',monospace;font-size:8px;padding:3px 8px;cursor:pointer;border-radius:0;">'
      + (_cleanSortAsc ? '&#9650; legjobb pontszámtól' : '&#9660; legrosszabb pontszámtól') + '</button></div>';
    return '<div style="border-top:2px solid '+accent+';">'
      + sumRow('&#9650; Top Clean Pattern', top, 'var(--win)')
      + sumRow('&#9660; Bottom Clean Pattern', bottom, 'var(--loss)')
      + sortBtn + allRows + '</div>';
  }());

  // ── Dirty pattern analysis ──────────────────────────────────────────────────
  const dirtyPanel = (function() {
    if (!_dirtyPanelOpen || dirty2.length === 0) return '';
    const patMap = {};
    dirty2.forEach(t => {
      const ke = (t.data && t.data['Kötés ellen']) ? t.data['Kötés ellen'].split(',').map(v=>v.trim()).filter(v=>v&&v!=='—'&&v!=='semmi') : [];
      const ws = Array.isArray(t.wrongSetup) ? t.wrongSetup : [];
      const parts = [...ke, ...ws].sort();
      if (parts.length === 0) return;
      const key = parts.join(' + ');
      if (!patMap[key]) patMap[key] = {win:0,be:0,loss:0,total:0,label:key};
      patMap[key].total++;
      if (t.outcome==='win') patMap[key].win++;
      else if (t.outcome==='be') patMap[key].be++;
      else if (t.outcome==='loss') patMap[key].loss++;
    });
    const pats = Object.values(patMap).filter(p=>p.total>0);
    if (pats.length === 0) return '<div style="padding:16px 20px;color:var(--muted);font-family:\'Space Mono\',monospace;font-size:9px;">Nincs elegendő kombináció-adat.</div>';
    const scored = pats.map(p => Object.assign({}, p, {wr: Math.round((p.win+p.be)/p.total*100)}));
    const scoredWithPts = scored.map(p => Object.assign({}, p, {pts: p.win - p.loss}));
    const top    = scoredWithPts.reduce((a,b) => b.pts>a.pts||(b.pts===a.pts&&b.total>a.total)?b:a);
    const bottom = scoredWithPts.reduce((a,b) => b.pts<a.pts||(b.pts===a.pts&&b.total>a.total)?b:a);
    const accent = 'var(--yellow)';
    function getDirtyIds(label) {
      return dirty2.filter(t => {
        const ke = (t.data && t.data['Kötés ellen']) ? t.data['Kötés ellen'].split(',').map(v=>v.trim()).filter(v=>v&&v!=='—'&&v!=='semmi') : [];
        const ws = Array.isArray(t.wrongSetup) ? t.wrongSetup : [];
        return [...ke, ...ws].sort().join(' + ') === label;
      }).map(t => Number(t.id));
    }
    function patRow(title, p, col) {
      const ids = JSON.stringify(getDirtyIds(p.label));
      return '<div style="padding:12px 20px;border-left:2px solid '+accent+';cursor:pointer;" onclick="evoGoLogByIds('+ids+')">'
        + '<div style="font-family:\'Space Mono\',monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:'+col+';margin-bottom:6px;">'+title+'</div>'
        + '<div style="font-family:\'Space Mono\',monospace;font-size:10px;color:var(--text);margin-bottom:6px;line-height:1.5;">'+p.label+'</div>'
        + '<div style="display:flex;gap:16px;align-items:baseline;">'
        +   '<span style="font-size:22px;font-weight:900;color:'+(p.pts>0?'var(--win)':p.pts===0?'var(--be)':'var(--loss)')+';">'+(p.pts>0?'+':'')+p.pts+'</span>'
        +   '<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">'+p.total+' kötés</span>'
        +   '<span style="font-family:\'Space Mono\',monospace;font-size:9px;"><span style="color:var(--win);">'+p.win+'W</span> <span style="color:var(--be);">'+p.be+'BE</span> <span style="color:var(--loss);">'+p.loss+'L</span></span>'
        + '</div></div>';
    }
    const scoredP = scored.map(p => Object.assign({}, p, {pts: p.win - p.loss}));
    const sorted = scoredP.slice().sort((a,b) => _dirtySortAsc ? a.pts-b.pts : b.pts-a.pts);
    const allRows = sorted.map((p,i) => {
      const pts = p.pts;
      const col = pts > 0 ? 'var(--win)' : pts === 0 ? 'var(--be)' : 'var(--loss)';
      const ids3 = JSON.stringify(getDirtyIds(p.label));
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 20px;border-bottom:1px solid var(--border);border-left:2px solid '+accent+';cursor:pointer;" onclick="evoGoLogByIds('+ids3+')">' 
        + '<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);flex-shrink:0;">'+(i+1)+'.</span>'
        + '<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--text);flex:1;line-height:1.4;">'+p.label+'</span>'
        + '<span style="font-family:\'Space Mono\',monospace;font-size:11px;font-weight:700;color:'+col+';flex-shrink:0;">'+(pts>0?'+':'')+pts+'</span>'
        + '<span style="font-family:\'Space Mono\',monospace;font-size:8px;flex-shrink:0;"><span style="color:var(--win);">'+p.win+'W</span> <span style="color:var(--be);">'+p.be+'BE</span> <span style="color:var(--loss);">'+p.loss+'L</span></span>'
        + '</div>';
    }).join('');
    const sortBtn = '<div style="display:flex;justify-content:flex-end;padding:6px 12px;border-bottom:1px solid var(--border);border-left:2px solid '+accent+';">'
      + '<button onclick="event.stopPropagation();evoDirtySortToggle()" style="background:transparent;border:1px solid var(--border);color:var(--muted);font-family:\'Space Mono\',monospace;font-size:8px;padding:3px 8px;cursor:pointer;border-radius:0;">'
      + (_dirtySortAsc ? '&#9650; legjobb pontszámtól' : '&#9660; legrosszabb pontszámtól') + '</button></div>';
    return '<div style="border-top:2px solid '+accent+';">'
      + patRow('&#9650; Top Dirty Pattern', top, 'var(--win)')
      + patRow('&#9660; Bottom Dirty Pattern', bottom, 'var(--loss)')
      + sortBtn + allRows + '</div>';
  }());


  // ── Multi-Filter Analysis ───────────────────────────────────────────────────
  const mfaCard = (function() {
    const HTF_OPTS     = ['kis-k zóna','momentum kiindulási zóna','nyitó zóna','flip zóna','anti-zóna','likviditás söprés','iv','iv letörés','STF K törés','HTF setup','MOC','W MOC','HTF BOS visszateszt'];
    const EXTRA_OPTS   = ['HTF csúzli','behalt HTF csúzli','gyoruslás','P3','kontra setup behalása','1. trendpárna meggyűrés','Polaritás váltás','Choch','kis-k törés','BOF','STF K törés','△ + kitörés után kontra','nincs'];
    const AGAINST_OPTS = ['gyorsulás velünk szemben','P3','HTF ZÓNA','kései RSI cross','△ + kitörés után trendirányba','csúzli','csúzli behalása','C (3-wave)','MOC TF RSI ellen cross','STF K törés - kötéssel szemben','trenddel szemben','Korrekciók méretének növekedése','Range Breakout','HTF likviditás','min. kis-k BOF hiánya','MOC TF RSI pro cross + <50/>50','Right look','semmi'];
    const SETUP_OPTS   = ['1-2','W5','K2k','DKk','C','MOC','W MOC','RUNNING FLAT','I-AVGH','FLAT-C','NPKP','NPNP','Dk','sdiv','ss+'];
    const QUALITY_OPTS = ['MA/SMA cross kis-k','LD + Flat','STF csúzli'];
    const WRONG_OPTS   = ['hibás kis-k','hibás C1','hibás áralakzat','hibás RSI alakzat','hibás alárendelt RSI alakzat','TP1 < Prev High/Low','Késői visszateszt'];
    const STF_OPTS     = STF_PRESETS.map(s => stfLabel(s));

    const GROUPS = [
      { key:'htf',     label:'HTF POI',        opts: HTF_OPTS },
      { key:'extra',   label:'Extra',           opts: EXTRA_OPTS },
      { key:'against', label:'Ellene szól',     opts: AGAINST_OPTS },
      { key:'setup',   label:'Setup',           opts: SETUP_OPTS },
      { key:'stf',     label:'STF',             opts: STF_OPTS },
      { key:'quality', label:'Minőségi setup',  opts: QUALITY_OPTS },
      { key:'wrong',   label:'Hibás setup',     opts: WRONG_OPTS },
    ];

    const totalSelected = Object.values(_mfaFilters).reduce((s,a)=>s+a.length,0);

    // Filter picker UI
    const pickerRows = GROUPS.map(g => {
      const sel = _mfaFilters[g.key];
      const chips = g.opts.map(o => {
        const active = sel.indexOf(o) >= 0;
        const safe = o.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return '<span onclick="event.stopPropagation();mfaToggle(\''+g.key+'\',\''+o.replace(/'/g,"\\'")+'\')" style="display:inline-block;margin:2px;padding:2px 7px;font-family:\'Space Mono\',monospace;font-size:8px;letter-spacing:0.08em;cursor:pointer;border:1px solid '+(active?'var(--accent)':'var(--border)')+';color:'+(active?'var(--accent)':'var(--muted)')+';background:'+(active?'rgba(200,255,0,0.1)':'transparent')+';">'+safe+'</span>';
      }).join('');
      return '<div style="border-bottom:1px solid var(--border);padding:8px 14px;">'
        + '<div style="font-family:\'Space Mono\',monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;">'+g.label+'</div>'
        + chips + '</div>';
    }).join('');

    // Analysis: filter trades matching ALL selected groups (AND between groups, OR within)
    const hasAny = totalSelected > 0;
    let matchedTrades = allTrades;
    if (hasAny) {
      GROUPS.forEach(g => {
        const sel = _mfaFilters[g.key];
        if (!sel.length) return;
        matchedTrades = matchedTrades.filter(t => {
          if (g.key === 'htf')     return sel.some(x => (t.data&&t.data['HTF POI']||'').split(',').some(v=>v.trim()===x));
          if (g.key === 'extra')   return sel.some(x => (t.data&&t.data['Extra körülmény']||'').split(',').some(v=>v.trim()===x));
          if (g.key === 'against') return sel.some(x => (t.data&&t.data['Kötés ellen']||'').split(',').some(v=>v.trim()===x));
          if (g.key === 'setup')   return Array.isArray(t.setup) && sel.some(x => t.setup.some(v=>v.trim()===x));
          if (g.key === 'stf')     return sel.some(x => t.stf && stfLabel(t.stf)===x);
          if (g.key === 'quality') return Array.isArray(t.qualitySetup) && sel.some(x => t.qualitySetup.some(v=>v.trim()===x));
          if (g.key === 'wrong')   return Array.isArray(t.wrongSetup) && sel.some(x => t.wrongSetup.some(v=>v.trim()===x));
          return false;
        });
      });
    }

    const mTotal = matchedTrades.length;
    const mWin   = matchedTrades.filter(t=>t.outcome==='win'||t.outcome==='be').length;
    const mWr    = mTotal > 0 ? Math.round(mWin/mTotal*100) : null;
    const mPts   = matchedTrades.filter(t=>t.outcome==='win').length - matchedTrades.filter(t=>t.outcome==='loss').length;
    const mWins  = matchedTrades.filter(t=>t.outcome==='win').length;
    const mBes   = matchedTrades.filter(t=>t.outcome==='be').length;
    const mLosses= matchedTrades.filter(t=>t.outcome==='loss').length;

    // Best 3 / Worst 3 pairings: for each unselected group, score its values against current filter
    let pairingsHtml = '';
    if (hasAny && mTotal > 0) {
      const unselectedGroups = GROUPS.filter(g => !_mfaFilters[g.key].length);
      const pairingBlocks = unselectedGroups.map(g => {
        const pMap = {};
        matchedTrades.forEach(t => {
          let vals = [];
          if (g.key === 'htf')     vals = (t.data&&t.data['HTF POI']||'').split(',').map(v=>v.trim()).filter(Boolean);
          if (g.key === 'extra')   vals = (t.data&&t.data['Extra körülmény']||'').split(',').map(v=>v.trim()).filter(Boolean);
          if (g.key === 'against') vals = (t.data&&t.data['Kötés ellen']||'').split(',').map(v=>v.trim()).filter(Boolean);
          if (g.key === 'setup')   vals = Array.isArray(t.setup) ? t.setup.map(v=>v.trim()) : [];
          if (g.key === 'stf')     vals = t.stf ? [stfLabel(t.stf)] : [];
          if (g.key === 'quality') vals = Array.isArray(t.qualitySetup) ? t.qualitySetup : [];
          if (g.key === 'wrong')   vals = Array.isArray(t.wrongSetup) ? t.wrongSetup : [];
          vals.forEach(v => {
            if (!pMap[v]) pMap[v] = {win:0,be:0,loss:0,total:0};
            pMap[v].total++;
            if (t.outcome==='win') pMap[v].win++;
            else if (t.outcome==='be') pMap[v].be++;
            else if (t.outcome==='loss') pMap[v].loss++;
          });
        });
        const entries = Object.entries(pMap).filter(([,p])=>p.total>0)
          .map(([v,p])=>({v, pts:p.win-p.loss, wr:Math.round((p.win+p.be)/p.total*100), ...p}))
          .sort((a,b)=>b.pts-a.pts);
        if (!entries.length) return '';
        const top3 = entries.slice(0,3);
        const bot3 = entries.slice(-3).reverse();
        function pRow(e, col) {
          const safe = e.v.replace(/</g,'&lt;').replace(/>/g,'&gt;');
          return '<div style="display:flex;align-items:center;gap:10px;padding:5px 14px;border-bottom:1px solid var(--border);">'
            + '<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--text);flex:1;">'+safe+'</span>'
            + '<span style="font-family:\'Space Mono\',monospace;font-size:10px;font-weight:700;color:'+col+';">'+(e.pts>0?'+':'')+e.pts+'</span>'
            + '<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">'+e.wr+'%</span>'
            + '<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">'+e.total+'db</span>'
            + '</div>';
        }
        return '<div style="border-bottom:1px solid var(--border);">'
          + '<div style="padding:6px 14px;font-family:\'Space Mono\',monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);background:var(--surface);">+ '+g.label+'</div>'
          + top3.map(e=>pRow(e,'var(--win)')).join('')
          + (entries.length > 3 ? bot3.map(e=>pRow(e,'var(--loss)')).join('') : '')
          + '</div>';
      }).join('');
      pairingsHtml = pairingBlocks;
    }

    const clearBtn = totalSelected > 0
      ? '<button onclick="event.stopPropagation();mfaClear()" style="background:transparent;border:1px solid var(--border);color:var(--muted);font-family:\'Space Mono\',monospace;font-size:8px;padding:3px 8px;cursor:pointer;border-radius:0;margin-left:8px;">&#10005; Törlés</button>'
      : '';

    const statsHtml = !hasAny
      ? '<div style="padding:14px 16px;font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">Válassz tételeket a szűrőkből az analízishez.</div>'
      : '<div style="display:flex;gap:20px;align-items:baseline;padding:12px 16px;border-bottom:1px solid var(--border);">'
        + '<span style="font-size:28px;font-weight:900;color:var(--accent);">'+mTotal+'</span>'
        + '<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">kötés</span>'
        + '<span style="font-size:22px;font-weight:900;color:'+wrColX(mWr)+';">'+(mWr!==null?mWr+'%':'—')+'</span>'
        + '<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:'+(mPts>0?'var(--win)':mPts===0?'var(--be)':'var(--loss)')+';">'+(mPts>0?'+':'')+mPts+' pt</span>'
        + '<span style="font-family:\'Space Mono\',monospace;font-size:9px;"><span style="color:var(--win);">'+mWins+'W</span> <span style="color:var(--be);">'+mBes+'BE</span> <span style="color:var(--loss);">'+mLosses+'L</span></span>'
        + '</div>'
        + pairingsHtml;

    return '<div style="border:1px solid var(--border);margin-bottom:24px;overflow:hidden;">'
      + '<div style="background:var(--surface);padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">'
      + 'Multi-Filter Analysis' + clearBtn + '</div>'
      + pickerRows
      + statsHtml
      + '</div>';
  }());

  const outerBorder = _dirtyPanelOpen ? 'border:1px solid var(--yellow)' : _cleanPanelOpen ? 'border:1px solid var(--win)' : 'border:1px solid var(--border)';

  // ── Factor Impact Analysis ───────────────────────────────────────────────────
  const fiCard = (function() {
    if (allTrades.length < 10) return '<div style="padding:20px;font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">Legalább 10 kötés szükséges az elemzéshez.</div>';

    const MIN_SAMPLE = 10;
    const baseWin = allTrades.filter(t=>t.outcome==='win'||t.outcome==='be').length / allTrades.length;
    const basePts = allTrades.filter(t=>t.outcome==='win').length - allTrades.filter(t=>t.outcome==='loss').length;

    // Extract factor values from each trade
    function getFactors(t) {
      const res = [];
      const htf = t.data && t.data['HTF POI'] ? t.data['HTF POI'].split(',').map(v=>v.trim()).filter(Boolean) : [];
      htf.forEach(v => res.push({grp:'HTF POI', val:v}));
      const extra = t.data && t.data['Extra körülmény'] ? t.data['Extra körülmény'].split(',').map(v=>v.trim()).filter(v=>v&&v!=='nincs'&&v!=='—') : [];
      extra.forEach(v => res.push({grp:'Extra', val:v}));
      const ke = t.data && t.data['Kötés ellen'] ? t.data['Kötés ellen'].split(',').map(v=>v.trim()).filter(v=>v&&v!=='semmi'&&v!=='—') : [];
      ke.forEach(v => res.push({grp:'Ellene szól', val:v}));
      const setup = Array.isArray(t.setup) ? t.setup : [];
      setup.forEach(v => res.push({grp:'Setup', val:v}));
      if (t.stf) res.push({grp:'STF', val:stfLabel(t.stf)});
      const qs = Array.isArray(t.qualitySetup) ? t.qualitySetup : [];
      qs.forEach(v => res.push({grp:'Minőségi setup', val:v}));
      const ws = Array.isArray(t.wrongSetup) ? t.wrongSetup : [];
      ws.forEach(v => res.push({grp:'Hibás setup', val:v}));
      return res;
    }

    // Aggregate stats per factor value
    const fMap = {};
    allTrades.forEach(t => {
      const factors = getFactors(t);
      const isWin = t.outcome==='win'||t.outcome==='be';
      const pts = t.outcome==='win' ? 1 : t.outcome==='loss' ? -1 : 0;
      factors.forEach(f => {
        const key = f.grp + '::' + f.val;
        if (!fMap[key]) fMap[key] = {grp:f.grp, val:f.val, win:0, total:0, pts:0};
        fMap[key].total++;
        if (isWin) fMap[key].win++;
        fMap[key].pts += pts;
      });
    });

    const entries = Object.values(fMap).filter(e => e.total > 0);

    // Group by factor group
    const grpOrder = ['HTF POI','Extra','Ellene szól','Setup','STF','Minőségi setup','Hibás setup'];
    const grpColor = {'HTF POI':'var(--accent)','Extra':'var(--accent)','Ellene szól':'var(--loss)','Setup':'var(--accent)','STF':'var(--accent)','Minőségi setup':'var(--win)','Hibás setup':'var(--yellow)'};

    function impactBar(wr, base) {
      const delta = wr - base * 100;
      const maxDelta = 50;
      const pct = Math.min(Math.abs(delta) / maxDelta * 100, 100);
      const col = delta >= 5 ? 'var(--win)' : delta <= -5 ? 'var(--loss)' : 'var(--be)';
      const dir = delta >= 0 ? 'left' : 'right';
      return '<div style="width:80px;height:8px;background:var(--border);position:relative;flex-shrink:0;">'
        + '<div style="position:absolute;top:0;'+(delta>=0?'left:50%':'right:50%')+';width:'+Math.round(pct/2)+'%;height:100%;background:'+col+';"></div>'
        + '<div style="position:absolute;left:50%;top:0;width:1px;height:100%;background:var(--muted);"></div>'
        + '</div>';
    }

    let html = '<div style="border:1px solid var(--border);overflow:hidden;">';
    html += '<div style="background:var(--surface);padding:10px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">'
      + '<span style="font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">Factor Impact</span>'
      + '<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">alap WR: '+Math.round(baseWin*100)+'%</span>'
      + '</div>';

    grpOrder.forEach(grp => {
      const grpEntries = entries.filter(e=>e.grp===grp).sort((a,b)=>{
        const wrA = a.win/a.total, wrB = b.win/b.total;
        return wrB - wrA;
      });
      if (!grpEntries.length) return;
      const gc = grpColor[grp] || 'var(--accent)';
      html += '<div style="border-bottom:1px solid var(--border);">';
      html += '<div style="padding:6px 14px;font-family:\'Space Mono\',monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:'+gc+';background:var(--surface);">'+grp+'</div>';
      grpEntries.forEach(e => {
        const wr = Math.round(e.win/e.total*100);
        const delta = wr - Math.round(baseWin*100);
        const lowSample = e.total < MIN_SAMPLE;
        const deltaCol = delta >= 5 ? 'var(--win)' : delta <= -5 ? 'var(--loss)' : 'var(--be)';
        const safe = e.val.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        html += '<div style="display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:1px solid var(--border);opacity:'+(lowSample?'0.5':'1')+'">'
          + '<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--text);flex:1;line-height:1.3;">'+safe+'</span>'
          + impactBar(wr, baseWin)
          + '<span style="font-family:\'Space Mono\',monospace;font-size:10px;font-weight:700;color:'+deltaCol+';flex-shrink:0;width:36px;text-align:right;">'+(delta>=0?'+':'')+delta+'%</span>'
          + '<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:'+deltaCol+';flex-shrink:0;width:28px;text-align:right;">'+wr+'%</span>'
          + '<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);flex-shrink:0;width:24px;text-align:right;">'+e.total+'</span>'
          + (lowSample ? '<span style="font-family:\'Space Mono\',monospace;font-size:7px;color:var(--yellow);flex-shrink:0;" title="Alacsony mintaszám">⚠</span>' : '<span style="width:10px;flex-shrink:0;"></span>')
          + '</div>';
      });
      html += '</div>';
    });
    html += '</div>';
    return html;
  }());


  // ── Drill-Down Analysis ──────────────────────────────────────────────────────
  const ddCard = (function() {
    function getVals(t, dim) {
      if (dim === 'HTF POI')        return (t.data&&t.data['HTF POI']||'').split(',').map(v=>v.trim()).filter(Boolean);
      if (dim === 'Extra')          return (t.data&&t.data['Extra körülmény']||'').split(',').map(v=>v.trim()).filter(v=>v&&v!=='nincs'&&v!=='—');
      if (dim === 'Ellene szól')    return (t.data&&t.data['Kötés ellen']||'').split(',').map(v=>v.trim()).filter(v=>v&&v!=='semmi'&&v!=='—');
      if (dim === 'Setup')          return Array.isArray(t.setup)?t.setup.map(v=>v.trim()):[];
      if (dim === 'STF')            return t.stf?[stfLabel(t.stf)]:[];
      if (dim === 'Minőségi setup') return Array.isArray(t.qualitySetup)?t.qualitySetup:[];
      if (dim === 'Hibás setup')    return Array.isArray(t.wrongSetup)?t.wrongSetup:[];
      return [];
    }
    function stats(trades) {
      const n=trades.length; if(!n) return {n:0,wr:0,pts:0,wins:0,bes:0,losses:0};
      const wins=trades.filter(t=>t.outcome==='win').length;
      const bes=trades.filter(t=>t.outcome==='be').length;
      const losses=trades.filter(t=>t.outcome==='loss').length;
      return {n,wr:Math.round((wins+bes)/n*100),pts:wins-losses,wins,bes,losses};
    }
    function wrCol(v){return v>=55?'var(--win)':v>=45?'var(--yellow)':'var(--loss)';}
    function ptsCol(v){return v>0?'var(--win)':v===0?'var(--be)':'var(--loss)';}
    function miniBar(s) {
      if(!s.n) return '';
      const wp=Math.round(s.wins/s.n*100),bp=Math.round(s.bes/s.n*100),lp=Math.max(0,100-wp-bp);
      return '<div style="display:flex;height:3px;margin-top:4px;">'
        +'<div style="flex:'+wp+';background:var(--win);"></div>'
        +'<div style="flex:'+bp+';background:var(--be);"></div>'
        +'<div style="flex:'+lp+';background:var(--loss);"></div></div>';
    }
    function metricLine(s) {
      return '<div style="display:flex;gap:12px;align-items:baseline;flex-wrap:wrap;">'
        +'<span style="font-size:22px;font-weight:900;color:var(--accent);">'+s.n+'</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">kötés</span>'
        +'<span style="font-size:18px;font-weight:900;color:'+wrCol(s.wr)+';">'+s.wr+'%</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">WR</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:14px;font-weight:700;color:'+ptsCol(s.pts)+';">'+(s.pts>0?'+':'')+s.pts+' pt</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;">'
          +'<span style="color:var(--win);">'+s.wins+'W</span> '
          +'<span style="color:var(--be);">'+s.bes+'BE</span> '
          +'<span style="color:var(--loss);">'+s.losses+'L</span></span></div>';
    }

    // Current trades = last step's ids, or all
    const currentIds = _ddPath.length ? _ddPath[_ddPath.length-1].ids : allTrades.map(t=>Number(t.id));
    const currentTrades = allTrades.filter(t=>currentIds.indexOf(Number(t.id))>=0);
    const cs = stats(currentTrades);

    // Dimensions already used in path
    const usedDims = _ddPath.map(s=>s.dim);
    const availDims = _ddDimOrder.filter(d=>usedDims.indexOf(d)<0);

    // Breadcrumb
    let bc = '<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--surface);">'
      +'<span onclick="ddReset()" style="font-family:\'Space Mono\',monospace;font-size:8px;cursor:pointer;color:'+(_ddPath.length===0?'var(--accent)':'var(--muted)')+';letter-spacing:0.1em;">ALL</span>';
    _ddPath.forEach((step,i)=>{
      const isLast = i===_ddPath.length-1;
      bc += '<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">›</span>'
        +'<span onclick="ddDrillUp('+(i+1)+')" style="font-family:\'Space Mono\',monospace;font-size:8px;cursor:pointer;color:'+(isLast?'var(--accent)':'var(--muted)')+';max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+step.dim+': '+step.val+'">'+step.val.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</span>';
    });
    bc += '</div>';

    // Current level summary
    const summary = '<div style="padding:12px 14px;border-bottom:1px solid var(--border);">'
      +(_ddPath.length?'<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);margin-bottom:6px;letter-spacing:0.08em;">'
        +_ddPath.map(s=>s.dim+': '+s.val.replace(/</g,'&lt;').replace(/>/g,'&gt;')).join(' › ')+'</div>':'')
      +metricLine(cs)+miniBar(cs)+'</div>';

    // Next level: each available dim broken down
    let sections = '';
    if (!availDims.length || !currentTrades.length) {
      sections = '<div style="padding:20px 14px;font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">Nincs további bontási lehetőség.</div>';
    } else {
      availDims.forEach(dim=>{
        const dimMap={};
        currentTrades.forEach(t=>{
          const vals=getVals(t,dim);
          (vals.length?vals:['—']).forEach(v=>{
            if(!dimMap[v]) dimMap[v]=[];
            dimMap[v].push(t);
          });
        });
        const groups=Object.entries(dimMap)
          .map(([v,ts])=>({v,ts,s:stats(ts)}))
          .filter(g=>g.s.n>0)
          .sort((a,b)=>(b.s.pts-a.s.pts)||(b.s.n-a.s.n));
        if(!groups.length) return;

        sections+='<div style="border-bottom:1px solid var(--border);">';
        sections+='<div style="padding:5px 14px;font-family:\'Space Mono\',monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);background:var(--surface);">'+dim+'</div>';
        groups.forEach(g=>{
          const s=g.s; const isLow=s.n<10;
          const ids=g.ts.map(t=>Number(t.id));
          const safe=g.v.replace(/</g,'&lt;').replace(/>/g,'&gt;');
          const deltaWr=s.wr-cs.wr;
          const deltaCol=deltaWr>=5?'var(--win)':deltaWr<=-5?'var(--loss)':'var(--be)';
          const valEsc=g.v.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          sections+='<div onclick="ddDrillDown(\''+dim+'\',\''+valEsc+'\','+JSON.stringify(ids)+')" '
            +'style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);cursor:pointer;opacity:'+(isLow?'0.55':'1')+'" '
            +'onmouseenter="this.style.background=\'rgba(200,255,0,0.04)\'" onmouseleave="this.style.background=\'\'">'
            +'<div style="flex:1;min-width:0;">'
            +'<div style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+safe+(isLow?' <span style="color:var(--yellow);font-size:7px;">⚠</span>':'')+'</div>'
            +miniBar(s)+'</div>'
            +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:'+deltaCol+';flex-shrink:0;width:36px;text-align:right;">'+(deltaWr>0?'+':'')+deltaWr+'%</span>'
            +'<span style="font-family:\'Space Mono\',monospace;font-size:10px;font-weight:700;color:'+wrCol(s.wr)+';flex-shrink:0;width:30px;text-align:right;">'+s.wr+'%</span>'
            +'<span style="font-family:\'Space Mono\',monospace;font-size:11px;font-weight:700;color:'+ptsCol(s.pts)+';flex-shrink:0;width:32px;text-align:right;">'+(s.pts>0?'+':'')+s.pts+'</span>'
            +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);flex-shrink:0;width:20px;text-align:right;">'+s.n+'</span>'
            +'<span style="color:var(--muted);font-size:10px;flex-shrink:0;">›</span>'
            +'</div>';
        });
        sections+='</div>';
      });
    }

    return '<div style="border:1px solid var(--border);overflow:hidden;">'
      +'<div style="background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">Drill-Down Analysis</div>'
      +bc+summary+sections+'</div>';
  }());


  // ── Decision Tree Analysis ────────────────────────────────────────────────────
  const dtCard = (function() {
    const MIN_LEAF = 5;
    const MAX_DEPTH = 4;
    const DIMS = [
      {key:'htf',    label:'HTF POI',        get:function(t){return (t.data&&t.data['HTF POI']||'').split(',').map(function(v){return v.trim();}).filter(Boolean);}},
      {key:'extra',  label:'Extra',           get:function(t){return (t.data&&t.data['Extra körülmény']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='nincs'&&v!=='—';});}},
      {key:'against',label:'Ellene szól',     get:function(t){return (t.data&&t.data['Kötés ellen']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='semmi'&&v!=='—';});}},
      {key:'setup',  label:'Setup',           get:function(t){return Array.isArray(t.setup)?t.setup.map(function(v){return v.trim();}):[];}},
      {key:'stf',    label:'STF',             get:function(t){return t.stf?[stfLabel(t.stf)]:[]}},
      {key:'quality',label:'Minőségi setup',  get:function(t){return Array.isArray(t.qualitySetup)?t.qualitySetup:[]}},
      {key:'wrong',  label:'Hibás setup',     get:function(t){return Array.isArray(t.wrongSetup)?t.wrongSetup:[]}},
    ];

    function metrics(trades) {
      var n=trades.length, wins=0, bes=0, losses=0;
      trades.forEach(function(t){
        if(t.outcome==='win') wins++;
        else if(t.outcome==='be') bes++;
        else if(t.outcome==='loss') losses++;
      });
      var wr = n>0 ? Math.round((wins+bes)/n*100) : 0;
      var pts = wins - losses;
      return {n:n, wins:wins, bes:bes, losses:losses, wr:wr, pts:pts};
    }

    // Gini impurity for binary win/loss split
    function gini(trades) {
      var n = trades.length;
      if (!n) return 0;
      var wins = trades.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length;
      var p = wins/n;
      return 1 - p*p - (1-p)*(1-p);
    }

    // Find best split dimension and value for given trades
    function bestSplit(trades, usedDims) {
      var bestG = Infinity, bestDim = null, bestVal = null, bestIn = [], bestOut = [];
      DIMS.forEach(function(dim) {
        if (usedDims.indexOf(dim.key) >= 0) return;
        // Collect all unique values
        var valSet = {};
        trades.forEach(function(t){ dim.get(t).forEach(function(v){ valSet[v]=true; }); });
        Object.keys(valSet).forEach(function(val) {
          var inGroup  = trades.filter(function(t){ return dim.get(t).indexOf(val)>=0; });
          var outGroup = trades.filter(function(t){ return dim.get(t).indexOf(val)<0; });
          if (inGroup.length < MIN_LEAF || outGroup.length < MIN_LEAF) return;
          var g = (gini(inGroup)*inGroup.length + gini(outGroup)*outGroup.length) / trades.length;
          if (g < bestG) { bestG=g; bestDim=dim; bestVal=val; bestIn=inGroup; bestOut=outGroup; }
        });
      });
      return {dim:bestDim, val:bestVal, inGroup:bestIn, outGroup:bestOut, gain:bestG};
    }

    // Build tree recursively
    function buildNode(trades, depth, usedDims, path) {
      var m = metrics(trades);
      var node = {m:m, depth:depth, path:path, children:[], split:null, isLeaf:true};
      if (depth >= MAX_DEPTH || trades.length < MIN_LEAF*2) return node;
      var split = bestSplit(trades, usedDims);
      if (!split.dim) return node;
      node.isLeaf = false;
      node.split = {dim:split.dim, val:split.val};
      var newUsed = usedDims.concat([split.dim.key]);
      node.children = [
        buildNode(split.inGroup,  depth+1, newUsed, path.concat([{dim:split.dim.label, val:split.val, has:true}])),
        buildNode(split.outGroup, depth+1, newUsed, path.concat([{dim:split.dim.label, val:split.val, has:false}])),
      ];
      return node;
    }

    // Collect all leaf nodes for IF-THEN rules
    function collectLeaves(node, leaves) {
      if (node.isLeaf || !node.children.length) { leaves.push(node); return; }
      node.children.forEach(function(c){ collectLeaves(c, leaves); });
    }

    // Render a node as HTML (recursive)
    function renderNode(node, baseWr) {
      var m = node.m;
      var low = m.n < 20;
      var wrC = m.wr>=55?'var(--win)':m.wr>=45?'var(--yellow)':'var(--loss)';
      var ptC = m.pts>0?'var(--win)':m.pts===0?'var(--be)':'var(--loss)';
      var delta = m.wr - baseWr;
      var deltaC = delta>=5?'var(--win)':delta<=-5?'var(--loss)':'var(--muted)';
      var indent = node.depth * 16;

      // WLB mini bar
      var wp=m.n?Math.round(m.wins/m.n*100):0, bp=m.n?Math.round(m.bes/m.n*100):0, lp=Math.max(0,100-wp-bp);
      var miniBar = '<div style="display:flex;height:3px;width:60px;flex-shrink:0;">'
        +'<div style="flex:'+wp+';background:var(--win);"></div>'
        +'<div style="flex:'+bp+';background:var(--be);"></div>'
        +'<div style="flex:'+lp+';background:var(--loss);"></div>'
        +'</div>';

      var splitLabel = '';
      if (node.split) {
        var val = node.split.val.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        splitLabel = '<div style="font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);margin-bottom:3px;letter-spacing:0.08em;">'
          +node.split.dim.label+' › <span style="color:var(--text);">'+val+'</span></div>';
      }

      var pathLabel = '';
      if (node.path.length > 0) {
        var last = node.path[node.path.length-1];
        var sign = last.has ? '✓' : '✗';
        var sc = last.has ? 'var(--win)' : 'var(--loss)';
        pathLabel = '<span style="color:'+sc+';font-size:8px;margin-right:4px;">'+sign+'</span>'
          +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">'+last.val.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</span> ';
      }

      var nodeHtml = '<div style="margin-left:'+indent+'px;border-left:'+(node.depth>0?'2px solid var(--border)':'none')+';padding-left:'+(node.depth>0?'8px':'0')+';">'
        + '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;opacity:'+(low?0.6:1)+'">'
        + '<div style="flex:1;min-width:0;">'
        + pathLabel
        + splitLabel
        + '<span style="font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;color:'+wrC+';">'+m.wr+'%</span>'
        + '<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);margin-left:6px;">'+m.n+'db</span>'
        + (low?' <span style="color:var(--yellow);font-size:7px;">⚠</span>':'')
        + '</div>'
        + miniBar
        + '<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:'+ptC+';flex-shrink:0;width:28px;text-align:right;">'+(m.pts>0?'+':'')+m.pts+'</span>'
        + '<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:'+deltaC+';flex-shrink:0;width:28px;text-align:right;">'+(delta>0?'+':'')+delta+'%</span>'
        + '</div>';

      if (node.children.length) {
        node.children.forEach(function(child){ nodeHtml += renderNode(child, baseWr); });
      }
      nodeHtml += '</div>';
      return nodeHtml;
    }

    // Build tree
    var tree = buildNode(allTrades, 0, [], []);
    var baseWr = tree.m.wr;

    // Collect leaves and generate IF-THEN rules
    var leaves = [];
    collectLeaves(tree, leaves);
    leaves.sort(function(a,b){ return b.m.pts-a.m.pts; });
    var bestLeaves  = leaves.filter(function(l){return l.m.n>=MIN_LEAF&&l.m.pts>0;}).slice(0,3);
    var worstLeaves = leaves.filter(function(l){return l.m.n>=MIN_LEAF&&l.m.pts<0;}).slice(-3).reverse();

    function ruleFromPath(path) {
      if (!path.length) return 'IF (minden feltétel) → ';
      return 'IF ' + path.map(function(p){
        return (p.has ? '' : 'NINCS ') + p.dim + ' = ' + p.val.replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }).join(' ÉS ') + ' → ';
    }

    var rulesHtml = '';
    if (bestLeaves.length) {
      rulesHtml += '<div style="padding:10px 14px;border-bottom:1px solid var(--border);">'
        +'<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--win);letter-spacing:0.1em;margin-bottom:8px;">▲ LEGJOBB UTAK</div>';
      bestLeaves.forEach(function(l){
        rulesHtml += '<div style="font-family:\'Space Mono\',monospace;font-size:8px;line-height:1.6;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border);">'
          +ruleFromPath(l.path)
          +'<span style="color:var(--win);font-weight:700;">'+l.m.wr+'% WR, '+(l.m.pts>0?'+':'')+l.m.pts+' pt, '+l.m.n+'db</span></div>';
      });
      rulesHtml += '</div>';
    }
    if (worstLeaves.length) {
      rulesHtml += '<div style="padding:10px 14px;border-bottom:1px solid var(--border);">'
        +'<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--loss);letter-spacing:0.1em;margin-bottom:8px;">▼ LEGROSSZABB UTAK</div>';
      worstLeaves.forEach(function(l){
        rulesHtml += '<div style="font-family:\'Space Mono\',monospace;font-size:8px;line-height:1.6;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border);">'
          +ruleFromPath(l.path)
          +'<span style="color:var(--loss);font-weight:700;">'+l.m.wr+'% WR, '+(l.m.pts>0?'+':'')+l.m.pts+' pt, '+l.m.n+'db</span></div>';
      });
      rulesHtml += '</div>';
    }

    var sampleWarn = allTrades.length < 200
      ? '<div style="border:1px solid var(--yellow);margin:12px 14px;padding:8px 12px;font-family:\'Space Mono\',monospace;font-size:8px;color:var(--yellow);line-height:1.5;">⚠ '+(200-allTrades.length)+' kötés hiányzik a 200-as megbízható mintamérethez. Az eredmények tájékoztató jellegűek.</div>'
      : '';

    // Column headers
    var header = '<div style="display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid var(--border);background:var(--surface);">'
      +'<div style="flex:1;font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;">Feltétel</div>'
      +'<div style="width:60px;font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);letter-spacing:0.08em;text-align:center;">W/BE/L</div>'
      +'<div style="width:28px;font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);text-align:right;">Pont</div>'
      +'<div style="width:28px;font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);text-align:right;">Δ%</div>'
      +'</div>';

    return '<div style="border:1px solid var(--border);overflow:hidden;">'
      +'<div style="background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">Decision Tree</div>'
      + sampleWarn
      + rulesHtml
      + header
      +'<div style="padding:8px 14px;">'
      + renderNode(tree, baseWr)
      +'</div></div>';
  }());


  // ── Ranking: Top 10 / Worst 10 combinations ──────────────────────────────────
  const rankingCard = (function() {
    if (allTrades.length === 0) return '<div style="padding:20px;font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">Nincs adat.</div>';

    // Build all combinations: for each trade, join ALL its factor values into one key
    // Group colours: HTF=green, Extra=blue, Ellene=yellow, Setup=grey, Minőségi=green, Hibás=yellow, STF=grey
    var GROUP_COLORS = {
      htf:     '#00e87a',
      extra:   '#4da6ff',
      against: '#ffcc00',
      setup:   '#888899',
      quality: '#00e87a',
      wrong:   '#ffcc00',
      stf:     '#888899',
    };
    // Order: HTF POI, Extra, Ellene szól, Setup, Minőségi setup, Hibás setup, STF
    var GROUP_ORDER = ['htf','extra','against','setup','quality','wrong','stf'];
    var GROUP_LABELS = {htf:'HTF POI',extra:'Extra',against:'Ellene szól',setup:'Setup',quality:'Minőségi',wrong:'Hibás setup',stf:'STF'};

    function getParts(t) {
      return {
        htf:     (t.data&&t.data['HTF POI']||'').split(',').map(function(v){return v.trim();}).filter(Boolean),
        extra:   (t.data&&t.data['Extra körülmény']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='nincs'&&v!=='—';}),
        against: (t.data&&t.data['Kötés ellen']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='semmi'&&v!=='—';}),
        setup:   Array.isArray(t.setup)?t.setup.map(function(v){return v.trim();}):[], 
        quality: Array.isArray(t.qualitySetup)?t.qualitySetup:[],
        wrong:   Array.isArray(t.wrongSetup)?t.wrongSetup:[],
        stf:     t.stf?[stfLabel(t.stf)]:[],
      };
    }
    function getKey(t) {
      var p = getParts(t);
      // Key ordered by group for consistent matching
      var parts = [];
      GROUP_ORDER.forEach(function(g){ p[g].forEach(function(v){ parts.push(g+':'+v); }); });
      return parts.length ? parts.join('|') : '—';
    }
    function keyToDisplay(key) {
      if (key === '—') return [{grp:'',val:'—',col:'var(--muted)'}];
      return key.split('|').map(function(s){
        var idx = s.indexOf(':');
        var g = s.slice(0,idx), v = s.slice(idx+1);
        return {grp:g, val:v, col:GROUP_COLORS[g]||'var(--text)'};
      });
    }

    var comboMap = {};
    allTrades.forEach(function(t) {
      var key = getKey(t);
      if (!comboMap[key]) comboMap[key] = {key:key, win:0, be:0, loss:0, total:0};
      comboMap[key].total++;
      if (t.outcome==='win') comboMap[key].win++;
      else if (t.outcome==='be') comboMap[key].be++;
      else if (t.outcome==='loss') comboMap[key].loss++;
    });

    var combos = Object.values(comboMap).map(function(c) {
      return Object.assign({}, c, {
        wr:  c.total>0 ? Math.round((c.win+c.be)/c.total*100) : 0,
        pts: c.win - c.loss
      });
    });

    // Sort by pts desc, then wr, then total
    var sorted = combos.slice().sort(function(a,b){
      return (b.pts-a.pts)||(b.wr-a.wr)||(b.total-a.total);
    });

    var top10   = sorted.filter(function(c){return c.total>=1;}).slice(0,10);
    var worst10 = sorted.filter(function(c){return c.total>=1;}).slice(-10).reverse();

    function wrCol(v){return v>=55?'var(--win)':v>=45?'var(--yellow)':'var(--loss)';}
    function ptsCol(v){return v>0?'var(--win)':v===0?'var(--be)':'var(--loss)';}

    function comboRow(c, rank, accent) {
      var low = c.total < 10;
      var parts = keyToDisplay(c.key);
      var tagsHtml = parts.map(function(p){
        var safe = p.val.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return '<span style="display:inline-block;margin:2px 2px 2px 0;padding:2px 6px;font-family:\'Space Mono\',monospace;font-size:7px;letter-spacing:0.06em;border:1px solid '+p.col+';color:'+p.col+';white-space:nowrap;">'+safe+'</span>';
      }).join('');
      var wp=c.total?Math.round(c.win/c.total*100):0, bp=c.total?Math.round(c.be/c.total*100):0, lp=Math.max(0,100-wp-bp);
      var bar = '<div style="display:flex;height:3px;width:48px;flex-shrink:0;">'
        +'<div style="flex:'+wp+';background:var(--win);"></div>'
        +'<div style="flex:'+bp+';background:var(--be);"></div>'
        +'<div style="flex:'+lp+';background:var(--loss);"></div>'
        +'</div>';
      return '<div style="display:flex;align-items:flex-start;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);opacity:'+(low?'0.55':'1')+'">'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;color:'+accent+';flex-shrink:0;width:18px;">'+rank+'.</span>'
        +'<div style="flex:1;min-width:0;">'
        +'<div style="line-height:1.6;flex-wrap:wrap;display:flex;">'+tagsHtml+'</div>'
        +'<div style="display:flex;align-items:center;gap:8px;margin-top:4px;">'
        +bar
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">'+c.win+'W '+c.be+'BE '+c.loss+'L</span>'
        +(low?'<span style="color:var(--yellow);font-size:7px;">⚠</span>':'')
        +'</div>'
        +'</div>'
        +'<div style="flex-shrink:0;text-align:right;">'
        +'<div style="font-size:16px;font-weight:900;color:'+ptsCol(c.pts)+';">'+(c.pts>0?'+':'')+c.pts+'</div>'
        +'<div style="font-family:\'Space Mono\',monospace;font-size:9px;color:'+wrCol(c.wr)+';">'+c.wr+'%</div>'
        +'<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">'+c.total+'db</div>'
        +'</div>'
        +'</div>';
    }

    var top10Html = top10.map(function(c,i){return comboRow(c, i+1, 'var(--win)');}).join('');
    var worst10Html = worst10.map(function(c,i){return comboRow(c, i+1, 'var(--loss)');}).join('');

    return '<div style="border:1px solid var(--border);overflow:hidden;">'
      // Top 10
      +'<div style="background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">'
      +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--win);">▲ Top 10 kombináció</span>'
      +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">pontszám · WR · db</span>'
      +'</div>'
      + top10Html
      // Worst 10
      +'<div style="background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);border-top:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;">'
      +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--loss);">▼ Worst 10 kombináció</span>'
      +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">pontszám · WR · db</span>'
      +'</div>'
      + worst10Html
      +'</div>';
  }());


  // ── Correlation Matrix ────────────────────────────────────────────────────────
  const corrCard = (function() {
    if (allTrades.length < 10) return '<div style="padding:20px;font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">Legalább 10 kötés szükséges.</div>';

    // Extract binary presence vectors for each factor value
    function getPresence(t, dim) {
      if (dim === 'HTF POI')        return (t.data&&t.data['HTF POI']||'').split(',').map(function(v){return v.trim();}).filter(Boolean);
      if (dim === 'Extra')          return (t.data&&t.data['Extra körülmény']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='nincs'&&v!=='—';});
      if (dim === 'Ellene szól')    return (t.data&&t.data['Kötés ellen']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='semmi'&&v!=='—';});
      if (dim === 'Setup')          return Array.isArray(t.setup)?t.setup.map(function(v){return v.trim();}):[];
      if (dim === 'STF')            return t.stf?[stfLabel(t.stf)]:[];
      if (dim === 'Minőségi setup') return Array.isArray(t.qualitySetup)?t.qualitySetup:[];
      if (dim === 'Hibás setup')    return Array.isArray(t.wrongSetup)?t.wrongSetup:[];
      return [];
    }

    var DIMS = ['HTF POI','Extra','Ellene szól','Setup','STF','Minőségi setup','Hibás setup'];
    var SHORT = {'HTF POI':'HTF','Extra':'Extra','Ellene szól':'Ellen','Setup':'Setup','STF':'STF','Minőségi setup':'Minőségi','Hibás setup':'Hibás'};

    // For each dim, get all unique values with frequency
    var dimValues = {}; // dim → [val,...]
    DIMS.forEach(function(dim) {
      var freq = {};
      allTrades.forEach(function(t){
        getPresence(t,dim).forEach(function(v){ freq[v]=(freq[v]||0)+1; });
      });
      // Only keep values that appear in ≥5 trades
      dimValues[dim] = Object.keys(freq).filter(function(v){ return freq[v]>=5; });
    });

    // Cramér's V between two binary 0/1 vectors (factor presence vs outcome/other factor)
    function cramersV(x, y, n) {
      // x, y: arrays of 0/1 length n
      // 2x2 contingency table
      var a=0,b=0,cc=0,d=0;
      for(var i=0;i<n;i++){
        if(x[i]===1&&y[i]===1) a++;
        else if(x[i]===1&&y[i]===0) b++;
        else if(x[i]===0&&y[i]===1) cc++;
        else d++;
      }
      var chi2num=(a*d-b*cc);
      var chi2 = n*chi2num*chi2num/((a+b)*(cc+d)*(a+cc)*(b+d)+0.00001);
      return Math.min(1, Math.sqrt(chi2/n));
    }

    // Build factor vectors: each dim gets a binary "any present" vector
    var dimVec = {}; // dim → [0/1 per trade]
    DIMS.forEach(function(dim) {
      dimVec[dim] = allTrades.map(function(t){ return getPresence(t,dim).length>0 ? 1 : 0; });
    });

    // Outcome vectors
    var winVec  = allTrades.map(function(t){ return t.outcome==='win'||t.outcome==='be' ? 1 : 0; });
    var lossVec = allTrades.map(function(t){ return t.outcome==='loss' ? 1 : 0; });

    var n = allTrades.length;

    // Compute correlation: factors vs outcome + factors vs factors
    // Rows: DIMS, Cols: WIN, LOSS + DIMS
    var COLS = ['Win/BE','Loss'].concat(DIMS);
    var colVecs = [winVec, lossVec].concat(DIMS.map(function(d){ return dimVec[d]; }));

    // For each dim, compute Cramér's V with each col
    var matrix = {}; // dim → {col: v}
    DIMS.forEach(function(dim) {
      matrix[dim] = {};
      colVecs.forEach(function(cv, ci) {
        var col = COLS[ci];
        if (col === dim) { matrix[dim][col] = 1; return; }
        matrix[dim][col] = cramersV(dimVec[dim], cv, n);
      });
    });

    // Per-dim WR when present vs absent
    var dimWr = {};
    DIMS.forEach(function(dim) {
      var present = allTrades.filter(function(t){ return getPresence(t,dim).length>0; });
      var absent  = allTrades.filter(function(t){ return getPresence(t,dim).length===0; });
      dimWr[dim] = {
        n: present.length,
        wr: present.length>0 ? Math.round(present.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length/present.length*100) : 0,
        base: n>0 ? Math.round(winVec.filter(function(v){return v;}).length/n*100) : 0
      };
    });

    // Color scale: 0 → transparent, 1 → strong accent
    function cellColor(v, isDiag) {
      if (isDiag) return 'rgba(200,255,0,0.15)';
      if (v < 0.05) return 'transparent';
      var intensity = Math.min(v * 2.5, 1); // scale 0-0.4 → 0-1
      var r = Math.round(200 * intensity);
      var g = Math.round(255 * intensity);
      return 'rgba('+r+','+g+',0,'+Math.round(intensity*0.35)+')';
    }
    function cellText(v, isDiag) {
      if (isDiag) return '—';
      return (v*100).toFixed(0);
    }

    var sampleWarn = n < 200
      ? '<div style="border:1px solid var(--yellow);margin:10px 14px;padding:7px 12px;font-family:\'Space Mono\',monospace;font-size:8px;color:var(--yellow);line-height:1.5;">⚠ '+(200-n)+' kötés hiányzik a megbízható elemzéshez.</div>'
      : '';

    // Render matrix
    var cellW = 42;
    var rowH  = 32;
    var labelW = 80;
    var OUTCOLS = ['Win/BE','Loss'];
    var FCOLS   = DIMS;

    // Header row
    var header = '<div style="display:flex;padding-left:'+labelW+'px;">';
    // Outcome cols
    OUTCOLS.forEach(function(col) {
      var c2 = col==='Win/BE'?'var(--win)':'var(--loss)';
      header += '<div style="width:'+cellW+'px;flex-shrink:0;font-family:\'Space Mono\',monospace;font-size:7px;text-align:center;padding:4px 2px;color:'+c2+';letter-spacing:0.06em;border-bottom:1px solid var(--border);border-right:1px solid var(--border);">'+col+'</div>';
    });
    header += '<div style="width:8px;flex-shrink:0;border-bottom:1px solid var(--border);"></div>';
    // Factor cols
    FCOLS.forEach(function(col) {
      header += '<div style="width:'+cellW+'px;flex-shrink:0;font-family:\'Space Mono\',monospace;font-size:7px;text-align:center;padding:4px 2px;color:var(--muted);letter-spacing:0.06em;border-bottom:1px solid var(--border);border-right:1px solid var(--border);">'+SHORT[col]+'</div>';
    });
    header += '</div>';

    // Data rows
    var rowsHtml = '';
    DIMS.forEach(function(dim) {
      var dwr = dimWr[dim];
      var delta = dwr.wr - dwr.base;
      var dCol = delta>=5?'var(--win)':delta<=-5?'var(--loss)':'var(--muted)';
      rowsHtml += '<div style="display:flex;align-items:center;border-bottom:1px solid var(--border);">';
      // Row label
      rowsHtml += '<div style="width:'+labelW+'px;flex-shrink:0;padding:4px 8px;">'
        +'<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+SHORT[dim]+'</div>'
        +'<div style="font-family:\'Space Mono\',monospace;font-size:7px;color:'+dCol+';">'+(delta>0?'+':'')+delta+'%<span style="color:var(--muted);"> ('+dwr.n+')</span></div>'
        +'</div>';
      // Outcome cols
      OUTCOLS.forEach(function(col) {
        var v = matrix[dim][col];
        var bg = v < 0.05 ? 'transparent' : ('rgba('+(col==='Win/BE'?'0,232,122':'255,68,85')+','+Math.min(v*2,0.4)+')');
        var strength = v < 0.05 ? '·' : v < 0.1 ? '~' : v < 0.2 ? (v*100).toFixed(0) : '<b>'+(v*100).toFixed(0)+'</b>';
        rowsHtml += '<div style="width:'+cellW+'px;flex-shrink:0;height:'+rowH+'px;display:flex;align-items:center;justify-content:center;background:'+bg+';border-right:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;color:var(--text);">'+strength+'</div>';
      });
      // Separator
      rowsHtml += '<div style="width:8px;flex-shrink:0;background:var(--border);height:'+rowH+'px;"></div>';
      // Factor cols
      FCOLS.forEach(function(col) {
        var isDiag = col === dim;
        var v = isDiag ? 1 : matrix[dim][col];
        var bg = isDiag ? 'rgba(200,255,0,0.08)' : (v < 0.05 ? 'transparent' : 'rgba(200,255,0,'+Math.min(v*1.5,0.3)+')');
        var txt = isDiag ? '✕' : (v < 0.05 ? '·' : v < 0.1 ? '~' : (v*100).toFixed(0));
        if (!isDiag && v >= 0.2) txt = '<b>'+txt+'</b>';
        rowsHtml += '<div style="width:'+cellW+'px;flex-shrink:0;height:'+rowH+'px;display:flex;align-items:center;justify-content:center;background:'+bg+';border-right:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">'+txt+'</div>';
