    // Legend
    var legend = '<div style="padding:8px 14px;display:flex;gap:16px;align-items:center;border-top:1px solid var(--border);">'
      +'<span style="font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);">·=gyenge  ~=enyhe  szám=közepes  <b>szám</b>=erős  (Cramér\'s V × 100)</span>'
      +'</div>';

    return '<div style="border:1px solid var(--border);overflow:hidden;">'
      +'<div style="background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">Correlation Matrix</div>'
      + sampleWarn
      +'<div style="overflow-x:auto;padding:10px 14px 0;">'
      + header + rowsHtml
      +'</div>'
      + legend
      +'</div>';
  }());


  // ── Rule Extraction ───────────────────────────────────────────────────────────
  const rulesCard = (function() {
    if (allTrades.length < 10) return '<div style="padding:20px;font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">Legalább 10 kötés szükséges.</div>';

    var n = allTrades.length;
    var baseWin  = allTrades.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length;
    var baseWr   = Math.round(baseWin/n*100);
    var basePts  = allTrades.filter(function(t){return t.outcome==='win';}).length - allTrades.filter(function(t){return t.outcome==='loss';}).length;

    function getVals(t, dim) {
      if (dim === 'HTF POI')        return (t.data&&t.data['HTF POI']||'').split(',').map(function(v){return v.trim();}).filter(Boolean);
      if (dim === 'Extra')          return (t.data&&t.data['Extra körülmény']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='nincs'&&v!=='—';});
      if (dim === 'Ellene szól')    return (t.data&&t.data['Kötés ellen']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='semmi'&&v!=='—';});
      if (dim === 'Setup')          return Array.isArray(t.setup)?t.setup.map(function(v){return v.trim();}):[];
      if (dim === 'STF')            return t.stf?[stfLabel(t.stf)]:[];
      if (dim === 'Minőségi setup') return Array.isArray(t.qualitySetup)?t.qualitySetup:[];
      if (dim === 'Hibás setup')    return Array.isArray(t.wrongSetup)?t.wrongSetup:[];
      return [];
    }

    var DIMS = ['HTF POI','Extra','Ellene szól','Setup','STF','Minőségi setup','Hibás setup'];

    // ── Single-factor rules ────────────────────────────────────────────────────
    var single1 = []; // {cond, trades, wins, losses, bes, pts, wr, delta, verdict}
    DIMS.forEach(function(dim) {
      var valMap = {};
      allTrades.forEach(function(t) {
        getVals(t,dim).forEach(function(v) {
          if (!valMap[v]) valMap[v] = [];
          valMap[v].push(t);
        });
      });
      Object.keys(valMap).forEach(function(v) {
        var ts = valMap[v]; var m = ts.length;
        if (m < 3) return;
        var w = ts.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length;
        var l = ts.filter(function(t){return t.outcome==='loss';}).length;
        var wr = Math.round(w/m*100);
        var pts = ts.filter(function(t){return t.outcome==='win';}).length - l;
        single1.push({dim:dim, val:v, n:m, wr:wr, pts:pts, delta:wr-baseWr, wins:w, losses:l, bes:m-w-l});
      });
    });

    // ── Two-factor rules (pairs) ───────────────────────────────────────────────
    var pair2 = [];
    for (var di=0; di<DIMS.length; di++) {
      for (var dj=di+1; dj<DIMS.length; dj++) {
        var dimA = DIMS[di], dimB = DIMS[dj];
        var pairMap = {};
        allTrades.forEach(function(t) {
          var vA = getVals(t,dimA), vB = getVals(t,dimB);
          vA.forEach(function(a) {
            vB.forEach(function(b) {
              var key = a+'||'+b;
              if (!pairMap[key]) pairMap[key] = {a:a,b:b,dimA:dimA,dimB:dimB,ts:[]};
              pairMap[key].ts.push(t);
            });
          });
        });
        Object.keys(pairMap).forEach(function(key) {
          var p = pairMap[key]; var ts = p.ts; var m = ts.length;
          if (m < 5) return;
          var w = ts.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length;
          var l = ts.filter(function(t){return t.outcome==='loss';}).length;
          var wr = Math.round(w/m*100);
          var pts = ts.filter(function(t){return t.outcome==='win';}).length - l;
          var delta = wr - baseWr;
          if (Math.abs(delta) < 5) return; // only meaningful
          pair2.push({dimA:p.dimA,valA:p.a,dimB:p.dimB,valB:p.b,n:m,wr:wr,pts:pts,delta:delta,wins:w,losses:l,bes:m-w-l});
        });
      }
    }

    // Sort by pts desc / asc
    single1.sort(function(a,b){ return (b.pts-a.pts)||(b.wr-a.wr); });
    pair2.sort(function(a,b){ return (b.pts-a.pts)||(b.wr-a.wr); });

    var singlePos = single1.filter(function(r){ return r.delta >= 5; }).slice(0,6);
    var singleNeg = single1.filter(function(r){ return r.delta <= -5; }).slice(-6).reverse();
    var pairPos   = pair2.filter(function(r){ return r.delta >= 5; }).slice(0,5);
    var pairNeg   = pair2.filter(function(r){ return r.delta <= -5; }).slice(-5).reverse();

    function wrCol(v){return v>=55?'var(--win)':v>=45?'var(--yellow)':'var(--loss)';}
    function ptsCol(v){return v>0?'var(--win)':v===0?'var(--be)':'var(--loss)';}

    function ruleRow(rule, type) {
      var low = rule.n < 20;
      var deltaC = rule.delta >= 10 ? 'var(--win)' : rule.delta >= 5 ? 'var(--accent)' : rule.delta <= -10 ? 'var(--loss)' : 'var(--yellow)';
      var verdict = rule.delta >= 10 ? '▲ ERŐS' : rule.delta >= 5 ? '▲ POZITÍV' : rule.delta <= -10 ? '▼ KERÜL' : '▼ GYENGE';
      var accentBorder = rule.delta > 0 ? 'var(--win)' : 'var(--loss)';
      var cond = '';
      if (type === 'single') {
        cond = 'IF <span style="color:var(--accent);">'+rule.dim+'</span> = <b>'+rule.val.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</b>';
      } else {
        cond = 'IF <span style="color:var(--accent);">'+rule.dimA+'</span> = <b>'+rule.valA.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</b>'
             + ' ÉS <span style="color:var(--accent);">'+rule.dimB+'</span> = <b>'+rule.valB.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</b>';
      }
      var action = rule.delta >= 5
        ? '→ <span style="color:var(--win);">Előnyt jelent</span>'
        : '→ <span style="color:var(--loss);">Kerülendő</span>';
      var wp=rule.n?Math.round(rule.wins/rule.n*100):0, bp=rule.n?Math.round(rule.bes/rule.n*100):0, lp=Math.max(0,100-wp-bp);
      var bar = '<div style="display:flex;height:3px;width:60px;margin:3px 0;">'
        +'<div style="flex:'+wp+';background:var(--win);"></div>'
        +'<div style="flex:'+bp+';background:var(--be);"></div>'
        +'<div style="flex:'+lp+';background:var(--loss);"></div></div>';
      return '<div style="padding:10px 14px;border-bottom:1px solid var(--border);border-left:3px solid '+accentBorder+';opacity:'+(low?0.55:1)+'">'
        +'<div style="font-family:\'Space Mono\',monospace;font-size:9px;line-height:1.7;color:var(--text);margin-bottom:4px;">'+cond+' '+action+'</div>'
        + bar
        +'<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:'+wrCol(rule.wr)+';">'+rule.wr+'% WR</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:'+ptsCol(rule.pts)+';">'+(rule.pts>0?'+':'')+rule.pts+' pt</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:'+deltaC+';">'+(rule.delta>0?'+':'')+rule.delta+'% az alaptól</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">'+rule.n+' kötés</span>'
        +(low?'<span style="color:var(--yellow);font-size:8px;">⚠ alacsony minta</span>':'')
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;font-weight:700;color:'+deltaC+';margin-left:auto;">'+verdict+'</span>'
        +'</div></div>';
    }

    function section(title, col, rows, type) {
      if (!rows.length) return '';
      return '<div style="border-bottom:1px solid var(--border);">'
        +'<div style="padding:8px 14px;font-family:\'Space Mono\',monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:'+col+';background:var(--surface);">'+title+'</div>'
        + rows.map(function(r){ return ruleRow(r, type); }).join('')
        +'</div>';
    }

    var sampleWarn = n < 200
      ? '<div style="border:1px solid var(--yellow);margin:10px 14px;padding:7px 12px;font-family:\'Space Mono\',monospace;font-size:8px;color:var(--yellow);line-height:1.5;">⚠ '+(200-n)+' kötés hiányzik a statisztikailag megbízható szabályokhoz. Az alap WR: '+baseWr+'%.</div>'
      : '<div style="padding:8px 14px;font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">Alap WR: '+baseWr+'% ('+n+' kötés)</div>';

    return '<div style="border:1px solid var(--border);overflow:hidden;">'
      +'<div style="background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">Rule Extraction</div>'
      + sampleWarn
      + section('▲ Erős egyfaktoros szabályok — előnyös',   'var(--win)',  singlePos, 'single')
      + section('▼ Gyenge egyfaktoros szabályok — kerülendő', 'var(--loss)', singleNeg, 'single')
      + section('▲ Erős kétfaktoros szabályok — előnyös',   'var(--win)',  pairPos,   'pair')
      + section('▼ Gyenge kétfaktoros szabályok — kerülendő','var(--loss)', pairNeg,   'pair')
      +'</div>';
  }());


  // ── Heatmap Analysis ─────────────────────────────────────────────────────────
  const hmCard = (function() {
    var DIMS = ['HTF POI','Extra','Ellene szól','Setup','STF','Minőségi setup','Hibás setup'];

    function getVals(t, dim) {
      if (dim === 'HTF POI')        return (t.data&&t.data['HTF POI']||'').split(',').map(function(v){return v.trim();}).filter(Boolean);
      if (dim === 'Extra')          return (t.data&&t.data['Extra körülmény']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='nincs'&&v!=='—';});
      if (dim === 'Ellene szól')    return (t.data&&t.data['Kötés ellen']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='semmi'&&v!=='—';});
      if (dim === 'Setup')          return Array.isArray(t.setup)?t.setup.map(function(v){return v.trim();}):[];
      if (dim === 'STF')            return t.stf?[stfLabel(t.stf)]:[];
      if (dim === 'Minőségi setup') return Array.isArray(t.qualitySetup)?t.qualitySetup:[];
      if (dim === 'Hibás setup')    return Array.isArray(t.wrongSetup)?t.wrongSetup:[];
      return [];
    }

    var dimX = _hmDimX, dimY = _hmDimY;

    // Collect all values for each dim (min 3 occurrences)
    function collectVals(dim) {
      var freq = {};
      allTrades.forEach(function(t){ getVals(t,dim).forEach(function(v){ freq[v]=(freq[v]||0)+1; }); });
      return Object.keys(freq).filter(function(v){ return freq[v]>=3; }).sort();
    }

    var xVals = collectVals(dimX);
    var yVals = collectVals(dimY);

    // Build matrix
    var matrix = {}; // xVal+'||'+yVal → {win,be,loss,total}
    allTrades.forEach(function(t) {
      var xv = getVals(t, dimX);
      var yv = getVals(t, dimY);
      xv.forEach(function(x) {
        yv.forEach(function(y) {
          var k = x+'||'+y;
          if (!matrix[k]) matrix[k] = {win:0,be:0,loss:0,total:0};
          matrix[k].total++;
          if (t.outcome==='win') matrix[k].win++;
          else if (t.outcome==='be') matrix[k].be++;
          else if (t.outcome==='loss') matrix[k].loss++;
        });
      });
    });

    // Color: green positive, red negative, grey neutral
    function cellBg(wr, pts, total) {
      if (!total) return '#111116';
      var low = total < 10;
      if (_hmMetric === 'wr') {
        if (wr >= 65) return low?'rgba(0,232,122,0.15)':'rgba(0,232,122,0.55)';
        if (wr >= 55) return low?'rgba(0,232,122,0.08)':'rgba(0,232,122,0.30)';
        if (wr >= 45) return low?'rgba(136,136,153,0.08)':'rgba(136,136,153,0.20)';
        if (wr >= 35) return low?'rgba(255,68,85,0.08)':'rgba(255,68,85,0.25)';
        return low?'rgba(255,68,85,0.15)':'rgba(255,68,85,0.50)';
      } else {
        if (pts > 5)  return low?'rgba(0,232,122,0.12)':'rgba(0,232,122,0.45)';
        if (pts > 0)  return low?'rgba(0,232,122,0.06)':'rgba(0,232,122,0.22)';
        if (pts === 0)return low?'rgba(136,136,153,0.06)':'rgba(136,136,153,0.18)';
        if (pts > -5) return low?'rgba(255,68,85,0.06)':'rgba(255,68,85,0.22)';
        return low?'rgba(255,68,85,0.12)':'rgba(255,68,85,0.45)';
      }
    }
    function cellTextColor(wr, pts, total) {
      if (!total) return 'var(--muted)';
      if (_hmMetric === 'wr') return wr>=55?'var(--win)':wr>=45?'var(--be)':'var(--loss)';
      return pts>0?'var(--win)':pts===0?'var(--be)':'var(--loss)';
    }

    // Dim selector
    function dimSelect(axis, current) {
      return '<select onchange="event.stopPropagation();hmSetDim(\''+axis+'\',this.value)" '
        +'style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:\'Space Mono\',monospace;font-size:8px;padding:3px 6px;cursor:pointer;">'
        + DIMS.map(function(d){ return '<option value="'+d+'"'+(d===current?' selected':'')+'>'+d+'</option>'; }).join('')
        +'</select>';
    }

    var CELL = 52;  // cell width px
    var RLAB = 100; // row label width

    if (!xVals.length || !yVals.length) {
      return '<div style="padding:20px;font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">Nincs elegendő adat a kiválasztott dimenziókhoz.</div>';
    }

    // Header row
    var headerCells = xVals.map(function(x) {
      var safe = x.replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return '<div style="width:'+CELL+'px;flex-shrink:0;padding:4px 2px;font-family:\'Space Mono\',monospace;font-size:7px;text-align:center;color:var(--muted);border-right:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+safe+'">'+safe+'</div>';
    }).join('');

    // Data rows
    var rows = yVals.map(function(y) {
      var ySafe = y.replace(/</g,'&lt;').replace(/>/g,'&gt;');
      var cells = xVals.map(function(x) {
        var d = matrix[x+'||'+y] || {win:0,be:0,loss:0,total:0};
        var wr  = d.total>0 ? Math.round((d.win+d.be)/d.total*100) : 0;
        var pts = d.win - d.loss;
        var bg  = cellBg(wr, pts, d.total);
        var tc  = cellTextColor(wr, pts, d.total);
        var label = d.total===0 ? '—' : (_hmMetric==='wr' ? wr+'%' : (pts>0?'+':'')+pts);
        var low = d.total>0 && d.total<10;
        return '<div style="width:'+CELL+'px;flex-shrink:0;height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:'+bg+';border-right:1px solid var(--border);border-bottom:1px solid var(--border);gap:1px;">'
          +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;color:'+(d.total?tc:'var(--border)')+';">'+label+(low?' ⚠':'')+'</span>'
          +(d.total?'<span style="font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);">'+d.total+'</span>':'')
          +'</div>';
      }).join('');
      return '<div style="display:flex;align-items:stretch;">'
        +'<div style="width:'+RLAB+'px;flex-shrink:0;padding:4px 8px;font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);border-right:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+ySafe+'">'+ySafe+'</div>'
        + cells
        +'</div>';
    }).join('');

    // Controls
    var controls = '<div style="padding:8px 14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);">'
      +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">X tengely:</span>'+dimSelect('x', dimX)
      +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">Y tengely:</span>'+dimSelect('y', dimY)
      +'<div style="margin-left:auto;display:flex;gap:4px;">'
      +'<button onclick="event.stopPropagation();hmSetMetric(\'wr\')" style="background:'+(_hmMetric==='wr'?'var(--accent)':'transparent')+';border:1px solid '+(_hmMetric==='wr'?'var(--accent)':'var(--border)')+';color:'+(_hmMetric==='wr'?'#0a0a0c':'var(--muted)')+';font-family:\'Space Mono\',monospace;font-size:8px;padding:3px 8px;cursor:pointer;border-radius:0;">WR%</button>'
      +'<button onclick="event.stopPropagation();hmSetMetric(\'pts\')" style="background:'+(_hmMetric==='pts'?'var(--accent)':'transparent')+';border:1px solid '+(_hmMetric==='pts'?'var(--accent)':'var(--border)')+';color:'+(_hmMetric==='pts'?'#0a0a0c':'var(--muted)')+';font-family:\'Space Mono\',monospace;font-size:8px;padding:3px 8px;cursor:pointer;border-radius:0;">Pont</button>'
      +'</div></div>';

    var legend = '<div style="padding:6px 14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;border-top:1px solid var(--border);">'
      +'<div style="display:flex;gap:4px;align-items:center;">'
      +'<div style="width:12px;height:12px;background:rgba(0,232,122,0.5);"></div><span style="font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);">erős pozitív</span></div>'
      +'<div style="display:flex;gap:4px;align-items:center;">'
      +'<div style="width:12px;height:12px;background:rgba(136,136,153,0.2);"></div><span style="font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);">neutrális</span></div>'
      +'<div style="display:flex;gap:4px;align-items:center;">'
      +'<div style="width:12px;height:12px;background:rgba(255,68,85,0.5);"></div><span style="font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);">erős negatív</span></div>'
      +'<span style="font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);margin-left:8px;">halvány = 10 alatti minta ⚠</span>'
      +'</div>';

    // X axis header (corner + xvals)
    var colHeader = '<div style="display:flex;">'
      +'<div style="width:'+RLAB+'px;flex-shrink:0;padding:4px 8px;font-family:\'Space Mono\',monospace;font-size:7px;color:var(--accent);border-right:1px solid var(--border);border-bottom:1px solid var(--border);">'+dimX+'</div>'
      + headerCells
      +'</div>';

    return '<div style="border:1px solid var(--border);overflow:hidden;">'
      +'<div style="background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">Heatmap</div>'
      + controls
      +'<div style="overflow-x:auto;padding-bottom:2px;">'
      +'<div style="min-width:'+(RLAB+xVals.length*CELL)+'px;">'
      + colHeader
      + rows
      +'</div></div>'
      + legend
      +'</div>';
  }());


  // ── Error Cluster Analysis ────────────────────────────────────────────────────
  const ecCard = (function() {
    var n = allTrades.length;
    if (n < 10) return '<div style="padding:20px;font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">Legalább 10 kötés szükséges.</div>';

    var baseWr  = Math.round(allTrades.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length/n*100);
    var basePts = allTrades.filter(function(t){return t.outcome==='win';}).length - allTrades.filter(function(t){return t.outcome==='loss';}).length;

    // Extract error factors per trade (Ellene szól + Hibás setup)
    function getErrors(t) {
      var ke = (t.data&&t.data['Kötés ellen']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='semmi'&&v!=='—';});
      var ws = Array.isArray(t.wrongSetup) ? t.wrongSetup.slice() : [];
      return ke.concat(ws);
    }

    function stats(trades) {
      var m = trades.length; if(!m) return {n:0,wr:0,pts:0,wins:0,bes:0,losses:0};
      var wins=trades.filter(function(t){return t.outcome==='win';}).length;
      var bes=trades.filter(function(t){return t.outcome==='be';}).length;
      var losses=trades.filter(function(t){return t.outcome==='loss';}).length;
      return {n:m,wr:Math.round((wins+bes)/m*100),pts:wins-losses,wins:wins,bes:bes,losses:losses};
    }

    // Group trades by error count
    var byCount = {0:[],1:[],2:[],3:[]};
    allTrades.forEach(function(t) {
      var errs = getErrors(t);
      var c2 = Math.min(errs.length, 3);
      byCount[c2].push(t);
    });

    // Build error cluster map (all combos of 1, 2, 3+ errors)
    var clusterMap = {}; // key → trades[]
    allTrades.forEach(function(t) {
      var errs = getErrors(t);
      if (!errs.length) return;
      // Single errors
      errs.forEach(function(e) {
        var k = e;
        if (!clusterMap[k]) clusterMap[k] = {key:k, errs:[e], trades:[]};
        clusterMap[k].trades.push(t);
      });
      // 2-error combos
      for (var i=0;i<errs.length;i++) {
        for (var j=i+1;j<errs.length;j++) {
          var pair = [errs[i],errs[j]].sort().join(' + ');
          if (!clusterMap[pair]) clusterMap[pair] = {key:pair, errs:[errs[i],errs[j]], trades:[]};
          clusterMap[pair].trades.push(t);
        }
      }
      // 3-error combos
      for (var i2=0;i2<errs.length;i2++) {
        for (var j2=i2+1;j2<errs.length;j2++) {
          for (var k2=j2+1;k2<errs.length;k2++) {
            var tri = [errs[i2],errs[j2],errs[k2]].sort().join(' + ');
            if (!clusterMap[tri]) clusterMap[tri] = {key:tri, errs:[errs[i2],errs[j2],errs[k2]], trades:[]};
            clusterMap[tri].trades.push(t);
          }
        }
      }
    });

    // Score clusters
    var clusters = Object.values(clusterMap).map(function(cl) {
      var s = stats(cl.trades);
      return Object.assign({}, cl, s, {size:cl.errs.length, delta:s.wr-baseWr});
    }).filter(function(cl){ return cl.n >= 3; });

    // Sort by pts asc (worst first)
    clusters.sort(function(a,b){ return (a.pts-b.pts)||(a.wr-b.wr); });

    var single1 = clusters.filter(function(c){return c.size===1;});
    var double2 = clusters.filter(function(c){return c.size===2;});
    var triple3 = clusters.filter(function(c){return c.size>=3;});

    function wrCol(v){return v>=55?'var(--win)':v>=45?'var(--yellow)':'var(--loss)';}
    function ptsCol(v){return v>0?'var(--win)':v===0?'var(--be)':'var(--loss)';}

    function clusterRow(cl) {
      var low = cl.n < 20;
      var safe = cl.key.replace(/</g,'&lt;').replace(/>/g,'&gt;');
      var deltaC = cl.delta>=-5?'var(--muted)':cl.delta>=-15?'var(--yellow)':'var(--loss)';
      var wp=cl.n?Math.round(cl.wins/cl.n*100):0, bp=cl.n?Math.round(cl.bes/cl.n*100):0, lp=Math.max(0,100-wp-bp);
      var bar = '<div style="display:flex;height:3px;width:56px;margin:3px 0;">'
        +'<div style="flex:'+wp+';background:var(--win);"></div>'
        +'<div style="flex:'+bp+';background:var(--be);"></div>'
        +'<div style="flex:'+lp+';background:var(--loss);"></div></div>';
      return '<div style="display:flex;align-items:flex-start;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);border-left:3px solid var(--loss);opacity:'+(low?'0.55':'1')+'">'
        +'<div style="flex:1;min-width:0;">'
        +'<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--text);line-height:1.5;word-break:break-word;">'+safe+'</div>'
        +bar
        +'<div style="display:flex;gap:10px;align-items:center;">'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">'+cl.wins+'W '+cl.bes+'BE '+cl.losses+'L</span>'
        +(low?'<span style="color:var(--yellow);font-size:7px;">⚠</span>':'')
        +'</div>'
        +'</div>'
        +'<div style="flex-shrink:0;text-align:right;min-width:64px;">'
        +'<div style="font-size:15px;font-weight:900;color:'+wrCol(cl.wr)+';">'+cl.wr+'%</div>'
        +'<div style="font-family:\'Space Mono\',monospace;font-size:9px;color:'+ptsCol(cl.pts)+';">'+(cl.pts>0?'+':'')+cl.pts+' pt</div>'
        +'<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:'+deltaC+';">'+(cl.delta>0?'+':'')+cl.delta+'%</div>'
        +'<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">'+cl.n+'db</div>'
        +'</div>'
        +'</div>';
    }

    // Summary comparison: 0 errors vs 1 vs 2+ vs 3+
    var s0=stats(byCount[0]), s1=stats(byCount[1]), s2=stats(byCount[2]), s3=stats(byCount[3]);
    function summRow(label, s, col) {
      if (!s.n) return '';
      var wp=Math.round(s.wins/s.n*100), bp=Math.round(s.bes/s.n*100), lp=Math.max(0,100-wp-bp);
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);">'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:'+col+';flex-shrink:0;width:80px;">'+label+'</span>'
        +'<div style="flex:1;">'
        +'<div style="display:flex;height:6px;">'
        +'<div style="flex:'+wp+';background:var(--win);"></div>'
        +'<div style="flex:'+bp+';background:var(--be);"></div>'
        +'<div style="flex:'+lp+';background:var(--loss);"></div>'
        +'</div></div>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:10px;font-weight:700;color:'+wrCol(s.wr)+';flex-shrink:0;width:36px;text-align:right;">'+s.wr+'%</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:'+ptsCol(s.pts)+';flex-shrink:0;width:32px;text-align:right;">'+(s.pts>0?'+':'')+s.pts+'</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);flex-shrink:0;width:28px;text-align:right;">'+s.n+'</span>'
        +'</div>';
    }

    var sampleWarn = n < 200
      ? '<div style="border:1px solid var(--yellow);margin:8px 14px;padding:6px 12px;font-family:\'Space Mono\',monospace;font-size:8px;color:var(--yellow);line-height:1.5;">⚠ '+(200-n)+' kötés hiányzik a megbízható elemzéshez. Alap WR: '+baseWr+'%.</div>'
      : '';

    function section(title, list, badge) {
      if (!list.length) return '';
      return '<div style="border-bottom:1px solid var(--border);">'
        +'<div style="padding:7px 14px;display:flex;align-items:center;gap:8px;background:var(--surface);border-bottom:1px solid var(--border);">'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--loss);">'+title+'</span>'
        +'<span style="background:rgba(255,68,85,0.15);border:1px solid var(--loss);color:var(--loss);font-family:\'Space Mono\',monospace;font-size:7px;padding:1px 5px;">'+badge+'</span>'
        +'</div>'
        + list.slice(0,10).map(clusterRow).join('')
        +'</div>';
    }

    return '<div style="border:1px solid var(--border);overflow:hidden;">'
      +'<div style="background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">Error Cluster Analysis</div>'
      + sampleWarn
      // Summary
      +'<div style="background:var(--surface);padding:7px 14px;border-bottom:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;">Hibák összehasonlítása · WR% · Pont · db</div>'
      + summRow('0 hiba',   s0, 'var(--win)')
      + summRow('1 hiba',   s1, 'var(--yellow)')
      + summRow('2 hiba',   s2, 'var(--loss)')
      + summRow('3+ hiba',  s3, 'var(--loss)')
      // Sections
      + section('Egyszeres hibák — legrosszabb', single1.slice(0,10), '1 hiba')
      + section('Dupla hibák — veszélyes kombinációk', double2.slice(0,10), '2 hiba')
      + section('Hármas hibák — kritikus', triple3.slice(0,10), '3+ hiba')
      +'</div>';
  }());

  const tabNav = '<div style="margin-bottom:16px;">'
    + '<div style="display:flex;gap:0;border-bottom:1px solid var(--border);">'
    + '<button onclick="setAnalysisTab(\'ranking\')" style="background:transparent;border:none;border-bottom:2px solid '+(_analysisTab==="ranking"?'var(--accent)':'transparent')+';color:'+(_analysisTab==="ranking"?'var(--accent)':'var(--muted)')+';font-family:\'Space Mono\',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:8px 16px;cursor:pointer;">Ranking</button>'
    + '<button onclick="setAnalysisTab(\'hm\')" style="background:transparent;border:none;border-bottom:2px solid '+(_analysisTab==="hm"?'var(--accent)':'transparent')+';color:'+(_analysisTab==="hm"?'var(--accent)':'var(--muted)')+';font-family:\'Space Mono\',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:8px 16px;cursor:pointer;">Heatmap</button>'
    + '<button onclick="setAnalysisTab(\'clean-dirty\')" style="background:transparent;border:none;border-bottom:2px solid '+(_analysisTab==="clean-dirty"?'var(--accent)':'transparent')+';color:'+(_analysisTab==="clean-dirty"?'var(--accent)':'var(--muted)')+';font-family:\'Space Mono\',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:8px 16px;cursor:pointer;">Clean vs Dirty</button>'
    + '<button onclick="setAnalysisTab(\'corr\')" style="background:transparent;border:none;border-bottom:2px solid '+(_analysisTab==="corr"?'var(--accent)':'transparent')+';color:'+(_analysisTab==="corr"?'var(--accent)':'var(--muted)')+';font-family:\'Space Mono\',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:8px 16px;cursor:pointer;">Correlation</button>'
    + '<button onclick="setAnalysisTab(\'mfa\')" style="background:transparent;border:none;border-bottom:2px solid '+(_analysisTab==="mfa"?'var(--accent)':'transparent')+';color:'+(_analysisTab==="mfa"?'var(--accent)':'var(--muted)')+';font-family:\'Space Mono\',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:8px 16px;cursor:pointer;">Multi-Filter</button>'
    + '</div>'
    + '<div style="display:flex;gap:0;border-bottom:1px solid var(--border);">'
    + '<button onclick="setAnalysisTab(\'fi\')" style="background:transparent;border:none;border-bottom:2px solid '+(_analysisTab==="fi"?'var(--accent)':'transparent')+';color:'+(_analysisTab==="fi"?'var(--accent)':'var(--muted)')+';font-family:\'Space Mono\',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:8px 16px;cursor:pointer;">Factor Impact</button>'
    + '<button onclick="setAnalysisTab(\'dd\')" style="background:transparent;border:none;border-bottom:2px solid '+(_analysisTab==="dd"?'var(--accent)':'transparent')+';color:'+(_analysisTab==="dd"?'var(--accent)':'var(--muted)')+';font-family:\'Space Mono\',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:8px 16px;cursor:pointer;">Drill-Down</button>'
    + '<button onclick="setAnalysisTab(\'ec\')" style="background:transparent;border:none;border-bottom:2px solid '+(_analysisTab==="ec"?'var(--accent)':'transparent')+';color:'+(_analysisTab==="ec"?'var(--accent)':'var(--muted)')+';font-family:\'Space Mono\',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:8px 16px;cursor:pointer;">Error Cluster</button>'
    + '<button onclick="setAnalysisTab(\'dt\')" style="background:transparent;border:none;border-bottom:2px solid '+(_analysisTab==="dt"?'var(--accent)':'transparent')+';color:'+(_analysisTab==="dt"?'var(--accent)':'var(--muted)')+';font-family:\'Space Mono\',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:8px 16px;cursor:pointer;">Decision Tree</button>'
    + '<button onclick="setAnalysisTab(\'rules\')" style="background:transparent;border:none;border-bottom:2px solid '+(_analysisTab==="rules"?'var(--accent)':'transparent')+';color:'+(_analysisTab==="rules"?'var(--accent)':'var(--muted)')+';font-family:\'Space Mono\',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:8px 16px;cursor:pointer;">Rules</button>'
    + '</div>'
    + '</div>';
  const cleanDirtyCard = '<div style="' + outerBorder + ';margin-bottom:24px;overflow:hidden;">'
    + '<div style="background:var(--surface);padding:10px 16px;border-bottom:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">Clean vs Dirty</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1px 1fr;">'
    + '<div style="padding:16px 20px;cursor:pointer;transition:background 0.1s;border-right:2px solid var(--win);" onclick="evoCleanToggle()">'
    +   '<div style="font-family:\'Space Mono\',monospace;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--win);margin-bottom:10px;">&#9679; Clean <span style="font-size:8px;opacity:0.7;">' + (_cleanPanelOpen ? '&#9650;' : '&#9660;') + '</span></div>'
    +   '<div style="font-size:36px;font-weight:900;color:var(--win);line-height:1;">' + clean2.length + '</div>'
    +   '<div style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);margin:4px 0 12px;">trade</div>'
    +   '<div style="font-size:28px;font-weight:900;color:' + wrColX(cleanWr2) + ';line-height:1;">' + (cleanWr2 !== null ? cleanWr2 + '%' : '—') + '</div>'
    +   '<div style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);margin-top:4px;">win rate</div>'
    +   (clean2.length > 0 ? '<div style="font-family:\'Space Mono\',monospace;font-size:9px;margin-top:8px;"><span style="color:var(--win);">' + clean2.filter(t=>t.outcome==='win').length + 'W</span> <span style="color:var(--be);">' + clean2.filter(t=>t.outcome==='be').length + 'BE</span> <span style="color:var(--loss);">' + clean2.filter(t=>t.outcome==='loss').length + 'L</span></div>' : '')
    + '</div>'
    + '<div style="background:var(--border);"></div>'
    + '<div style="padding:16px 20px;cursor:pointer;transition:background 0.1s;border-left:2px solid var(--yellow);" onclick="evoDirtyToggle()"'
    +   (_dirtyPanelOpen ? ' class="dirty-open"' : '')
    +   '>'
    +   '<div style="font-family:\'Space Mono\',monospace;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--yellow);margin-bottom:10px;">&#9679; Dirty <span style="font-size:8px;opacity:0.7;">' + (_dirtyPanelOpen ? '&#9650;' : '&#9660;') + '</span></div>'
    +   '<div style="font-size:36px;font-weight:900;color:var(--yellow);line-height:1;">' + dirty2.length + '</div>'
    +   '<div style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);margin:4px 0 12px;">trade</div>'
    +   '<div style="font-size:28px;font-weight:900;color:' + wrColX(dirtyWr2) + ';line-height:1;">' + (dirtyWr2 !== null ? dirtyWr2 + '%' : '—') + '</div>'
    +   '<div style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);margin-top:4px;">win rate</div>'
    +   (dirty2.length > 0 ? '<div style="font-family:\'Space Mono\',monospace;font-size:9px;margin-top:8px;"><span style="color:var(--win);">' + dirty2.filter(t=>t.outcome==='win').length + 'W</span> <span style="color:var(--be);">' + dirty2.filter(t=>t.outcome==='be').length + 'BE</span> <span style="color:var(--loss);">' + dirty2.filter(t=>t.outcome==='loss').length + 'L</span></div>' : '')
    + '</div>'
    + '</div>'
    + cleanPanel
    + dirtyPanel
    + '</div>';
  html = '<div class="view-title">Analízis</div>'
    + tabNav
    + (_analysisTab === 'ranking' ? rankingCard : _analysisTab === 'hm' ? hmCard : _analysisTab === 'clean-dirty' ? cleanDirtyCard : _analysisTab === 'corr' ? corrCard : _analysisTab === 'mfa' ? mfaCard : _analysisTab === 'fi' ? fiCard : _analysisTab === 'dd' ? ddCard : _analysisTab === 'ec' ? ecCard : _analysisTab === 'dt' ? dtCard : rulesCard);

  el.innerHTML = html;
}

// ── TRADE LOG ─────────────────────────────────────────────────────────────────
// ── SHARED CARD BUILDER ───────────────────────────────────────────────────────
function evoBuildCard(t, context) {
  const ctx    = (context === 'dash') ? 'dash' : 'log';
  const htf    = t.data['HTF POI'] || '—';
  const d      = new Date(t.timestamp);
  const ds     = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const time   = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  const tid    = Number(t.id);
  const openId = ctx === 'dash' ? expandedCardDash : expandedCard;
  const isOpen = openId === tid;
  const toggleFn = ctx === 'dash' ? 'evoDashToggle(' + tid + ')' : 'evoToggleCard(' + tid + ')';

  const detailRows = Object.entries(t.data).map(function(entry) {
    var k=entry[0], v=entry[1];
    var valColor='';
    if(k==='HTF POI'&&(v==='nincs'||v==='—'||!v)) valColor='color:var(--loss);';
    else if(k==='Kötés ellen'&&v&&v!=='semmi'&&v!=='—') valColor='color:var(--yellow);';
    return '<div class="trade-detail-row"><span class="trade-detail-key">'+k+'</span><span class="trade-detail-val" style="'+valColor+'">'+v+'</span></div>';
  }).join('') + (t.setup && t.setup.length > 0
    ? '<div class="trade-detail-row"><span class="trade-detail-key">Setup</span><span class="trade-detail-val">' + t.setup.join(', ') + '</span></div>'
    : '')
  + (t.stf ? '<div class="trade-detail-row"><span class="trade-detail-key">STF</span><span class="trade-detail-val">' + stfLabel(t.stf) + '</span></div>' : '')
  + (t.qualitySetup && t.qualitySetup.length > 0 ? '<div class="trade-detail-row"><span class="trade-detail-key">Minőségi</span><span class="trade-detail-val" style="color:var(--win);"><span class="aplus-badge">A+</span> ' + t.qualitySetup.join(', ') + '</span></div>' : '')
  + (t.wrongSetup && (Array.isArray(t.wrongSetup) ? t.wrongSetup.length > 0 : true) ? '<div class="trade-detail-row"><span class="trade-detail-key">Hibás setup</span><span class="trade-detail-val" style="color:var(--yellow);">' + (Array.isArray(t.wrongSetup) ? t.wrongSetup.join(', ') : t.wrongSetup) + '</span></div>' : '');

  const snapshotHtml = (t.image && isOpen)
    ? '<img class="trade-snapshot" src="' + t.image + '" alt="snapshot" onclick="event.stopPropagation();openLightbox(' + tid + ')" />'
    : '';

  const camIcon = t.image ? '<span style="color:var(--muted);font-size:13px;" title="Snapshot csatolva">&#128247;</span>' : '';
  const wrongIcon = '';

  return '<div class="trade-card">'
    + '<div class="trade-card-header" onclick="' + toggleFn + '">'
    +   '<div class="trade-card-left">'
    +     '<span class="outcome-dot ' + t.outcome + '"></span>'
    +     '<span class="trade-card-date">' + ds + ' ' + time + '</span>'
    +     '<span class="trade-card-htf" style="color:' + (htf==='nincs'||htf==='—'?'var(--loss)':'') + ';">' + htf + '</span>'
    +   '</div>'
    +   '<div style="display:flex;align-items:center;gap:6px;">'
    +     camIcon
    +     (t.qualitySetup && t.qualitySetup.length > 0 ? '<span class="aplus-badge" style="margin-right:4px;">A+</span>' : '')
    +     (t.zeroStop ? '<span style="font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;color:var(--yellow);letter-spacing:0.05em;margin-right:4px;border:1px solid var(--yellow);padding:1px 4px;line-height:1;">0%</span>' : '') + (t.bigWin ? '<span style="font-size:12px;margin-right:4px;">🚀</span>' : '')
    +     (t.zeroStop ? '<span style="font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;color:var(--yellow);letter-spacing:0.05em;margin-right:4px;border:1px solid var(--yellow);padding:1px 4px;line-height:1;">0%</span>' : '') + (t.bigWin ? '<span style="font-size:12px;margin-right:4px;">🚀</span>' : '')

function evoDashToggle(id) {
  id = Number(id);
  expandedCardDash = (expandedCardDash === id) ? null : id;
  evoRenderDashboard();
}

function evoGetFiltered() {
  let f = allTrades.slice();
  if (logFilter !== 'all') f = f.filter(t => t.outcome === logFilter);
  if (logDateFrom) f = f.filter(t => (t.folder || '') >= logDateFrom);
  if (logDateTo)   f = f.filter(t => (t.folder || '') <= logDateTo);
  if (logDayPicks.length > 0) f = f.filter(t => logDayPicks.indexOf(t.folder) >= 0);
  if (logHtfFilter.length)     f = f.filter(t => logHtfFilter.some(x => (t.data['HTF POI']||'').split(', ').some(v=>v.trim()===x)));
  if (logExtraFilter.length)   f = f.filter(t => logExtraFilter.some(x => (t.data['Extra körülmény']||'').split(', ').some(v=>v.trim()===x)));
  if (logAgainstFilter.length) f = f.filter(t => logAgainstFilter.some(x => (t.data['Kötés ellen']||'').split(', ').some(v=>v.trim()===x)));
  if (logSetupFilter.length)   f = f.filter(t => Array.isArray(t.setup) && logSetupFilter.some(x => t.setup.some(v=>v.trim()===x)));
  if (logStfFilter.length)     f = f.filter(t => logStfFilter.some(x => t.stf && stfLabel(t.stf)===x));
  if (logQualityFilter.length) f = f.filter(t => Array.isArray(t.qualitySetup) && logQualityFilter.some(x => t.qualitySetup.some(v=>v.trim()===x)));
  if (logWrongFilter.length)   f = f.filter(t => Array.isArray(t.wrongSetup) && logWrongFilter.some(x => t.wrongSetup.some(v=>v.trim()===x)));
  if (_avgMaxDays) f = f.filter(t => _avgMaxDays.indexOf(t.folder)>=0);
  if (_evoPatternIds) f = f.filter(t => _evoPatternIds.indexOf(Number(t.id))>=0);
  return f;
}

function evoAnyFilterActive() {
  return logDateFrom || logDateTo || logDayPicks.length > 0 || logHtfFilter.length || logExtraFilter.length || logAgainstFilter.length || logSetupFilter.length || logStfFilter.length || logQualityFilter.length || logWrongFilter.length;
}

function evoClearAllFilters() {
  _avgMaxDays = null; _evoPatternIds = null;
  logDateFrom = ''; logDateTo = ''; logDayPicks = [];
  logHtfFilter = []; logExtraFilter = []; logAgainstFilter = []; logSetupFilter = []; logStfFilter = []; logQualityFilter = []; logWrongFilter = [];
  expandedCard = null;

}

function evoSetFilter(f) {
  logFilter = f;
  expandedCard = null;
  evoRenderLog();
}


function evoDayPickToggle(day) {
  var idx = logDayPicks.indexOf(day);
  if (idx >= 0) logDayPicks.splice(idx, 1);
  else { logDayPicks.push(day); logDateFrom=''; logDateTo=''; }
  expandedCard=null; expandedCardDash=null;
  evoRenderLog();
}
function realDayPickToggle(day) {
  var idx = realDayPicks.indexOf(day);
  if (idx >= 0) realDayPicks.splice(idx, 1);
  else { realDayPicks.push(day); realDateFrom=''; realDateTo=''; }
  realExpandedCard=null; realExpandedCardDash=null;
  realRenderLog();
}
function evoSetDateFrom(val) {
  _avgMaxDays = null;
  _evoPatternIds = null;
  logDayPicks = [];
  logDateFrom = val;
  expandedCard = null;
  evoRenderLog();
}

function evoSetDateTo(val) {
  _avgMaxDays = null;
  logDayPicks = [];
  logDateTo = val;
  expandedCard = null;
  evoRenderLog();
}

function evoClearDateFilter() {
  logDateFrom = '';
  logDateTo   = '';
  expandedCard = null;
  evoRenderLog();
}

function evoSetFieldFilter(field, val) {
  var maps = {htf:logHtfFilter,extra:logExtraFilter,against:logAgainstFilter,setup:logSetupFilter,stf:logStfFilter,quality:logQualityFilter,wrong:logWrongFilter};
  var arr = maps[field]; if (!arr) { expandedCard=null; evoRenderLog(); return; }
  var idx = arr.indexOf(val);
  if (!val) { arr.length=0; }
  else if (idx>=0) arr.splice(idx,1);
  else arr.push(val);
  expandedCard = null;
  evoRenderLog();
}


// ── EDIT MODE ────────────────────────────────────────────────────────────────


function evoStartEdit(id, context) {
  id = Number(id);
  const t = allTrades.find(e => Number(e.id) === id);
  if (!t) return;
  const fromDash = (context === 'dash');
  editingCard = id;
  if (fromDash) {
    expandedCardDash = id;
    expandedCard = null;
  } else {
    expandedCard = id;
    expandedCardDash = null;
  }
  editState = {
    outcome: t.outcome,
    folder:  t.folder || '',
    htf:     (t.data['HTF POI'] || '').split(', ').filter(Boolean),
    extra:   (t.data['Extra körülmény'] || '').split(', ').filter(Boolean),
    against: (t.data['Kötés ellen'] || '').replace('—','').trim(),
    setup:   Array.isArray(t.setup) ? t.setup.slice() : [],
    qualitySetup: Array.isArray(t.qualitySetup) ? t.qualitySetup.slice() : [],
    wrongSetup: Array.isArray(t.wrongSetup) ? t.wrongSetup.slice() : [],
    stf:     t.stf || 0,
    zeroStop: !!t.zeroStop,
    bigWin:   !!t.bigWin
  };
  if (fromDash) {
    if (currentView !== 'dashboard') evoSwitchView('dashboard');
    else evoRenderDashboard();
  } else {
    if (currentView !== 'log') evoSwitchView('log');
    else evoRenderLog();
  }
  function tryFill() {
    const cont = document.getElementById('edit-card-container');
    if (cont) { renderEditCard(); }
    else { setTimeout(tryFill, 30); }
  }
  setTimeout(tryFill, 0);
}

function renderEditCard() {
  const cont = document.getElementById('edit-card-container');
  if (!cont) { setTimeout(renderEditCard, 50); return; }

  // Outcome buttons
  const outcomes = [
    {v:'win', l:'Win', c:'var(--win)'},
    {v:'be',  l:'BE',  c:'var(--be)'},
    {v:'loss',l:'Loss',c:'var(--loss)'}
  ];
  let outcomeHtml = '<div style="display:flex;gap:8px;margin-bottom:4px;">';
  outcomes.forEach(function(o) {
    const active = editState.outcome === o.v;
    outcomeHtml += '<button onclick="evoEditOutcome(\'' + o.v + '\')" style="'
      + 'flex:1;padding:11px 6px;border:1px solid ' + (active ? o.c : 'var(--border)') + ';'
      + 'background:' + (active ? 'rgba(0,0,0,0.15)' : 'var(--surface)') + ';'
      + 'color:' + (active ? o.c : 'var(--muted)') + ';'
      + 'font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:700;'
      + 'letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:0;">'
      + o.l + '</button>';
  });
  outcomeHtml += '</div>';
  if (editState.outcome === 'loss') {
    const zs = editState.zeroStop;
    outcomeHtml += '<div style="display:flex;gap:8px;margin-top:6px;">'
      + '<div style="flex:0 0 calc((100% - 16px) * 2 / 3 + 8px);"></div>'
      + '<button onclick="evoEditZeroStop()" style="flex:1;padding:7px 6px;border:1px solid '
      + (zs ? 'var(--yellow)' : 'var(--border)') + ';color:'
      + (zs ? 'var(--yellow)' : 'var(--muted)') + ';background:'
      + (zs ? 'rgba(255,204,0,0.18)' : 'var(--surface)') + ';'
      + 'font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;'
      + 'letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:0;">0% stop</button></div>';

      + '<button onclick="evoEditBigWin()" style="flex:1;padding:7px 6px;border:1px solid '

// ── IMPORT ────────────────────────────────────────────────────────────────────
function evoImportFolder(input) {
  const files = Array.from(input.files).filter(f => f.name.endsWith('.json'));
  if (files.length === 0) {
    setImportStatus('Nem találhatók .json fájlok.', 'err');
    return;
  }

  let loaded = 0, skipped = 0, errors = 0;
  let pending = files.length;

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const entry = JSON.parse(e.target.result);
        // Accept single entry or array
        const entries = Array.isArray(entry) ? entry : [entry];
        entries.forEach(en => {
          if (en.id && en.outcome && en.data) {
            const exists = allTrades.some(t => t.id === en.id);
            if (!exists) { allTrades.push(en); loaded++; }
            else skipped++;
          } else { errors++; }
        });
      } catch(err) { errors++; }
      pending--;
      if (pending === 0) {
        evoSaveToStorage();
        evoRenderAll();
        const msg = `${loaded} új bejegyzés importálva` +
          (skipped  ? `, ${skipped} már létezett` : '') +
          (errors   ? `, ${errors} hiba` : '') + '.';
        setImportStatus(msg, loaded > 0 ? 'ok' : 'err');
        showToast(loaded > 0 ? `${loaded} bejegyzés importálva` : 'Nincs új adat', loaded > 0 ? false : true);
      }
    };
    reader.readAsText(file);
  });

  // Reset input so same folder can be re-imported
  input.value = '';
}

function evoSyncFromTradeGate() {
  let gateTrades = [];
  try { gateTrades = JSON.parse(localStorage.getItem(GATE_KEY) || '[]'); } catch(e) {}
  if (gateTrades.length === 0) {
    showToast('Nincs TradeGate adat', true);
    return;
  }
  let added = 0;
  gateTrades.forEach(t => {
    if (!allTrades.some(e => e.id === t.id)) {
      allTrades.push(t); added++;
    }
  });
  if (added > 0) { evoSaveToStorage(); evoRenderAll(); }
  showToast(added > 0 ? `${added} új bejegyzés szinkronizálva` : 'Nincs új adat', added === 0);
}

function evoExportAllJSON() {
  if (allTrades.length === 0) { showToast('Nincs exportálható adat', true); return; }
  const blob = new Blob([JSON.stringify(allTrades, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);

  document.body.removeChild(a);

  showToast('Export letöltve');
}

// ── Config stored in IndexedDB under key 'gh_config_evo' / 'gh_config_real' ──
var _ghConfig = { evo: null, real: null };

function ghIdbKey(db) { return 'gh_config_' + db; }

var GH_DEFAULT = { user: 'SOLTENs', repo: 'TradeGate-Unified', token: '' };

// Config is always GH_DEFAULT unless overridden by saved value in IDB meta store
// Simplified: just use GH_DEFAULT directly — no IDB lookup needed for config
function ghLoadConfig(db, callback) {
  // Return cached in-memory config immediately if available
  if (_ghConfig[db] && _ghConfig[db].token) { callback(_ghConfig[db]); return; }
  // Try localStorage — first db-specific key, then evo key as fallback (same token for all)
  var keys = ['gh_cfg_' + db, 'gh_cfg_evo', 'gh_cfg_real'];
  for (var i = 0; i < keys.length; i++) {
    try {
      var raw = localStorage.getItem(keys[i]);
      if (raw) {
        var cfg = JSON.parse(raw);
        if (cfg && cfg.token) { _ghConfig[db] = cfg; callback(cfg); return; }
      }
    } catch(e) {}
  }
  // Fall back to default (no token)
  callback(GH_DEFAULT);
}

function ghWriteConfig(db, cfg, callback) {
  _ghConfig[db] = cfg;
  // Save to localStorage for fast boot access
  try { localStorage.setItem('gh_cfg_' + db, JSON.stringify(cfg)); } catch(e) {}
  if (callback) callback();
}

// ── GitHub API ────────────────────────────────────────────────────────────────
function ghApiUrl(cfg, path) {
  return 'https://api.github.com/repos/' + cfg.user + '/' + cfg.repo + '/contents/' + path;
}
function ghHeaders(cfg) {
  return { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
}
function ghB64Encode(str) { return btoa(unescape(encodeURIComponent(str))); }
function ghB64Decode(b64) { return decodeURIComponent(escape(atob(b64.replace(/\s/g, '')))); }

// List all .json files in a folder — returns array of {name, sha}
function ghListFiles(cfg, folder, callback) {
  var url = ghApiUrl(cfg, folder);
  fetch(url, { headers: ghHeaders(cfg) })
    .then(function(r) {
      if (!r.ok) { console.warn('[GH] ghListFiles', folder, r.status); callback([]); return null; }
      return r.json();
    })
    .then(function(items) {
      if (!items) return;
      if (!Array.isArray(items)) { console.warn('[GH] ghListFiles not array', items); callback([]); return; }
      var files = items.filter(function(f) { return f.type === 'file' && f.name.endsWith('.json'); });
      console.log('[GH] ghListFiles', folder, files.length, 'files');
      callback(files);
    })
    .catch(function(e) { console.error('[GH] ghListFiles error', e); callback([]); });
}

// Download one file by path using contents API (base64 decoded)
function ghDownloadFile(cfg, path, callback) {
  fetch(ghApiUrl(cfg, path), { headers: ghHeaders(cfg) })
    .then(function(r) {
      if (!r.ok) { console.warn('[GH] ghDownloadFile', path, r.status); callback(null); return null; }
      return r.json();
    })
    .then(function(data) {
      if (!data) return;
      if (!data.content) { console.warn('[GH] no content in', path); callback(null); return; }
      try { callback(JSON.parse(ghB64Decode(data.content))); }
      catch(e) { console.error('[GH] parse error', path, e); callback(null); }
    })
    .catch(function(e) { console.error('[GH] download error', path, e); callback(null); });
}

// Upload (create or update) one file
function ghUploadFile(cfg, path, content, callback) {
  var url = ghApiUrl(cfg, path);
  // Get existing SHA first (needed for update)
  fetch(url, { headers: ghHeaders(cfg) })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(existing) {
      var body = { message: 'save ' + path, content: ghB64Encode(content) };
      if (existing && existing.sha) body.sha = existing.sha;
      return fetch(url, { method: 'PUT', headers: ghHeaders(cfg), body: JSON.stringify(body) });
    })
    .then(function(r) {
      console.log('[GH] upload', path, r.status);
      callback(r.ok, r.status);
    })
    .catch(function(e) { console.error('[GH] upload error', path, e); callback(false, 0); });
}

// Delete one file
function ghDeleteFile(cfg, path, callback) {
  var url = ghApiUrl(cfg, path);
  fetch(url, { headers: ghHeaders(cfg) })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(existing) {
      if (!existing || !existing.sha) { callback(true); return null; }
      return fetch(url, { method: 'DELETE', headers: ghHeaders(cfg), body: JSON.stringify({ message: 'delete ' + path, sha: existing.sha }) });
    })
    .then(function(r) { if (r) { console.log('[GH] delete', path, r.status); callback(r.ok); } })
    .catch(function(e) { console.error('[GH] delete error', path, e); callback(false); });
}

// File path convention
function ghPath(db, trade) {
  var prefix = db === 'evo' ? 'trade' : 'real';
  return db + '/' + prefix + '_' + trade.folder + '_' + trade.id + '.json';
}

// ── Boot sync: fetch ALL files from GitHub folder, replace local data ─────────
function ghSyncOnBoot(db, callback) {
  var cfg = _ghConfig[db] || GH_DEFAULT;
  if (!cfg.token) { callback([]); return; }
  console.log('[GH] ghSyncOnBoot', db, 'user:', cfg.user, 'repo:', cfg.repo);
  ghListFiles(cfg, db, function(files) {
    if (!files.length) {
      console.log('[GH] no files found in', db);
      callback([]);
      return;
    }
    var results = [];
    var done    = 0;
    var total   = files.length;
    console.log('[GH] downloading', total, 'files from', db);
    files.forEach(function(f) {
      ghDownloadFile(cfg, db + '/' + f.name, function(trade) {
        if (trade && trade.id && (trade.outcome || trade.linkedEvoId)) results.push(trade);
        done++;
        if (done === total) {
          console.log('[GH] ghSyncOnBoot', db, 'loaded', results.length, '/', total);
          callback(results);
        }
      });
    });
  });
}

// Called silently after every local save/edit
function ghAutoUpload(db, trade) {
  ghLoadConfig(db, function(cfg) {
    var path = ghPath(db, trade);
    ghUploadFile(cfg, path, JSON.stringify(trade, null, 2), function(ok) {
      ghSetStatus(db, ok ? '&#10003; GitHub szinkronizálva' : '&#10007; GitHub feltöltés sikertelen', ok ? 'ok' : 'err');
    });
  });
}

// Called silently after every local delete
function ghAutoDelete(db, trade) {
  ghLoadConfig(db, function(cfg) {
    ghDeleteFile(cfg, ghPath(db, trade), function(ok) {
      ghSetStatus(db, ok ? '&#10003; GitHub törölve' : '&#10007; GitHub törlés sikertelen', ok ? 'ok' : 'err');
    });
  });
}

function ghSetStatus(db, msg, cls) {

function ghTestConfig(db) {
  var user  = ((document.getElementById(db + '-gh-user')  || {}).value || 'SOLTENs').trim();
  var repo  = ((document.getElementById(db + '-gh-repo')  || {}).value || 'TradeGate-Unified').trim();
  var token = ((document.getElementById(db + '-gh-token') || {}).value || '').trim();
  if (!token) { ghSetStatus(db, 'Add meg a Personal Access Token-t.', 'err'); return; }

  var cfg = { user: user.trim(), repo: repo.trim(), token: token.trim() };
  fetch('https://api.github.com/repos/' + cfg.user + '/' + cfg.repo, { headers: ghHeaders(cfg) })

      else if (r.status === 401) ghSetStatus(db, 'Hibás token.', 'err');
      else ghSetStatus(db, 'Hiba: ' + r.status, 'err');

    .catch(function() { ghSetStatus(db, 'Hálózati hiba.', 'err'); });
}

function ghPopulateFields(db) {

      if (u) u.value = cfg.user || 'SOLTENs';
      if (r) r.value = cfg.repo || 'TradeGate-Unified';
    } else {
      if (u && !u.value) u.value = 'SOLTENs';
      if (r && !r.value) r.value = 'TradeGate-Unified';
    }

  });
}

function ghPushAll(db) {
  ghLoadConfig(db, function(cfg) {
    if (!cfg) { ghSetStatus(db, 'Nincs GitHub konfiguráció. Mentsd el először.', 'err'); return; }
    var trades = db === 'evo' ? allTrades : realTrades;
    if (trades.length === 0) { ghSetStatus(db, 'Nincs feltölthető adat.', ''); return; }
    ghSetStatus(db, 'Feltöltés... (0/' + trades.length + ')', 'busy');
    var done = 0, failed = 0;
    trades.forEach(function(trade) {
      ghUploadFile(cfg, ghPath(db, trade), JSON.stringify(trade, null, 2), function(ok) {
        done++;
        if (!ok) failed++;
        var msg = 'Feltöltés... (' + done + '/' + trades.length + ')';
        if (done === trades.length) {
          if (failed === 0) msg = trades.length + ' fájl sikeresen feltöltve.';
          else msg = (trades.length - failed) + '/' + trades.length + ' sikeresen, ' + failed + ' hiba.';
          ghSetStatus(db, msg, failed === 0 ? 'ok' : 'err');
        } else {
          ghSetStatus(db, msg, 'busy');
        }
      });
    });
  });
}

function ghPullAll(db) {
  ghLoadConfig(db, function(cfg) {
    if (!cfg) { ghSetStatus(db, 'Nincs GitHub konfiguráció. Mentsd el először.', 'err'); return; }
    ghSetStatus(db, 'Letöltés GitHub-ról...', 'busy');
    ghListFiles(cfg, db, function(files) {
      if (files.length === 0) { ghSetStatus(db, 'Nincs adat a GitHub repóban.', ''); return; }
      var trades = db === 'evo' ? allTrades : realTrades;
      var existingIds = {};
      trades.forEach(function(t) { existingIds[t.id] = true; });
      var toFetch = files.filter(function(f) {
        // Extract id from filename: trade_FOLDER_ID.json or real_FOLDER_ID.json
        var m = f.name.match(/_(\d+)\.json$/);
        return m ? !existingIds[parseInt(m[1])] : true;
      });
      if (toFetch.length === 0) { ghSetStatus(db, 'Minden adat már szinkronizálva van.', 'ok'); return; }
      ghSetStatus(db, 'Letöltés... (0/' + toFetch.length + ')', 'busy');
      var done = 0, added = 0;
      toFetch.forEach(function(f) {
        ghDownloadFile(cfg, db + '/' + f.name, function(trade) {
          done++;
          if (trade && trade.id && trade.outcome) {
            trades.push(trade);
            added++;
          }
          if (done === toFetch.length) {
            if (db === 'evo') { evoSaveToStorage(); evoRenderAll(); }
            else { realSaveToStorage(); realRenderAll(); }
            ghSetStatus(db, added + ' új bejegyzés letöltve.', 'ok');
          }
        });
      });
    });
  });
}

}

function loginConnect() {

  if (!token) { statusEl.style.color='var(--loss)'; statusEl.textContent='Add meg a tokent.'; return; }

  fetch('https://api.github.com/repos/SOLTENs/TradeGate-Unified', {
    headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
  }).then(function(r) {
    if (r.ok) {
      // Save token for both evo and real
      var cfg = { user: 'SOLTENs', repo: 'TradeGate-Unified', token: token };
      try {
        localStorage.setItem('gh_cfg_evo',  JSON.stringify(cfg));
        localStorage.setItem('gh_cfg_real', JSON.stringify(cfg));
      } catch(e) {}
      _ghConfig['evo']  = cfg;
      _ghConfig['real'] = cfg;
      statusEl.style.color='var(--win)'; statusEl.textContent='Sikeres csatlakozás!';
      setTimeout(function() {
        // Hide login, show TG
        document.getElementById('pane-login').classList.remove('active');
        document.getElementById('unified-app').classList.remove('login-mode');
        document.getElementById('pane-tg').classList.add('active');
        document.getElementById('tab-tg').classList.add('active');
        document.getElementById('tg-reset-btn').style.display = '';
        // Boot EVO and REAL in background
        evoBoot();
        realBoot();
      }, 600);
    } else if (r.status === 401) {
      statusEl.style.color='var(--loss)'; statusEl.textContent='Hibás token (401).';
    } else if (r.status === 404) {
      statusEl.style.color='var(--loss)'; statusEl.textContent='Repó nem található (404).';
    } else {
      statusEl.style.color='var(--loss)'; statusEl.textContent='Hiba: ' + r.status;
    }
  }).catch(function() {
    statusEl.style.color='var(--loss)'; statusEl.textContent='Hálózati hiba.';
  });
}

// If token already saved, skip login screen
function loginAutoCheck() {
  var token = null;
  try {
    var raw = localStorage.getItem('gh_cfg_evo');
    if (raw) {
      var cfg = JSON.parse(raw);
      if (cfg && cfg.token) token = cfg.token;
    }
  } catch(e) {}

  if (token) {
    var cfg2 = { user: 'SOLTENs', repo: 'TradeGate-Unified', token: token };
    _ghConfig['evo']  = cfg2;
    _ghConfig['real'] = cfg2;
    document.getElementById('pane-login').classList.remove('active');
    document.getElementById('unified-app').classList.remove('login-mode');
    document.getElementById('pane-tg').classList.add('active');
    document.getElementById('tab-tg').classList.add('active');
    document.getElementById('tg-reset-btn').style.display = '';
    evoBoot();
    realBoot();
  } else {
    // Explicitly hide all app panes, show only login
    ['pane-tg','pane-evo','pane-real','pane-gap'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.classList.remove('active');
    });
    ['tab-tg','tab-evo','tab-real','tab-gap'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.classList.remove('active');
    });
    document.getElementById('pane-login').classList.add('active');
    document.getElementById('unified-app').classList.add('login-mode');
  }
}


// ══════════════════════════════════════════════════════════════
//  GAP — EVO vs REAL összehasonlítás
