<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TradeGate</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700;900&display=swap');

  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700;900&display=swap');

  :root {
    --bg: #0a0a0c;
    --surface: #111116;
    --border: #1e1e28;
    --text: #e8e8f0;
    --muted: #44445a;
    --accent: #c8ff00;
    --accent-dim: #8aad00;
    --danger: #ff4455;
    --yellow: #ffcc00;
    --green: #00e87a;
    --green-dim: #00994f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    overflow-x: hidden;
  }

  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 0 32px;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .topbar-logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  /* PROGRESS */
  .progress-bar {
    height: 2px;
    background: var(--border);
    width: 100%;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* SCREEN */
  .screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 32px 20px 20px;
    animation: fadeUp 0.25s ease both;
    min-height: calc(100vh - 60px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .screen-title {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: 0.02em;
    line-height: 1;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 36px;
  }

  /* BUTTONS GRID */
  .btn-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.03em;
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.15s;
  }

  .option-btn:hover {
    border-color: var(--accent);
    background: #141418;
  }
  .option-btn:hover::before { transform: scaleY(1); }

  .option-btn.selected-green {
    background: rgba(0, 232, 122, 0.12);
    border-color: var(--green);
    color: var(--green);
  }
  .option-btn.selected-green::before {
    background: var(--green);
    transform: scaleY(1);
  }

  .option-btn.selected-yellow {
    background: rgba(255, 204, 0, 0.1);
    border-color: var(--yellow);
    color: var(--yellow);
  }
  .option-btn.selected-yellow::before {
    background: var(--yellow);
    transform: scaleY(1);
  }

  .option-btn.danger-btn {
    color: var(--danger);
    border-color: rgba(255, 68, 85, 0.3);
  }
  .option-btn.danger-btn::before { background: var(--danger); }
  .option-btn.danger-btn:hover { border-color: var(--danger); background: rgba(255,68,85,0.08); }

  /* YES/NO big buttons */
  .yesno-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .yn-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-align: center;
    cursor: pointer;
    transition: all 0.12s;
    text-transform: uppercase;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .yn-btn.yes:hover { border-color: var(--green); color: var(--green); background: rgba(0,232,122,0.08); }
  .yn-btn.no:hover  { border-color: var(--danger); color: var(--danger); background: rgba(255,68,85,0.08); }

  /* NEXT BUTTON */
  .next-btn {
    margin-top: 20px;
    background: var(--accent);
    color: #0a0a0c;
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 18px;
    cursor: pointer;
    transition: all 0.12s;
    width: 100%;
  }
  .next-btn:hover { background: #d9ff1a; }
  .next-btn:active { transform: scale(0.98); }

  /* SCREEN 4 special: "semmi" button */
  .semmi-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 14px 20px;
    cursor: pointer;
    transition: all 0.12s;
    text-align: left;
  }
  .semmi-btn:hover { border-color: var(--green); color: var(--green); }

  /* SCREEN 6 - dropdowns */
  .setup-container { display: flex; flex-direction: column; gap: 12px; }

  .setup-block {
    border: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .setup-block.open { border-color: var(--accent); }

  .setup-header {
    background: var(--surface);
    padding: 20px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.12s;
  }
  .setup-header:hover { background: #141418; }
  .setup-block.open .setup-header { color: var(--accent); }

  .chevron {
    font-size: 14px;
    transition: transform 0.2s;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
  .setup-block.open .chevron { transform: rotate(180deg); color: var(--accent); }

  .setup-list {
    display: none;
    flex-direction: column;
    border-top: 1px solid var(--border);
  }
  .setup-block.open .setup-list { display: flex; }

  .setup-item {
    padding: 12px 20px;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    transition: color 0.12s, background 0.12s;
    cursor: default;
  }
  .setup-item:hover { color: var(--green); background: rgba(0, 232, 122, 0.07); }
  .setup-item:last-child { border-bottom: none; }

  /* TRADE ALLOWED */
  .allowed-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
    animation: fadeUp 0.3s ease both;
  }

  .allowed-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 6px 16px;
    margin-bottom: 28px;
    display: inline-block;
  }

  .allowed-title {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: 0.02em;
    line-height: 1;
    text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(200,255,0,0.35);
    margin-bottom: 12px;
  }

  .allowed-subtitle {
    font-size: 24px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .allowed-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 32px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .allowed-reset:hover { border-color: var(--yellow); color: var(--yellow); }

  .hidden { display: none !important; }

  /* SKIP hint */
  .skip-hint {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
    margin-top: 16px;
    text-transform: uppercase;
  }

  /* SKIP button */
  .skip-btn {
    margin-top: 20px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 18px;
    cursor: pointer;
    transition: all 0.12s;
    width: 100%;
  }
  .skip-btn:hover { border-color: var(--green); color: var(--green); background: rgba(0,232,122,0.08); }

  /* divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 10px 0;
  }

  /* TRADE NOT ALLOWED flash */
  #not-allowed-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #0a0a0c;
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    animation: flashIn 0.15s ease both;
  }
  #not-allowed-overlay.visible { display: flex; }
  .not-allowed-x {
    font-size: 220px;
    font-weight: 900;
    color: #ff4455;
    line-height: 1;
    text-shadow: 0 0 120px rgba(255,68,85,0.7), 0 0 40px rgba(255,68,85,0.5);
  }
  .not-allowed-text {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #ff4455;
    margin-top: 28px;
  }
  @keyframes flashIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }



  /* ── LOG TRADE SCREEN ──────────────────────────────── */
  .log-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 28px 20px 32px;
    animation: fadeUp 0.25s ease both;
  }
  .log-screen-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* summary table */
  .summary-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .summary-table td {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .summary-table td:first-child {
    color: var(--muted);
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.06em;
    width: 38%;
    padding-top: 12px;
  }
  .summary-table td.val { color: var(--green); }
  .summary-table tr:last-child td { border-bottom: none; }

  /* outcome row */
  .outcome-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .outcome-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .oc-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 14px 6px;
    cursor: pointer;
    transition: all 0.12s;
    text-align: center;
    line-height: 1.2;
  }
  .oc-btn small { display: block; font-size: 11px; font-weight: 400; letter-spacing: 0.04em; margin-top: 3px; }
  .oc-btn.sel-win  { border-color: var(--green);  color: var(--green);  background: rgba(0,232,122,0.1); }
  .oc-btn.sel-be   { border-color: var(--muted);  color: var(--text);   background: rgba(255,255,255,0.05); }
  .oc-btn.sel-loss { border-color: var(--danger); color: var(--danger); background: rgba(255,68,85,0.1); }

  /* folder row */
  .folder-section {
    margin-bottom: 20px;
  }
  .folder-section label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .folder-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    letter-spacing: 0.04em;
    padding: 13px 16px;
    outline: none;
    transition: border-color 0.12s;
    -webkit-appearance: none;
    border-radius: 0;
  }
  .folder-input:focus { border-color: var(--accent); }

  /* save button */
  .log-save-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    color: #0a0a0c;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 18px;
    cursor: pointer;
    transition: background 0.12s;
    margin-bottom: 10px;
  }
  .log-save-btn:hover { background: #d9ff1a; }
  .log-save-btn:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
  }
  .log-back-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .log-back-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* LOG TRADE button on allowed screen */
  .log-trade-btn {
    width: 100%;
    margin-top: 10px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 17px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .log-trade-btn:hover { background: rgba(200,255,0,0.08); }

  /* toast */
  #log-toast {
    display: none;
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: #0a0a0c;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 10px 22px;
    z-index: 300;
    white-space: nowrap;
    pointer-events: none;
  }
  #log-toast.show { display: block; animation: toastPop 0.2s ease both; }
  @keyframes toastPop {
    from { opacity:0; transform: translateX(-50%) translateY(6px); }
    to   { opacity:1; transform: translateX(-50%) translateY(0); }
  }

  /* image upload */
  .img-upload-section {
    margin-bottom: 20px;
  }
  .img-upload-section label.section-lbl {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .img-upload-btn-wrap {
    position: relative;
    overflow: hidden;
    width: 100%;
  }
  .img-upload-btn-wrap input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    font-size: 0;
  }
  .img-upload-face {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--surface);
    border: 1px dashed var(--border2);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
  }
  .img-upload-face:hover { border-color: var(--accent); color: var(--accent); }
  .img-upload-face.has-img { border-style: solid; border-color: var(--green); color: var(--green); }
  .img-preview-wrap {
    position: relative;
    margin-top: 8px;
    display: none;
  }
  .img-preview-wrap.visible { display: block; }
  .img-preview {
    width: 100%;
    display: block;
    border: 1px solid var(--border);
    max-height: 200px;
    object-fit: contain;
    background: #0a0a0c;
  }
  .img-remove-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(10,10,12,0.85);
    border: 1px solid var(--danger);
    color: var(--danger);
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .img-remove-btn:hover { background: var(--danger); color: #fff; }

/* ── EVO-SPECIFIC ───────────────────────────────────────────── */







#evo-app {
  width: 100%;
  max-width: 520px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ─────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 50;
}
.topbar-left { display: flex; flex-direction: column; gap: 2px; }
.topbar-logo {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--text);
  text-transform: uppercase;
}
.topbar-sub {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.sync-indicator {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  text-align: right;
}
.sync-indicator span { color: var(--accent); }

/* ── NAV ────────────────────────────────────────────── */
.nav {
  display: flex;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 53px;
  background: var(--bg);
  z-index: 49;
}
.nav-btn {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 12px 4px;
  cursor: pointer;
  transition: all 0.12s;
}
.nav-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.nav-btn:hover:not(.active) { color: var(--text); }

/* ── VIEWS ──────────────────────────────────────────── */
.view {
  flex: 1;
  padding: 24px 20px 40px;
  display: none;
  animation: fadeUp 0.2s ease both;
}
.view.active { display: block; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

.view-title {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 24px;
}

/* ── EMPTY STATE ────────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  text-align: center;
  gap: 12px;
}
.empty-icon {
  font-size: 48px;
  color: var(--border2);
  line-height: 1;
}
.empty-title {

/* ── STAT CARDS ─────────────────────────────────────── */
.stat-grid {

/* win/loss/be bar */

.wlb-label-row {

  justify-content: space-between;
  margin-bottom: 6px;
}
.wlb-label {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* section header */

  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);

  margin-top: 28px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-hdr:first-of-type { margin-top: 0; }

/* ── ANALYSIS BARS ──────────────────────────────────── */
.factor-block { margin-bottom: 28px; }
.factor-title {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;

  padding-bottom: 8px;

.factor-row {

  align-items: center;

  margin-bottom: 8px;
}
.factor-name {

}

}

}

  font-family: 'Space Mono', monospace;
  font-size: 10px;

  white-space: nowrap;
}

/* ── TRADE LOG TABLE ────────────────────────────────── */
.log-filters {

  gap: 8px;

}

  letter-spacing: 0.1em;
  text-transform: uppercase;

}
.filter-btn.active { border-color: var(--accent); color: var(--accent); }
.filter-btn:hover:not(.active) { color: var(--text); border-color: var(--border2); }

.log-count {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 0.1em;
  margin-bottom: 12px;
}

.trade-card {
  background: var(--surface);
  border: 1px solid var(--border);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.12s;
}
.trade-card:hover { border-color: var(--border2); }

}

}
.trade-card-htf {

}

}

  margin-bottom: 6px;
  font-size: 15px;
}

  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.08em;

  padding-top: 2px;
}
.trade-detail-val { color: var(--green); flex: 1; }
.trade-card-footer {
  display: flex;
  justify-content: flex-end;
  padding: 8px 14px 12px;
}
.delete-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.12s;
}
.delete-btn:hover { border-color: var(--loss); color: var(--loss); }

/* ── SYNC / SETTINGS ────────────────────────────────── */
.sync-section { margin-bottom: 32px; }
.sync-section + .sync-section { border-top: 1px solid var(--border); padding-top: 28px; }

.sync-section-title {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}
.sync-info {
  font-size: 16px;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 16px;
}
.sync-info strong { color: var(--text); }

.file-input-wrapper {
  position: relative;
  overflow: hidden;
  display: inline-block;
  width: 100%;
  margin-bottom: 10px;
}

  position: absolute;

  opacity: 0;
  width: 100%;
  height: 100%;

}
.import-btn {

  width: 100%;

  border: 1px solid var(--accent);

  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 16px;
  cursor: pointer;
  transition: all 0.12s;
  text-align: center;
}
.import-btn:hover { background: rgba(200,255,0,0.07); }

.action-btn {
  display: block;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 14px;
  cursor: pointer;

.import-status {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 8px;
  min-height: 16px;
}
.import-status.ok  { color: var(--win); }
.import-status.err { color: var(--loss); }

/* ── TOAST ──────────────────────────────────────────── */
#toast {
  display: none;
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--green);
  color: #0a0a0c;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 10px 22px;
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show { display: block; animation: toastPop 0.18s ease both; }
#toast.err  { background: var(--loss); color: #fff; }
@keyframes toastPop {
  from { opacity:0; transform:translateX(-50%) translateY(6px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); }
}

/* ── CONFIRM DIALOG ─────────────────────────────────── */

  display: none;

  z-index: 200;
  align-items: center;
  justify-content: center;
}
#confirm-overlay.visible { display: flex; }
.confirm-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  padding: 28px 24px;
  max-width: 340px;
  width: 90%;
  text-align: center;
}
.confirm-msg {
  font-size: 18px;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.4;
}
.confirm-sub {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.1em;
  margin-bottom: 24px;
}
.confirm-btns { display: flex; gap: 10px; }
.confirm-yes {
  flex: 1;
  background: var(--loss);
  border: none;
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 13px;
  cursor: pointer;
}
.confirm-no {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 13px;
  cursor: pointer;
  transition: all 0.12s;
}
.confirm-no:hover { border-color: var(--border2); color: var(--text); }

  /* trade snapshot image */
  .trade-snapshot {
    width: 100%;
    display: block;
    border: 1px solid var(--border);
    margin-bottom: 10px;
    cursor: zoom-in;
    background: #0a0a0c;
    object-fit: contain;
    max-height: 280px;
  }

  /* fullscreen image lightbox */

    display: none;

  }

    border: 1px solid var(--border2);
  }
  #lightbox-close {
    position: fixed;
    top: 16px;
    right: 20px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    cursor: pointer;
  }
  #lightbox-close:hover { border-color: var(--text); color: var(--text); }


  /* ── SHARED TOPBAR ──────────────────────────────────── */
  .shared-topbar {
    display: flex;

    border-right: 1px solid var(--border);

    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    padding: 8px 14px;

  .app-tab:last-child { border-right: none; }
  .app-tab.active { background: var(--accent); color: #0a0a0c; }
  .app-tab:not(.active):hover { color: var(--text); }

  /* ── PANE VISIBILITY ─────────────────────────────────── */

  .date-clear-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* dropdown field filters */
  .field-filters {
    display: flex;

    gap: 6px;
    margin-bottom: 10px;
  }
  .field-filter-row {
    display: flex;
    align-items: center;

  }
  .field-filter-lbl {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);

  .field-filter-select {
    flex: 1;

<div id="unified-app">

  <!-- SHARED TOPBAR -->
  <div class="shared-topbar">
    <div class="app-tabs">
      <button class="app-tab active" id="tab-tg"  onclick="switchApp('tg')">TradeGate</button>
      <button class="app-tab"        id="tab-evo" onclick="switchApp('evo')">EVO</button>

    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:0%"></div>

    <div id="screens"></div>
    <div id="log-toast">Elmentve</div>

  <div class="app-pane" id="pane-evo">

    <nav class="nav">
      <button class="nav-btn active" onclick="evoSwitchView('dashboard')">Dashboard</button>

      <div id="dashboard-content"></div>
    </div>
    <div id="view-analysis" class="view">
      <div id="analysis-content"></div>
    </div>
    <div id="view-log" class="view">
      <div id="log-content"></div>
    </div>
    <div id="view-sync" class="view">
      <div class="view-title">Szinkron</div>
      <div class="sync-section">
        <div class="sync-section-title">Importálás mappából</div>
        <div class="sync-info">
          Válaszd ki a <strong>C:\TradeGate\DATA\</strong> mappát (vagy bármely almappát).
          EVO beolvassa az összes <strong>.json</strong> fájlt egyszerre és elmenti a saját tárolójába.

        <div class="file-input-wrapper">
          <input type="file" id="folder-import" accept=".json" multiple webkitdirectory onchange="evoImportFolder(this)" />

        <div class="import-status" id="import-status"></div>
      </div>
      <div class="sync-section">
        <div class="sync-section-title">Export</div>
        <button class="action-btn" onclick="evoExportAllJSON()">&#8681; Összes adat exportálása (JSON)</button>
      </div>

let currentScreen = 0;
let screen1Selections = new Set();
let screen3Selections = new Set();
let screen4YellowSelected = new Set();
let screen4YellowNext = false;
let screen4SemmiSelected = false;
let screen5Answer = '';
let s6PrimaryOpen = false;
let s6SecondaryOpen = false;

function goTo(screenNum) {
  currentScreen = screenNum;

}

function reset() {
  currentScreen = 1;

function updateProgress(step, total) {
  const pct = step === 0 ? 0 : Math.round((step / total) * 100);
  document.getElementById('progress').style.width = pct + '%';
}

function render() {
  const container = document.getElementById('screens');

  if (currentScreen === 0) {
    currentScreen = 1;
  }

  updateProgress(currentScreen - 1, SCREENS.length);

  if (currentScreen > SCREENS.length) {
    // TRADE ALLOWED
    updateProgress(SCREENS.length, SCREENS.length);
    const primaryItems = ["1-2", "W5", "K2k", "DKK", "C", "MOC", "W MOC", "Öreg trendpárna meggyűrődés + BOF", "Korai gyűrődés + Kk + (C1 cross + k)"];

    container.innerHTML = `
      <div class="allowed-screen">
        <div class="allowed-title">TRADE</div>
        <div class="allowed-title" style="color:var(--text)">ALLOWED</div>

        <div class="setup-container" style="width:100%;margin-top:28px;text-align:left;">

            </div>
            <div class="setup-list">
              ${primaryItems.map(i => `<div class="setup-item">${i}</div>`).join("")}

          </div>

  const s = SCREENS[currentScreen - 1];

    <div class="step-label">${currentScreen} / ${SCREENS.length}</div>

  if (s.type === 'multi-select-s1') {
    html += `<div class="btn-grid">`;

      const sel = screen1Selections.has(opt);
      const cls = sel ? 'option-btn selected-green' : 'option-btn';
      html += `<button class="${cls}" onclick="screen1Toggle('${opt.replace(/'/g, "\'")}')">${opt}</button>`;
    });
    html += `</div>`;
    if (screen1Selections.size > 0) {
      html += `<button class="next-btn" onclick="goTo(2)">Tovább</button>`;
    }
  }

  else if (s.type === 'yesno') {
    html += `<div class="yesno-grid">
      <button class="yn-btn yes" onclick="screen2Yes()">igen</button>
      <button class="yn-btn no" onclick="screen2No()">nem</button>
    </div>`;
  }

  else if (s.type === 'multi-select') {
    html += `<div class="btn-grid" id="s3-grid">`;
    s.options.forEach((opt) => {
      if (opt === s.noneOption) return;
      const sel = screen3Selections.has(opt);
      const cls = sel ? 'option-btn selected-green' : 'option-btn';
      html += `<button class="${cls}" onclick="screen3Toggle('${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
    });
    html += `</div>`;
    html += `<hr class="divider">`;
    html += `<button class="semmi-btn" onclick="screen3Toggle('${s.noneOption}')">${s.noneOption}</button>`;
    if (screen3Selections.size > 0 && !screen3Selections.has(s.noneOption)) {
      html += `<button class="next-btn" onclick="goTo(4)">Tovább</button>`;
    }
  }

  else if (s.type === 'mixed') {
    html += `<div class="btn-grid" id="s4-grid">`;
    s.dangerOptions.forEach((opt) => {
      html += `<button class="option-btn danger-btn" onclick="screen4Danger()">${opt}</button>`;
    });
    html += `<hr class="divider">`;
    s.yellowOptions.forEach((opt) => {
      const sel = screen4YellowSelected.has(opt);
      const cls = sel ? 'option-btn selected-yellow' : 'option-btn';
      html += `<button class="${cls}" onclick="screen4Yellow('${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
    });
    html += `<hr class="divider">`;
    html += `<button class="semmi-btn" onclick="screen4None()">semmi</button>`;
    html += `</div>`;
    if (screen4YellowNext) {
      html += `<button class="next-btn" onclick="goTo(5)">Tovább</button>`;
    }

  else if (s.type === 'emotional') {
    html += `<div class="btn-grid">`;
    s.dangerOptions.forEach((opt) => {
      html += `<button class="option-btn danger-btn" onclick="screen5Danger()">${opt}</button>`;
    });
    html += `</div>`;
    html += `<button class="skip-btn" onclick="screen5Skip()">${s.skipOption}</button>`;
  }

  else if (s.type === 'info') {
    const p = s.primary;
    const sec = s.secondary;

    html += `<div class="setup-container">
      <div class="setup-block ${s6PrimaryOpen ? 'open' : ''}">
        <div class="setup-header" onclick="toggleSetup('primary')">

        </div>
        <div class="setup-list">
          ${p.items.map(i => `<div class="setup-item">${i}</div>`).join('')}

        <div class="setup-header" onclick="toggleSetup('secondary')">
          <span>${sec.label}</span>

        </div>
        <div class="setup-list">
          ${sec.items.map(i => `<div class="setup-item">${i}</div>`).join('')}
        </div>
      </div>

  }

  html += `</div>`;
  container.innerHTML = html;
}

function screen1Toggle(opt) {
  if (screen1Selections.has(opt)) {
    screen1Selections.delete(opt);
  } else {
    screen1Selections.add(opt);
  }
  render();
}

  const s = SCREENS[2];

  if (screen3Selections.has(opt)) {
    screen3Selections.delete(opt);
  } else {
    screen3Selections.delete(s.noneOption);
    screen3Selections.add(opt);
  }
  render();
}

function buildSummaryRows() {

    s4val = 'semmi';

    s4val = Array.from(screen4YellowSelected).join(', ');
  } else {
    s4val = '—';
  }
  rows.push({ step: 'Kötés ellen', value: s4val });
  return rows;
}

function setOutcome(val) {
  logOutcome = val;
  ['win','be','loss'].forEach(v => {
    const btn = document.getElementById('oc-' + v);
    if (btn) btn.className = 'oc-btn' + (v === val ? ' sel-' + v : '');
  });
  const saveBtn = document.getElementById('log-save-btn');
  if (saveBtn) saveBtn.disabled = false;
}


function toggleLogSetup(item) {
  if (logSetup.has(item)) {
    logSetup.delete(item);
  } else {
    logSetup.add(item);
  }
  // Re-render just the buttons without rebuilding the whole screen
  document.querySelectorAll('.setup-item-btn').forEach(function(btn) {
    const label = btn.textContent.trim();
    btn.className = 'setup-item-btn' + (logSetup.has(label) ? ' sp-selected' : '');
  });
}

function toggleSpBlock(which) {
  const el = document.getElementById('sp-block-' + which);
  if (el) el.classList.toggle('sp-open');
}

function handleImageUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    // Compress via canvas: max 1200px wide, JPEG 72%
    const img = new Image();
    img.onload = function() {
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.72);
      logImage = compressed;
      // Show preview
      const preview = document.getElementById('img-preview');
      const wrap    = document.getElementById('img-preview-wrap');
      const face    = document.getElementById('img-upload-face');
      if (preview) preview.src = compressed;
      if (wrap)    wrap.classList.add('visible');
      if (face)    { face.textContent = '\u2713 Kép betöltve'; face.classList.add('has-img'); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  logImage = null;
  const preview = document.getElementById('img-preview');
  const wrap    = document.getElementById('img-preview-wrap');
  const face    = document.getElementById('img-upload-face');
  const input   = document.getElementById('img-file-input');
  if (preview) preview.src = '';
  if (wrap)    wrap.classList.remove('visible');
  if (face)    { face.innerHTML = '&#128247; Kép feltöltése'; face.classList.remove('has-img'); }
  if (input)   input.value = '';
}

function saveLogEntry() {
  if (!logOutcome) return;
  const folder = (document.getElementById('folder-input').value || todayStr()).trim();
  const rows = buildSummaryRows();

  const entry = {
    id: Date.now(),
    folder: folder,
    timestamp: new Date().toISOString(),
    outcome: logOutcome,
    data: {},
    image: logImage || null,
    setup: logSetup.size > 0 ? Array.from(logSetup) : null
  };
  rows.forEach(r => { entry.data[r.step] = r.value; });

  // 1. Save to localStorage as backup
  let log = [];
  try { log = JSON.parse(localStorage.getItem('tradegate_log') || '[]'); } catch(e) {}
  log.push(entry);
  localStorage.setItem('tradegate_log', JSON.stringify(log));

  // 2. Auto-download as individual .json file
  // Filename: trade_FOLDER_TIMESTAMP.json  e.g. trade_2025-01-15_1705312847123.json
  const filename = 'trade_' + folder + '_' + entry.id + '.json';
  const blob = new Blob([JSON.stringify(entry, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  // 3. Show toast
  const toast = document.getElementById('log-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);

  // 4. Reset outcome only — gate state untouched, multiple saves per session possible
  logOutcome = null;
  showLogScreen();
}

function toggleSetup(which) {
  if (which === 'primary') s6PrimaryOpen = !s6PrimaryOpen;
  else s6SecondaryOpen = !s6SecondaryOpen;
  render();
}

// ── Storage key ───────────────────────────────────────────────────────────────
const EVO_KEY    = 'tradegate_evo_log';
const GATE_KEY   = 'tradegate_log';
const SYNC_KEY   = 'tradegate_evo_synced';

// ── State ─────────────────────────────────────────────────────────────────────
let allTrades    = [];   // master array, loaded from localStorage on boot
let currentView  = 'dashboard';
let logFilter    = 'all';
let logDateFrom  = '';
let logDateTo    = '';
let logHtfFilter   = '';
let logExtraFilter = '';

let confirmCallback = null;

// ── Boot ──────────────────────────────────────────────────────────────────────
function evoBoot() {
  evoLoadFromStorage();
  evoRenderAll();
}

function evoLoadFromStorage() {
  try {
    allTrades = JSON.parse(localStorage.getItem(EVO_KEY) || '[]');
  } catch(e) { allTrades = []; }
  // Deduplicate by id
  const seen = new Set();
  allTrades = allTrades.filter(t => {
    if (seen.has(t.id)) return false;
    seen.add(t.id); return true;
  });
}

function evoSaveToStorage() {
  localStorage.setItem(EVO_KEY, JSON.stringify(allTrades));
  localStorage.setItem(SYNC_KEY, new Date().toISOString());
  evoUpdateSyncIndicator();
}

function evoUpdateSyncIndicator() {
  const el = document.getElementById('sync-indicator');
  const raw = localStorage.getItem(SYNC_KEY);
  if (!raw || allTrades.length === 0) {
    el.innerHTML = 'Nincs adat';
    return;
  }
  const d = new Date(raw);
  const stamp = d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
  el.innerHTML = 'Utolsó szinkron: <span>' + stamp + '</span> · <span>' + allTrades.length + ' trade</span>';
}

// ── View switching ────────────────────────────────────────────────────────────

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function evoRenderDashboard() {
  const el = document.getElementById('dashboard-content');
  if (allTrades.length === 0) {
    el.innerHTML = emptyState('&#9685;', 'Még nincs adat', 'Importálj kereskedéseket a Szinkron fülön, vagy szinkronizálj TradeGate-ből.');
    return;
  }

  const total = allTrades.length;
  const wins  = allTrades.filter(t => t.outcome === 'win').length;
  const losses= allTrades.filter(t => t.outcome === 'loss').length;
  const bes   = allTrades.filter(t => t.outcome === 'be').length;
  const wr    = total > 0 ? Math.round((wins / total) * 100) : 0;

  // Use integer floor for win/loss, give remainder to be to always sum to 100
  const winPct  = total > 0 ? Math.floor(wins   / total * 100) : 0;
  const lossPct = total > 0 ? Math.floor(losses  / total * 100) : 0;
  const bePct   = total > 0 ? (100 - winPct - lossPct)         : 0;

  const wrColor = wr >= 55 ? 'green' : wr >= 45 ? 'yellow' : 'red';

  // Folders
  const folders = {};
  allTrades.forEach(t => {
    folders[t.folder] = (folders[t.folder] || 0) + 1;
  });
  const folderCount = Object.keys(folders).length;
  const folderColor = 'var(--muted)';
  const totalColor  = total >= 100 ? 'var(--green)' : 'var(--yellow)';

  // Latest SESSION: find the most recent folder date, show all trades from it
  const sortedFolders = Object.keys(folders).sort().reverse();
  const latestFolder  = sortedFolders[0] || '';
  const recent = allTrades.filter(t => t.folder === latestFolder)
                           .sort((a,b) => b.id - a.id);
  const recentRows = recent.map(t => evoBuildCard(t, 'dash')).join('');

  const sampleWarning = total < 100
    ? `<div style="border:1px solid var(--yellow);padding:12px 14px;margin-bottom:20px;font-size:15px;color:var(--yellow);line-height:1.4;">
        <strong>Mintaméret-figyelmeztetés:</strong> ${total} kereskedés — legalább 100 szükséges a statisztikailag megbízható következtetésekhez.
       </div>`
    : '';

  el.innerHTML = `
    <div class="view-title">Dashboard</div>
    ${sampleWarning}
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value ${wrColor}">${wr}%</div>
        <div class="stat-sub">${wins}W / ${bes}BE / ${losses}L</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Összes trade</div>
        <div class="stat-value" style="color:${totalColor};">${total}</div>
        <div class="stat-sub" style="color:${folderColor};">${folderCount} kereskedési nap</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Nyerők</div>
        <div class="stat-value green">${wins}</div>
        <div class="stat-sub">${winPct}% arány</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Veszítők</div>
        <div class="stat-value red">${losses}</div>
        <div class="stat-sub">${lossPct}% arány</div>
      </div>
    </div>
    <div class="wlb-bar-wrap">
      <div class="wlb-label-row">
        <span class="wlb-label" style="color:var(--win)">Win ${winPct}%</span>
        <span class="wlb-label" style="color:var(--be)">BE ${bePct}%</span>
        <span class="wlb-label" style="color:var(--loss)">Loss ${lossPct}%</span>
      </div>
      <table class="wlb-bar">
        <tr>
          <td class="wlb-seg win"  style="width:${winPct}%"></td>
          <td class="wlb-seg be"   style="width:${bePct}%"></td>
          <td class="wlb-seg loss" style="width:${lossPct}%"></td>
        </tr>
      </table>
    </div>
    <div class="section-hdr">Legutóbbi munkamenet: <span style="color:var(--accent)">${latestFolder}</span> (${recent.length} trade)</div>
    ${recentRows}`;
}

// ── ANALYSIS ──────────────────────────────────────────────────────────────────
function evoRenderAnalysis() {
  const el = document.getElementById('analysis-content');
  if (allTrades.length === 0) {
    el.innerHTML = emptyState('&#9685;', 'Még nincs adat', 'Importálj kereskedéseket a Szinkron fülön.');
    return;
  }

  const fields = ['HTF POI', 'Extra körülmény', 'Kötés ellen'];
  let html = '<div class="view-title">Analízis</div>';

  // Per-outcome breakdown toggle
  fields.forEach(field => {
    // Collect individual values (comma-separated → split)
    const map = {}; // value → { win, be, loss, total }
    allTrades.forEach(t => {
      const raw = t.data[field] || '—';
      const vals = raw.split(',').map(v => v.trim()).filter(Boolean);
      vals.forEach(v => {
        if (!map[v]) map[v] = { win:0, be:0, loss:0, total:0 };
        map[v][t.outcome]++;
        map[v].total++;
      });
    });

    const entries = Object.entries(map).sort((a,b) => {
      const wrA = a[1].win / a[1].total;
      const wrB = b[1].win / b[1].total;
      return wrB - wrA;
    });

    if (entries.length === 0) return;

    const rows = entries.map(([val, stats]) => {
      const wr = stats.total > 0 ? Math.round(stats.win / stats.total * 100) : 0;
      const fillClass = wr >= 55 ? '' : wr >= 40 ? 'mid' : 'low';
      const sampleFlag = stats.total < 5
        ? `<span style="color:var(--yellow);font-size:10px;" title="Kevés adat (${stats.total})"> !</span>` : '';
      return `<div class="factor-row">
        <span class="factor-name" title="${val}">${val}${sampleFlag}</span>
        <div class="factor-bar-wrap">
          <div class="factor-bar-fill ${fillClass}" style="width:${wr}%"></div>
        </div>
        <span class="factor-stat"><strong>${wr}%</strong> (${stats.win}/${stats.total})</span>
      </div>`;
    }).join('');

    html += `<div class="factor-block">
      <div class="factor-title">${field}</div>
      ${rows}
    </div>`;
  });

  // Combination analysis: HTF POI × Kötés ellen
  const comboMap = {};
  allTrades.forEach(t => {
    const htfs = (t.data['HTF POI'] || '—').split(',').map(v=>v.trim());
    const ke   = t.data['Kötés ellen'] || '—';
    htfs.forEach(htf => {
      const key = htf + ' + ' + ke;
      if (!comboMap[key]) comboMap[key] = { win:0, be:0, loss:0, total:0 };
      comboMap[key][t.outcome]++;
      comboMap[key].total++;
    });
  });

  const combos = Object.entries(comboMap)
    .filter(([,s]) => s.total >= 3)
    .sort((a,b) => (b[1].win/b[1].total) - (a[1].win/a[1].total))
    .slice(0, 10);

  if (combos.length > 0) {
    const comboRows = combos.map(([key, stats]) => {
      const wr = Math.round(stats.win / stats.total * 100);
      const fillClass = wr >= 55 ? '' : wr >= 40 ? 'mid' : 'low';
      return `<div class="factor-row">
        <span class="factor-name" title="${key}" style="font-size:13px;">${key}</span>
        <div class="factor-bar-wrap">
          <div class="factor-bar-fill ${fillClass}" style="width:${wr}%"></div>
        </div>
        <span class="factor-stat"><strong>${wr}%</strong> (${stats.win}/${stats.total})</span>
      </div>`;
    }).join('');

    html += `<div class="factor-block">
      <div class="factor-title">HTF POI × Kötés ellen (min. 3 minta)</div>
      ${comboRows}
    </div>`;
  }

  el.innerHTML = html;
}

// ── TRADE LOG ─────────────────────────────────────────────────────────────────
// ── SHARED CARD BUILDER ───────────────────────────────────────────────────────
function evoBuildCard(t, context) {
  const ctx    = (context === 'dash') ? 'dash' : 'log';
  const htf    = t.data['HTF POI'] || '—';
  const d      = new Date(t.timestamp);
  const ds     = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const time   = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  const tid    = Number(t.id);
  const openId = ctx === 'dash' ? expandedCardDash : expandedCard;
  const isOpen = openId === tid;
  const toggleFn = ctx === 'dash' ? 'evoDashToggle(' + tid + ')' : 'evoToggleCard(' + tid + ')';

  const detailRows = Object.entries(t.data).map(function(entry) {
    return '<div class="trade-detail-row"><span class="trade-detail-key">' + entry[0] + '</span><span class="trade-detail-val">' + entry[1] + '</span></div>';
  }).join('') + (t.setup && t.setup.length > 0
    ? '<div class="trade-detail-row"><span class="trade-detail-key">Setup</span><span class="trade-detail-val">' + t.setup.join(', ') + '</span></div>'
    : '');

  const snapshotHtml = (t.image && isOpen)
    ? '<img class="trade-snapshot" src="' + t.image + '" alt="snapshot" onclick="event.stopPropagation();openLightbox(' + tid + ')" />'
    : '';

  const camIcon = t.image ? '<span style="color:var(--muted);font-size:13px;" title="Snapshot csatolva">&#128247;</span>' : '';

  return '<div class="trade-card">'
    + '<div class="trade-card-header" onclick="' + toggleFn + '">'
    +   '<div class="trade-card-left">'
    +     '<span class="outcome-dot ' + t.outcome + '"></span>'
    +     '<span class="trade-card-date">' + ds + ' ' + time + '</span>'
    +     '<span class="trade-card-htf">' + htf + '</span>'
    +   '</div>'
    +   '<div style="display:flex;align-items:center;gap:6px;">'
    +     camIcon
    +     '<span class="outcome-badge ' + t.outcome + '">' + outcomeLabel(t.outcome) + '</span>'
    +   '</div>'
    + '</div>'
    + '<div class="trade-card-body' + (isOpen ? ' open' : '') + '">'
    +   '<div style="margin-bottom:10px;font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);letter-spacing:0.1em;">MAPPA: ' + t.folder + '</div>'
    +   snapshotHtml
    +   detailRows
    +   '<div class="trade-card-footer">'
    +     '<button class="delete-btn" onclick="evoConfirmDeleteTrade(' + tid + ')">Törlés</button>'
    +   '</div>'
    + '</div>'
    + '</div>';
}

function evoGetFiltered() {
  let f = allTrades.slice();
  if (logFilter !== 'all') f = f.filter(t => t.outcome === logFilter);
  if (logDateFrom) f = f.filter(t => (t.folder || '') >= logDateFrom);
  if (logDateTo)   f = f.filter(t => (t.folder || '') <= logDateTo);
  if (logHtfFilter)     f = f.filter(t => (t.data['HTF POI'] || '').split(', ').some(v => v.trim() === logHtfFilter));
  if (logExtraFilter)   f = f.filter(t => (t.data['Extra körülmény'] || '').split(', ').some(v => v.trim() === logExtraFilter));
  if (logAgainstFilter) f = f.filter(t => (t.data['Kötés ellen'] || '').split(', ').some(v => v.trim() === logAgainstFilter));
  if (logSetupFilter)   f = f.filter(t => Array.isArray(t.setup) && t.setup.some(v => v.trim() === logSetupFilter));
  return f;
}

// ── IMPORT ────────────────────────────────────────────────────────────────────
function evoImportFolder(input) {
  const files = Array.from(input.files).filter(f => f.name.endsWith('.json'));
  if (files.length === 0) {
    setImportStatus('Nem találhatók .json fájlok.', 'err');
    return;
  }

  let loaded = 0, skipped = 0, errors = 0;
  let pending = files.length;

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const entry = JSON.parse(e.target.result);
        // Accept single entry or array
        const entries = Array.isArray(entry) ? entry : [entry];
        entries.forEach(en => {
          if (en.id && en.outcome && en.data) {
            const exists = allTrades.some(t => t.id === en.id);
            if (!exists) { allTrades.push(en); loaded++; }
            else skipped++;
          } else { errors++; }
        });
      } catch(err) { errors++; }
      pending--;
      if (pending === 0) {
        evoSaveToStorage();
        evoRenderAll();
        const msg = `${loaded} új bejegyzés importálva` +
          (skipped  ? `, ${skipped} már létezett` : '') +
          (errors   ? `, ${errors} hiba` : '') + '.';
        setImportStatus(msg, loaded > 0 ? 'ok' : 'err');
        showToast(loaded > 0 ? `${loaded} bejegyzés importálva` : 'Nincs új adat', loaded > 0 ? false : true);
      }
    };
    reader.readAsText(file);
  });

  // Reset input so same folder can be re-imported
  input.value = '';
}

function evoSyncFromTradeGate() {
  let gateTrades = [];
  try { gateTrades = JSON.parse(localStorage.getItem(GATE_KEY) || '[]'); } catch(e) {}
  if (gateTrades.length === 0) {
    showToast('Nincs TradeGate adat', true);
    return;
  }
  let added = 0;
  gateTrades.forEach(t => {
    if (!allTrades.some(e => e.id === t.id)) {
      allTrades.push(t); added++;
    }
  });
  if (added > 0) { evoSaveToStorage(); evoRenderAll(); }
  showToast(added > 0 ? `${added} új bejegyzés szinkronizálva` : 'Nincs új adat', added === 0);
}

function evoExportAllJSON() {
  if (allTrades.length === 0) { showToast('Nincs exportálható adat', true); return; }
  const blob = new Blob([JSON.stringify(allTrades, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'tradegate_evo_export_' + todayStr() + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('Export letöltve');
}

function setImportStatus(msg, type) {
  const el = document.getElementById('import-status');
  if (!el) return;
  el.textContent = msg;
  el.className = 'import-status' + (type ? ' ' + type : '');
}

// ── DELETE ────────────────────────────────────────────────────────────────────
function evoConfirmDeleteTrade(id) {
  id = Number(id);
  const t = allTrades.find(e => Number(e.id) === id);
  if (!t) return;
  evoShowConfirm(
    'Törlöd ezt a bejegyzést?',
    (t.data['HTF POI'] || '—') + ' · ' + outcomeLabel(t.outcome),
    () => {
      allTrades = allTrades.filter(e => Number(e.id) !== id);
      expandedCard = null;
      evoSaveToStorage();
      evoRenderAll();
      showToast('Bejegyzés törölve');
    }
  );
}

function evoConfirmClearAll() {
  evoShowConfirm(
    'Törlöd az összes adatot?',
    'Ez a művelet nem vonható vissza.',
    () => {
      allTrades = [];
      localStorage.removeItem(EVO_KEY);
      localStorage.removeItem(SYNC_KEY);
      evoRenderAll();
      showToast('Összes adat törölve');
    }
  );
}

// ── CONFIRM DIALOG ────────────────────────────────────────────────────────────
function evoShowConfirm(msg, sub, cb) {
  confirmCallback = cb;
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-sub').textContent = sub;
  document.getElementById('confirm-yes-btn').onclick = function() {
    var fn = confirmCallback;
    evoCloseConfirm();
    if (fn) fn();
  };
  document.getElementById('confirm-overlay').classList.add('visible');
}
function evoCloseConfirm() {
  document.getElementById('confirm-overlay').classList.remove('visible');
  confirmCallback = null;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function outcomeLabel(o) {
  return o === 'win' ? 'Win' : o === 'loss' ? 'Loss' : 'BE';
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
}

function emptyState(icon, title, sub) {
  return `<div class="empty-state">
    <div class="empty-icon">${icon}</div>
    <div class="empty-title">${title}</div>
    <div class="empty-sub">${sub}</div>
  </div>`;
}

function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 2000);
}


function openLightbox(tradeId) {
  tradeId = Number(tradeId);
  const t = allTrades.find(e => Number(e.id) === tradeId);
  if (!t || !t.image) return;
  document.getElementById('lightbox-img').src = t.image;
  document.getElementById('lightbox').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('visible');
  document.getElementById('lightbox-img').src = '';
  document.body.style.overflow = '';
}

// ── Init ────────────────────────────────────────────────────
reset();
evoBoot();
</script>
