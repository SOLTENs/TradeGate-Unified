function gapSwitchView(name) {
  document.querySelectorAll('#pane-gap .view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('#pane-gap .nav-btn').forEach(function(b){ b.classList.remove('active'); });
  var vEl = document.getElementById('gap-view-' + name);
  var nEl = document.getElementById('gap-nav-' + name);
  if (vEl) vEl.classList.add('active');
  if (nEl) nEl.classList.add('active');
  if (name === 'dashboard') gapRenderDashboard();
  else if (name === 'errorengine') gapRenderErrorEngine();
  else if (name === 'factorgap') gapRenderFactorGap();
}

function gapRenderFactorGap() {
  var el = document.getElementById('gap-factorgap-content');
  if (!el) return;

  var hasEvo  = allTrades  && allTrades.length  > 0;
  var hasReal = realTrades && realTrades.length > 0;
  if (!hasEvo && !hasReal) {
    el.innerHTML = emptyState('&#9671;', 'Nincs adat', 'EVO és REAL adatok szükségesek az összehasonlításhoz.');
    return;
  }

  var LOW = 20;
  var DIMS = [
    {key:'htf',    label:'HTF POI',
      get:function(t){return (t.data&&t.data['HTF POI']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='nincs'&&v!=='—';});}},
    {key:'extra',  label:'Extra',
      get:function(t){return (t.data&&t.data['Extra körülmény']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='nincs'&&v!=='—';});}},
    {key:'against',label:'Ellene szól',
      get:function(t){return (t.data&&t.data['Kötés ellen']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='semmi'&&v!=='—';});}},
    {key:'setup',  label:'Setup',
      get:function(t){return Array.isArray(t.setup)?t.setup.map(function(v){return v.trim();}):[];}},
    {key:'stf',    label:'STF',
      get:function(t){return t.stf?[stfLabel(t.stf)]:[]}},
    {key:'quality',label:'Minőségi setup',
      get:function(t){return Array.isArray(t.qualitySetup)?t.qualitySetup:[]}},
    {key:'wrong',  label:'Hibás setup',
      get:function(t){return Array.isArray(t.wrongSetup)?t.wrongSetup:[]}},
  ];

  var evoN  = hasEvo  ? allTrades.length  : 0;
  var realN = hasReal ? realTrades.length : 0;

  function wr(ts) {
    if(!ts||!ts.length) return null;
    return Math.round(ts.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length/ts.length*100);
  }
  function wrCol(v){ return v===null?'var(--muted)':v>=55?'var(--win)':v>=45?'var(--yellow)':'var(--loss)'; }
  function gapCol(d){ return d>=10?'var(--loss)':d<=-10?'var(--win)':d>=5?'var(--yellow)':d<=-5?'var(--accent)':'var(--muted)'; }

  // Collect per-dim per-value stats for EVO and REAL
  function collectStats(trades) {
    var res = {};
    DIMS.forEach(function(dim) {
      var m = {};
      trades.forEach(function(t) {
        dim.get(t).forEach(function(v) {
          if(!m[v]) m[v]={win:0,be:0,loss:0,total:0};
          m[v].total++;
          if(t.outcome==='win') m[v].win++;
          else if(t.outcome==='be') m[v].be++;
          else if(t.outcome==='loss') m[v].loss++;
        });
      });
      res[dim.key] = m;
    });
    return res;
  }

  var evoStats  = hasEvo  ? collectStats(allTrades)  : {};
  var realStats = hasReal ? collectStats(realTrades) : {};

  var html = '<div class="view-title">Factor Gap</div>';

  // ── Sections per dim ──────────────────────────────────────────────────────
  DIMS.forEach(function(dim) {
    var em = evoStats[dim.key]  || {};
    var rm = realStats[dim.key] || {};
    var allVals = {};
    Object.keys(em).forEach(function(v){allVals[v]=true;});
    Object.keys(rm).forEach(function(v){allVals[v]=true;});
    var vals = Object.keys(allVals).sort();
    if(!vals.length) return;

    // Build rows sorted by EVO usage desc
    var rows = vals.map(function(v) {
      var e = em[v]||{win:0,be:0,loss:0,total:0};
      var r = rm[v]||{win:0,be:0,loss:0,total:0};
      var ePct  = evoN  ? Math.round(e.total/evoN*100)  : 0;
      var rPct  = realN ? Math.round(r.total/realN*100) : 0;
      var eWr   = wr([].concat(Array(e.win).fill({outcome:'win'}),Array(e.be).fill({outcome:'be'}),Array(e.loss).fill({outcome:'loss'})));
      // simpler:
      eWr = e.total>0 ? Math.round((e.win+e.be)/e.total*100) : null;
      var rWr = r.total>0 ? Math.round((r.win+r.be)/r.total*100) : null;
      return {v:v, ePct:ePct, rPct:rPct, eTotal:e.total, rTotal:r.total, eWr:eWr, rWr:rWr,
              usageDelta:rPct-ePct, wrDelta:(rWr!==null&&eWr!==null)?rWr-eWr:null};
    }).sort(function(a,b){return (b.eTotal+b.rTotal)-(a.eTotal+a.rTotal);});

    var maxPct = Math.max.apply(null, rows.map(function(r){return Math.max(r.ePct,r.rPct)||1;}));

    html += '<div style="border:1px solid var(--border);margin-bottom:16px;overflow:hidden;">';
    html += '<div style="background:var(--surface);padding:8px 14px;border-bottom:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">'+dim.label+'</div>';

    // Column headers
    html += '<div style="display:flex;align-items:center;gap:6px;padding:5px 14px;border-bottom:1px solid var(--border);background:var(--surface);">'
      +'<div style="flex:1;font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);">Érték</div>'
      +'<div style="width:80px;font-family:\'Space Mono\',monospace;font-size:7px;color:#00e87a;text-align:center;">EVO</div>'
      +'<div style="width:80px;font-family:\'Space Mono\',monospace;font-size:7px;color:var(--yellow);text-align:center;">REAL</div>'
      +'<div style="width:44px;font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);text-align:right;">WR Δ</div>'
      +'<div style="width:44px;font-family:\'Space Mono\',monospace;font-size:7px;color:var(--muted);text-align:right;">Haszn.Δ</div>'
      +'</div>';

    rows.forEach(function(row) {
      var safe = row.v.replace(/</g,'&lt;').replace(/>/g,'&gt;');
      var eLow = row.eTotal < LOW && row.eTotal > 0;
      var rLow = row.rTotal < LOW && row.rTotal > 0;

      var eBarW = Math.round(row.ePct/maxPct*80);
      var rBarW = Math.round(row.rPct/maxPct*80);

      var ePctStr = row.eTotal > 0 ? row.ePct+'% ('+row.eTotal+')' : '—';
      var rPctStr = row.rTotal > 0 ? row.rPct+'% ('+row.rTotal+')' : '—';
      var wrDeltaStr = row.wrDelta !== null ? (row.wrDelta>0?'+':'')+row.wrDelta+'%' : '—';
      var usageDeltaStr = (row.eTotal>0||row.rTotal>0) ? (row.usageDelta>0?'+':'')+row.usageDelta+'%' : '—';

      // Insights
      var insight = '';
      if (row.eWr !== null && row.eWr >= 55 && row.rPct < row.ePct - 10) insight = '↑ Több kell';
      else if (row.eWr !== null && row.eWr < 45 && row.rPct > row.ePct + 5) insight = '↓ Kerülendő';
      else if (row.wrDelta !== null && row.wrDelta <= -15) insight = '⚠ Végrehajtási hiba';

      html += '<div style="padding:8px 14px;border-bottom:1px solid var(--border);">'
        +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--text);flex:1;">'+safe+'</span>'
        +(insight?'<span style="font-family:\'Space Mono\',monospace;font-size:7px;color:var(--accent);background:rgba(200,255,0,0.1);padding:1px 5px;">'+insight+'</span>':'')
        +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:'+gapCol(row.wrDelta!==null?-row.wrDelta:0)+';width:44px;text-align:right;">'+wrDeltaStr+'</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:'+gapCol(row.usageDelta)+';width:44px;text-align:right;">'+usageDeltaStr+'</span>'
        +'</div>'
        // EVO bar
        +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:7px;color:#00e87a;width:28px;flex-shrink:0;">EVO</span>'
        +'<div style="flex:1;height:6px;background:rgba(0,232,122,0.08);">'
        +'<div style="width:'+eBarW+'%;height:100%;background:#00e87a;opacity:'+(eLow?'0.4':'0.8')+';"></div></div>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:'+(eLow?'var(--muted)':'#00e87a')+';width:60px;text-align:right;">'+ePctStr+(eLow?' ⚠':'')+'</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:'+wrCol(row.eWr)+';width:28px;text-align:right;">'+(row.eWr!==null?row.eWr+'%':'—')+'</span>'
        +'</div>'
        // REAL bar
        +'<div style="display:flex;align-items:center;gap:6px;">'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:7px;color:var(--yellow);width:28px;flex-shrink:0;">REAL</span>'
        +'<div style="flex:1;height:6px;background:rgba(255,204,0,0.08);">'
        +'<div style="width:'+rBarW+'%;height:100%;background:var(--yellow);opacity:'+(rLow?'0.4':'0.8')+';"></div></div>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:'+(rLow?'var(--muted)':'var(--yellow)')+';width:60px;text-align:right;">'+rPctStr+(rLow?' ⚠':'')+'</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:'+wrCol(row.rWr)+';width:28px;text-align:right;">'+(row.rWr!==null?row.rWr+'%':'—')+'</span>'
        +'</div>'
        +'</div>';
    });
    html += '</div>';
  });

  // ── Key Insights summary ──────────────────────────────────────────────────
  var insights = [];
  DIMS.forEach(function(dim) {
    var em = evoStats[dim.key]||{}, rm = realStats[dim.key]||{};
    var allVals={};
    Object.keys(em).forEach(function(v){allVals[v]=true;});
    Object.keys(rm).forEach(function(v){allVals[v]=true;});
    Object.keys(allVals).forEach(function(v) {
      var e=em[v]||{win:0,be:0,loss:0,total:0};
      var r=rm[v]||{win:0,be:0,loss:0,total:0};
      if(e.total<5&&r.total<5) return;
      var ePct=evoN?Math.round(e.total/evoN*100):0;
      var rPct=realN?Math.round(r.total/realN*100):0;
      var eWr=e.total>0?Math.round((e.win+e.be)/e.total*100):null;
      var rWr=r.total>0?Math.round((r.win+r.be)/r.total*100):null;
      var safe=v.replace(/</g,'&lt;').replace(/>/g,'&gt;');
      if(eWr!==null&&eWr>=60&&r.total<LOW&&rPct<ePct-10)
        insights.push({type:'underused',label:dim.label+': '+safe,detail:'EVO WR '+eWr+'%, REAL alulhasználja ('+rPct+'% vs '+ePct+'%)',col:'var(--win)'});
      if(eWr!==null&&eWr<40&&rPct>ePct+5)
        insights.push({type:'overused',label:dim.label+': '+safe,detail:'Gyenge EVO WR '+eWr+'%, REAL túlhasználja ('+rPct+'% vs '+ePct+'%)',col:'var(--loss)'});
      if(eWr!==null&&rWr!==null&&eWr-rWr>=20&&r.total>=5)
        insights.push({type:'exec',label:dim.label+': '+safe,detail:'Végrehajtási gap: EVO '+eWr+'% → REAL '+rWr+'% (−'+(eWr-rWr)+'%)',col:'var(--yellow)'});
    });
  });

  if(insights.length) {
    html+='<div style="border:1px solid var(--border);overflow:hidden;">';
    html+='<div style="background:var(--surface);padding:8px 14px;border-bottom:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);">&#9888; Key Insights</div>';
    insights.slice(0,12).forEach(function(ins){
      html+='<div style="padding:8px 14px;border-bottom:1px solid var(--border);border-left:3px solid '+ins.col+';">'
        +'<div style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--text);margin-bottom:2px;">'+ins.label+'</div>'
        +'<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">'+ins.detail+'</div>'
        +'</div>';
    });
    html+='</div>';
  }

  el.innerHTML = html;
}

var _eeOpen = {};
var _eeRows = {};
var _eeExpandedCard = null;

function eeToggleRow(rowId) {
  _eeOpen[rowId] = !_eeOpen[rowId];
  _eeExpandedCard = null;
  gapRenderErrorEngine();
}

function eeToggleCard(id) {
  id = Number(id);
  _eeExpandedCard = (_eeExpandedCard === id ? null : id);
  gapRenderErrorEngine();
}

function gapRenderErrorEngine() {
  var el = document.getElementById('gap-errorengine-content');
  if (!el) return;

  var src = realTrades && realTrades.length ? realTrades : allTrades && allTrades.length ? allTrades : [];
  if (!src.length) {
    el.innerHTML = emptyState('&#9651;', 'Nincs adat', 'A REAL kötések betöltése után jelenik meg az Error Engine.');
    return;
  }

  var n = src.length;
  var baseWr = Math.round(src.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length/n*100);
  _eeRows = {};

  function getErrors(t) {
    var ke = (t.data&&t.data['Kötés ellen']||'').split(',').map(function(v){return v.trim();}).filter(function(v){return v&&v!=='semmi'&&v!=='—';});
    var ws = Array.isArray(t.wrongSetup)?t.wrongSetup.slice():[];
    // HTF POI = nincs = hiba
    var htf = (t.data&&t.data['HTF POI']||'').trim();
    var htfErr = (!htf || htf==='nincs'||htf==='—') ? ['HTF POI: nincs'] : [];
    return ke.concat(ws).concat(htfErr);
  }
  function stats(ts) {
    var m=ts.length; if(!m) return {n:0,wr:0,pts:0,wins:0,bes:0,losses:0};
    var w=ts.filter(function(t){return t.outcome==='win';}).length;
    var b=ts.filter(function(t){return t.outcome==='be';}).length;
    var l=ts.filter(function(t){return t.outcome==='loss';}).length;
    return {n:m,wr:Math.round((w+b)/m*100),pts:w-l,wins:w,bes:b,losses:l};
  }
  function wrCol(v){return v>=55?'var(--win)':v>=45?'var(--yellow)':'var(--loss)';}
  function ptsCol(v){return v>0?'var(--win)':v===0?'var(--be)':'var(--loss)';}

  var cardBuilder = (realTrades && realTrades.length) ? realBuildCard : evoBuildCard;

  function buildTradeCards(trades) {
    if (!trades.length) return '<div style="padding:12px 14px;font-family:\'Space Mono\',monospace;font-size:9px;color:var(--muted);">Nincs kötés.</div>';
    // Temporarily override expanded state for EE context
    var prevReal = realExpandedCard, prevEvo = expandedCard;
    realExpandedCard = _eeExpandedCard;
    expandedCard = _eeExpandedCard;
    var sorted = trades.slice().sort(function(a,b){
      return (a.folder||'').localeCompare(b.folder||'')||(a.timestamp||'').localeCompare(b.timestamp||'');
    });
    var smap = {};
    sorted.forEach(function(t){ if(!smap[t.folder])smap[t.folder]=[]; smap[t.folder].push(t); });
    var result = Object.keys(smap).sort().reverse().map(function(folder){
      var ts=smap[folder];
      var ws=ts.filter(function(t){return t.outcome==='win';}).length;
      var bs=ts.filter(function(t){return t.outcome==='be';}).length;
      var ls=ts.filter(function(t){return t.outcome==='loss';}).length;
      var dr=ts.length?Math.round((ws+bs)/ts.length*100):0;
      var dc=dr>=55?'var(--win)':dr>=45?'var(--yellow)':'var(--loss)';
      return '<div class="session-group">'
        +'<div class="session-group-header">'
        +'<span class="session-group-date">'+folder+'</span>'
        +'<span class="session-group-stats">'
        +'<span style="color:var(--win)">'+ws+'W</span> '
        +'<span style="color:var(--be)">'+bs+'BE</span> '
        +'<span style="color:var(--loss)">'+ls+'L</span> '
        +'<span style="color:'+dc+';font-weight:700;">'+dr+'%</span>'
        +'</span></div>'
        +ts.map(function(t){
          var html = cardBuilder(t);
          // Patch onclick to use eeToggleCard instead
          html = html.replace(/onclick="realToggleCard\((\d+)\)"/g, 'onclick="eeToggleCard($1)"');
          html = html.replace(/onclick="evoToggleCard\((\d+)\)"/g, 'onclick="eeToggleCard($1)"');
          html = html.replace(/onclick="toggleCard\((\d+)\)"/g, 'onclick="eeToggleCard($1)"');
          return html;
        }).join('')
        +'</div>';
    }).join('');
    // Restore original expanded state
    realExpandedCard = prevReal;
    expandedCard = prevEvo;
    return result;
  }

  function renderRow(rowId, label, trades, accentColor) {
    _eeRows[rowId] = trades;
    var s = stats(trades);
    var low = s.n < 20;
    var isOpen = !!_eeOpen[rowId];
    var safe = label.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var wp=s.n?Math.round(s.wins/s.n*100):0, bp=s.n?Math.round(s.bes/s.n*100):0, lp=Math.max(0,100-wp-bp);
    var bar='<div style="display:flex;height:3px;width:60px;flex-shrink:0;">'
      +'<div style="flex:'+wp+';background:var(--win);"></div>'
      +'<div style="flex:'+bp+';background:var(--be);"></div>'
      +'<div style="flex:'+lp+';background:var(--loss);"></div></div>';
    var html='<div style="border-bottom:1px solid var(--border);">'
      +'<div onclick="eeToggleRow('+rowId+')" '
      +'style="display:flex;align-items:flex-start;gap:8px;padding:9px 14px;cursor:pointer;border-left:3px solid '+accentColor+';opacity:'+(low?'0.55':'1')+'" '
      +'onmouseenter="this.style.background=\'rgba(200,255,0,0.03)\'" onmouseleave="this.style.background=\'\'">'
      +'<div style="flex:1;min-width:0;">'
      +'<div style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--text);line-height:1.5;word-break:break-word;">'+safe+(low?' <span style="color:var(--yellow);font-size:7px;">⚠</span>':'')+'</div>'
      +bar
      +'<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);margin-top:2px;">'+s.wins+'W '+s.bes+'BE '+s.losses+'L</div>'
      +'</div>'
      +'<div style="flex-shrink:0;text-align:right;min-width:58px;">'
      +'<div style="font-size:16px;font-weight:900;color:'+wrCol(s.wr)+';">'+s.wr+'%</div>'
      +'<div style="font-family:\'Space Mono\',monospace;font-size:9px;color:'+ptsCol(s.pts)+';">'+(s.pts>0?'+':'')+s.pts+' pt</div>'
      +'<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">'+s.n+'db '+(isOpen?'&#9650;':'&#9660;')+'</div>'
      +'</div></div>';
    if (isOpen) {
      html+='<div id="ee-body-'+rowId+'" style="border-top:1px solid var(--border);border-left:3px solid '+accentColor+';background:rgba(0,0,0,0.15);">'
        +buildTradeCards(trades)+'</div>';
    }
    html+='</div>';
    return html;
  }

  // Build data
  var errMap = {};
  src.forEach(function(t){
    getErrors(t).forEach(function(e){
      if(!errMap[e]) errMap[e]=[];
      errMap[e].push(t);
    });
  });
  var errList = Object.keys(errMap).map(function(e){
    return {name:e, trades:errMap[e]};
  }).sort(function(a,b){return stats(a.trades).pts-stats(b.trades).pts;});

  var g0=[],g1=[],g2=[],g3plus=[];
  src.forEach(function(t){
    var ec=getErrors(t).length;
    if(ec===0)g0.push(t); else if(ec===1)g1.push(t); else if(ec===2)g2.push(t); else g3plus.push(t);
  });

  var clusterMap = {};
  src.forEach(function(t){
    var errs=getErrors(t);
    for(var i=0;i<errs.length;i++){
      for(var j=i+1;j<errs.length;j++){
        var k=[errs[i],errs[j]].sort().join(' + ');
        if(!clusterMap[k]) clusterMap[k]=[];
        clusterMap[k].push(t);
      }
    }
  });
  var clusters=Object.keys(clusterMap).map(function(k){
    return {combo:k,trades:clusterMap[k]};
  }).filter(function(c){return c.trades.length>=2;}).sort(function(a,b){return stats(a.trades).pts-stats(b.trades).pts;});

  var rowId = 0;
  var html = '<div class="view-title">Error Engine</div>';

  // Severity
  html+='<div style="border:1px solid var(--border);margin-bottom:16px;overflow:hidden;">';
  html+='<div style="background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">Error Severity Breakdown</div>';
  [[g0,'0 hiba — Clean','var(--win)'],[g1,'1 hiba','var(--yellow)'],[g2,'2 hiba','var(--loss)'],[g3plus,'3+ hiba','var(--loss)']].forEach(function(row){
    if(!row[0].length) return;
    html+=renderRow(rowId++, row[1], row[0], row[2]);
  });
  html+='</div>';

  // Frequency
  if (errList.length) {
    var maxAbsPts = Math.max.apply(null, errList.map(function(e){return Math.abs(stats(e.trades).pts)||1;}));
    html+='<div style="border:1px solid var(--border);margin-bottom:16px;overflow:hidden;">';
    html+='<div style="background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">Error Frequency & Impact — legrosszabbtól</div>';
    errList.forEach(function(e){
      var s=stats(e.trades);
      var barW=Math.round(Math.abs(s.pts)/maxAbsPts*100);
      var barCol=s.pts<0?'var(--loss)':s.pts===0?'var(--be)':'var(--win)';
      var pct=Math.round(e.trades.length/n*100);
      var low=s.n<50;
      var safe=e.name.replace(/</g,'&lt;').replace(/>/g,'&gt;');
      var rid=rowId;
      _eeRows[rid]=e.trades;
      var isOpen=!!_eeOpen[rid];
      html+='<div style="border-bottom:1px solid var(--border);">'
        +'<div onclick="eeToggleRow('+rid+')" '
        +'style="padding:8px 14px;cursor:pointer;border-left:3px solid '+barCol+';opacity:'+(low?'0.55':'1')+'" '
        +'onmouseenter="this.style.background=\'rgba(200,255,0,0.03)\'" onmouseleave="this.style.background=\'\'">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:var(--text);flex:1;">'+safe+(low?' <span style="color:var(--yellow);font-size:7px;">⚠</span>':'')+'</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);">'+pct+'% / '+s.n+'db</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:10px;font-weight:700;color:'+wrCol(s.wr)+';width:32px;text-align:right;">'+s.wr+'%</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:9px;color:'+ptsCol(s.pts)+';width:32px;text-align:right;">'+(s.pts>0?'+':'')+s.pts+'</span>'
        +'<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);margin-left:4px;">'+(isOpen?'&#9650;':'&#9660;')+'</span>'
        +'</div>'
        +'<div style="display:flex;height:4px;"><div style="width:'+barW+'%;background:'+barCol+';"></div></div>'
        +'</div>';
      if (isOpen) {
        html+='<div style="border-top:1px solid var(--border);border-left:3px solid '+barCol+';background:rgba(0,0,0,0.15);">'
          +buildTradeCards(e.trades)+'</div>';
      }
      html+='</div>';
      rowId++;
    });
    html+='</div>';
  }

  // Clusters
  if (clusters.length) {
    html+='<div style="border:1px solid var(--border);margin-bottom:16px;overflow:hidden;">';
    html+='<div style="background:var(--surface);padding:10px 14px;border-bottom:1px solid var(--border);font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--loss);">Error Clusters — veszélyes kombinációk</div>';
    clusters.slice(0,10).forEach(function(cl){
      html+=renderRow(rowId++, cl.combo, cl.trades, 'var(--loss)');
    });
    html+='</div>';
  }

  if (n < 50) {
    html+='<div style="border:1px solid var(--yellow);padding:8px 14px;font-family:\'Space Mono\',monospace;font-size:8px;color:var(--yellow);line-height:1.5;">⚠ Csak '+n+' kötés. Megbízható elemzéshez legalább 50 javasolt.</div>';
  }

  el.innerHTML = html;
}


function gapRenderDashboard() {
  var el = document.getElementById('gap-dashboard-content');
  if (!el) return;

  var hasEvo  = allTrades  && allTrades.length  > 0;
  var hasReal = realTrades && realTrades.length > 0;

  if (!hasEvo && !hasReal) {
    el.innerHTML = emptyState('&#9671;', 'Nincs adat', 'Az EVO és REAL adatok betöltése után jelenik meg az összehasonlítás.');
    return;
  }

  var evoWr  = hasEvo  ? Math.round(allTrades.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length  / allTrades.length  * 100) : null;
  var realWr = hasReal ? Math.round(realTrades.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length / realTrades.length * 100) : null;
  var diff   = (evoWr !== null && realWr !== null) ? realWr - evoWr : null;

  var evoCopied = hasEvo ? allTrades.filter(function(t){return t.copiedToReal;}).length : 0;
  var covBase   = hasReal ? realTrades.length : (hasEvo ? allTrades.length : 1);
  var evoCovPct = covBase > 0 ? Math.round(evoCopied / covBase * 100) : 0;

  var linkedTrades = hasReal ? realTrades.filter(function(t){return !!t.linkedEvoId;}) : [];
  var linkedWr     = linkedTrades.length > 0
    ? Math.round(linkedTrades.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length / linkedTrades.length * 100)
    : null;

  function wrColor(v) { return v === null ? 'var(--muted)' : v >= 55 ? 'var(--win)' : v >= 45 ? 'var(--yellow)' : 'var(--loss)'; }
  function diffColor(v) { return v === null ? 'var(--muted)' : (Math.abs(v) <= 10 ? 'var(--win)' : 'var(--text)'); }
  function diffStr(v)  { return v === null ? '—' : (v >= 0 ? '+' : '') + v + '%'; }

  // ── Build cumulative WR series ─────────────────────────────────────────────
  function buildWrSeries(trades) {
    if (!trades || !trades.length) return [];
    var sorted = trades.slice().sort(function(a,b){
      return (a.folder||'').localeCompare(b.folder||'') || (a.timestamp||'').localeCompare(b.timestamp||'');
    });
    var pts = [], wins = 0, total = 0;
    sorted.forEach(function(t) {
      total++;
      if (t.outcome === 'win' || t.outcome === 'be') wins++;
      pts.push({ d: t.folder||'', wr: Math.round(wins/total*100) });
    });
    return pts;
  }

  var evoSeries  = hasEvo  ? buildWrSeries(allTrades)  : [];
  var realSeries = hasReal ? buildWrSeries(realTrades) : [];

  var allDates = {};
  evoSeries.forEach(function(p){ allDates[p.d] = true; });
  realSeries.forEach(function(p){ allDates[p.d] = true; });
  var sortedDates = Object.keys(allDates).sort();

  function interpolate(series, dates) {
    var result = {}, last = null, byDate = {};
    series.forEach(function(p){ byDate[p.d] = p.wr; });
    dates.forEach(function(d) {
      if (byDate[d] !== undefined) last = byDate[d];
      if (last !== null) result[d] = last;
    });
    return result;
  }

  _gapDates      = sortedDates;
  _gapEvoByDate  = interpolate(evoSeries,  sortedDates);
  _gapRealByDate = interpolate(realSeries, sortedDates);

  var html = '<div class="view-title">GAP — EVO vs REAL</div>';

  // Chart card with inline WR stats above canvas
  html += '<div style="border:1px solid var(--border);margin-bottom:16px;overflow:hidden;">'
    + '<div style="background:var(--surface);padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">'
    +   '<span style="font-family:\'Space Mono\',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">Win Rate alakulása</span>'
    +   '<div style="display:flex;gap:14px;">'
    +     '<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:#00e87a;">&#9644; EVO</span>'
    +     '<span style="font-family:\'Space Mono\',monospace;font-size:8px;color:#ffcc00;">&#9644; REAL</span>'
    +   '</div>'
    + '</div>'
    // WR summary row inside the card, above the chart
    + '<div style="display:flex;gap:0;border-bottom:1px solid var(--border);">'
    +   '<div style="flex:1;padding:12px 16px;border-right:1px solid var(--border);">'
    +     '<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:#00e87a;letter-spacing:0.1em;margin-bottom:4px;">EVO WIN RATE</div>'
    +     '<div style="font-size:28px;font-weight:900;color:' + wrColor(evoWr) + ';">' + (evoWr !== null ? evoWr + '%' : '—') + '</div>'
    +     '<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);margin-top:2px;">' + (hasEvo ? allTrades.length + ' trade' : 'Nincs adat') + '</div>'
    +   '</div>'
    +   '<div style="flex:1;padding:12px 16px;border-right:1px solid var(--border);">'
    +     '<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:#ffcc00;letter-spacing:0.1em;margin-bottom:4px;">REAL WIN RATE</div>'
    +     '<div style="font-size:28px;font-weight:900;color:' + wrColor(realWr) + ';">' + (realWr !== null ? realWr + '%' : '—') + '</div>'
    +     '<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);margin-top:2px;">' + (hasReal ? realTrades.length + ' trade' : 'Nincs adat') + '</div>'
    +   '</div>'
    +   '<div style="flex:1;padding:12px 16px;border-right:1px solid var(--border);">'
    +     '<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);letter-spacing:0.1em;margin-bottom:4px;">KÜLÖNBSÉG</div>'
    +     '<div style="font-size:28px;font-weight:900;color:' + diffColor(diff) + ';">' + diffStr(diff) + '</div>'
    +     '<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);margin-top:2px;">REAL − EVO</div>'
    +   '</div>'
    +   '<div style="flex:1;padding:12px 16px;">'
    +     '<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);letter-spacing:0.1em;margin-bottom:4px;">EVO LEFEDETTSÉG</div>'
    +     '<div style="font-size:28px;font-weight:900;color:' + (evoCovPct>=80?'var(--win)':evoCovPct>=50?'var(--yellow)':'var(--loss)') + ';">' + evoCovPct + '%</div>'
    +     '<div style="font-family:\'Space Mono\',monospace;font-size:8px;color:var(--muted);margin-top:2px;">' + evoCopied + ' / ' + covBase + ' kötés</div>'
    +   '</div>'
    + '</div>'
    + (sortedDates.length
      ? '<div style="position:relative;padding:12px 8px 8px 0;">'
        + '<canvas id="gap-wr-chart" style="width:100%;height:180px;display:block;"></canvas>'
        + '<div id="gap-tooltip" style="display:none;position:absolute;background:var(--surface);border:1px solid var(--border);padding:7px 10px;font-family:\'Space Mono\',monospace;font-size:8px;pointer-events:none;white-space:nowrap;z-index:10;"></div>'
        + '</div>'
      : '')
    + '</div>';



  el.innerHTML = html;
  setTimeout(gapInitChart, 0);
}



// ── Win Rate chart ────────────────────────────────────────────────────────────
var _wrChartState = { evo: { open: false, year: null, month: null, mode: 'line', lineMonths: 1 },
                      real:{ open: false, year: null, month: null, mode: 'line', lineMonths: 1 } };

function wrChartToggle(db) {
  var st = _wrChartState[db];
  st.open = !st.open;
  if (st.open) {
    if (!st.year) { var now = new Date(); st.year = now.getFullYear(); st.month = now.getMonth() + 1; }
    if (_openOrder[db].indexOf('wr') < 0) _openOrder[db].push('wr');
  } else {
    _openOrder[db] = _openOrder[db].filter(function(x){return x!=='wr';});
  }
  if (db === 'evo') _evoRenderDashboard();
  else realRenderDashboard();
}

function wrChartNav(db, dir) {
  var st = _wrChartState[db];
  st.month += dir;
  if (st.month > 12) { st.month = 1;  st.year++; }
  if (st.month < 1)  { st.month = 12; st.year--; }
  if (db === 'evo') _evoRenderDashboard();
  else realRenderDashboard();
}

function wrChartJump(db, val) {
  // val = "YYYY-MM"
  var parts = val.split('-');
  if (parts.length === 2) {
    _wrChartState[db].year  = parseInt(parts[0], 10);
    _wrChartState[db].month = parseInt(parts[1], 10);
    if (db === 'evo') _evoRenderDashboard();
    else realRenderDashboard();
  }
}

function wrBuildChart(db, trades) {
  var st = _wrChartState[db];
  if (!st.open) return '';
  if (st.mode === 'line') return wrBuildLineChart(db, trades);

  var y = st.year, m = st.month;
  var monthStr = y + '-' + String(m).padStart(2,'0');
  var MONTHS = ['Január','Február','Március','Április','Május','Június','Július','Augusztus','Szeptember','Október','November','December'];
  var label = MONTHS[m-1] + ' ' + y;

  // Collect all available year-months for select
  var allMonths = {};
  trades.forEach(function(t) {
    if (t.folder && t.folder.length >= 7) allMonths[t.folder.slice(0,7)] = true;
  });
  var monthKeys = Object.keys(allMonths).sort().reverse();
  var selectOpts = monthKeys.map(function(k) {
    var p = k.split('-');
    var ml = MONTHS[parseInt(p[1],10)-1] + ' ' + p[0];
    return '<option value="'+k+'"'+(k===monthStr?' selected':'')+'>'+ml+'</option>';
  }).join('');

  // Filter trades for this month
  var monthTrades = trades.filter(function(t) {
    return t.folder && t.folder.slice(0,7) === monthStr;
  });

  // Group by day
  var dayMap = {};
  monthTrades.forEach(function(t) {
    var day = t.folder;
    if (!dayMap[day]) dayMap[day] = { win:0, be:0, loss:0, total:0 };
    dayMap[day].total++;
    if (t.outcome === 'win') dayMap[day].win++;
    else if (t.outcome === 'be') dayMap[day].be++;
    else if (t.outcome === 'loss') dayMap[day].loss++;
  });
  var days = Object.keys(dayMap).sort();

  // Month summary
  var mWins = monthTrades.filter(function(t){return t.outcome==='win'||t.outcome==='be';}).length;
  var mTotal = monthTrades.length;
  var mWr = mTotal > 0 ? Math.round(mWins/mTotal*100) : null;
  var mWrCol = mWr === null ? 'var(--muted)' : mWr >= 55 ? 'var(--win)' : mWr >= 45 ? 'var(--yellow)' : 'var(--loss)';
  var summaryHtml = mTotal > 0
    ? '<span style="color:var(--text);">' + label + '</span>'
    + ' &mdash; <span style="color:'+mWrCol+';font-weight:700;">' + (mWr !== null ? mWr+'%' : '—') + '</span>'
    + ' &mdash; <span style="color:var(--win);">' + monthTrades.filter(function(t){return t.outcome==='win';}).length + 'W</span>'
    + ' / <span style="color:var(--be);">' + monthTrades.filter(function(t){return t.outcome==='be';}).length + 'BE</span>'
    + ' / <span style="color:var(--loss);">' + monthTrades.filter(function(t){return t.outcome==='loss';}).length + 'L</span>'
    + ' &mdash; ' + mTotal + ' kötés'
    : '<span style="color:var(--muted);">Nincs adat ebben a hónapban</span>';

  var barsHtml;
  if (days.length === 0) {
    barsHtml = '<div class="wr-empty">Nincs kereskedett nap ebben a hónapban</div>';
  } else {
    var maxH = 100; // px total height = 100% WR
    var bars = days.map(function(day) {
      var d = dayMap[day];
      var wr = d.total > 0 ? Math.round((d.win+d.be)/d.total*100) : 0;
      var wrCol = wr >= 55 ? 'var(--win)' : wr >= 45 ? 'var(--yellow)' : 'var(--loss)';
      // Total bar height proportional to WR%
      var totalH = Math.max(1, Math.round(wr / 100 * maxH));
      // Within totalH, split win/be proportionally
      var winFrac = (d.win+d.be) > 0 ? d.win/(d.win+d.be) : 0;
      var winH = Math.round(winFrac * totalH);
      var beH  = totalH - winH;
      var dayNum = day.slice(8);
      var goLog = 'wrGoLog(\'' + db + '\',\'' + day + '\')' ;
      return '<div class="wr-bar-col" onclick="'+goLog+'">' 
        + '<div class="wr-bar-pct" style="color:'+wrCol+';">'+wr+'%</div>'
        + '<div class="wr-bar-stack" style="height:'+maxH+'px;justify-content:flex-end;">'
        + (winH > 0 ? '<div class="wr-bar win-seg" style="height:'+winH+'px;"></div>' : '')
        + (beH  > 0 ? '<div class="wr-bar be-seg"  style="height:'+beH+'px;"></div>'  : '')
        + '</div>'
        + '<div class="wr-bar-day">'+dayNum+'</div>'
        + '</div>';
    }).join('');
    barsHtml = '<div class="wr-bars-wrap">'
      + '<div class="wr-bars">'
      + '<div class="wr-baseline" style="bottom:55px;"></div>'
      + bars
      + '</div></div>';
  }

  return '<div class="wr-chart-nav">'
    +   '<button class="wr-chart-nav-btn" onclick="event.stopPropagation();wrChartNav(\'' + db + '\',-1)">&#8592;</button>'
    +   '<span class="wr-chart-month-label" onclick="event.stopPropagation();var s=this.nextElementSibling;s.style.display=s.style.display===\'block\'?\'none\':\'block\';">' + label + '</span>'
    +   '<button class="wr-chart-nav-btn" onclick="event.stopPropagation();wrChartNav(\'' + db + '\',1)">&#8594;</button>'
    + '</div>'
    + '<select class="wr-month-select" onclick="event.stopPropagation();" onchange="wrChartJump(\'' + db + '\',this.value)">' + selectOpts + '</select>'
    + '<div class="wr-chart-summary">' + summaryHtml + '</div>'
    + barsHtml;
}


function wrGoLog(db, day) {
  if (db === 'evo') {
    logDateFrom = day;
    logDateTo   = day;
    // Switch to EVO, then to log view
    ['tg','evo','real','gap'].forEach(function(p) {
      document.getElementById('pane-' + p).classList.toggle('active', p === 'evo');
      document.getElementById('tab-' + p).classList.toggle('active', p === 'evo');
    });
    document.getElementById('tg-reset-btn').style.display = 'none';
    document.getElementById('sync-indicator').style.display = '';
    document.getElementById('real-sync-indicator').style.display = 'none';
    currentView = 'log';
    evoSwitchView('log');
  } else {
    realDateFrom = day;
    realDateTo   = day;
    // Switch to REAL, then to log view
    ['tg','evo','real','gap'].forEach(function(p) {
      document.getElementById('pane-' + p).classList.toggle('active', p === 'real');
      document.getElementById('tab-' + p).classList.toggle('active', p === 'real');
    });
    document.getElementById('tg-reset-btn').style.display = 'none';
    document.getElementById('sync-indicator').style.display = 'none';
    document.getElementById('real-sync-indicator').style.display = '';
    realCurrentView = 'log';
    realSwitchView('log');
  }
}

  if (!st.open) return '';

  var y = st.year, m = st.month;
  var monthStr = y + '-' + String(m).padStart(2,'0');
  var MONTHS = ['Január','Február','Március','Április','Május','Június','Július','Augusztus','Szeptember','Október','November','December'];
  var label = MONTHS[m-1] + ' ' + y;

  var allMonths = {};
  trades.forEach(function(t) {
    if (t.folder && t.folder.length >= 7) allMonths[t.folder.slice(0,7)] = true;
  });
  var monthKeys = Object.keys(allMonths).sort().reverse();
  var selectOpts = monthKeys.map(function(k) {
    var p = k.split('-');
    var ml = MONTHS[parseInt(p[1],10)-1] + ' ' + p[0];
    return '<option value="'+k+'"'+(k===monthStr?' selected':'')+'>'+ml+'</option>';
  }).join('');

  var monthTrades = trades.filter(function(t) {
    return t.folder && t.folder.slice(0,7) === monthStr;
  });

  var dayMap = {};
  var dayMap2 = {};
  monthTrades.forEach(function(t) {
    var day = t.folder;
    if (!dayMap[day]) dayMap[day] = 0;
    dayMap[day]++;
    if (!dayMap2[day]) dayMap2[day] = {win:0,be:0,loss:0,total:0};
    dayMap2[day].total++;
    if (t.outcome==='win') dayMap2[day].win++;
    else if (t.outcome==='be') dayMap2[day].be++;
    else if (t.outcome==='loss') dayMap2[day].loss++;
  });
  var days = Object.keys(dayMap).sort();

  var mTotal = monthTrades.length;
  var summaryHtml = mTotal > 0
    ? '<span style="color:var(--text);">' + label + '</span>'
    + ' &mdash; <span style="color:var(--accent);font-weight:700;">' + mTotal + ' kötés</span>'
    + ' &mdash; <span style="color:var(--muted);">' + days.length + ' kereskedési nap</span>'
    + (days.length > 0 ? ' &mdash; max <span style="color:var(--text);">' + Math.max.apply(null, days.map(function(d){return dayMap[d];})) + '/nap</span>' : '')
    : '<span style="color:var(--muted);">Nincs adat ebben a hónapban</span>';

  var barsHtml;
  if (days.length === 0) {
    barsHtml = '<div class="wr-empty">Nincs kereskedett nap ebben a hónapban</div>';
  } else {
    var maxH = 100;
    var maxCount = Math.max.apply(null, days.map(function(d){return dayMap[d];}));
    var bars = days.map(function(day) {
      var cnt = dayMap[day];
      var barH = Math.max(2, Math.round(cnt / maxCount * maxH));
      var d2 = dayMap2[day] || {win:0,be:0,loss:0,total:cnt};
      var winH2  = d2.total > 0 ? Math.round(d2.win /d2.total * barH) : 0;
      var beH2   = d2.total > 0 ? Math.round(d2.be  /d2.total * barH) : 0;
      var lossH2 = Math.max(0, barH - winH2 - beH2);
      var dayNum = day.slice(8);
      var goLog = 'wrGoLog(\'' + db + '\',\'' + day + '\')';
      return '<div class="wr-bar-col" onclick="'+goLog+'">'
        + '<div class="wr-bar-pct" style="color:var(--muted);">'+cnt+'</div>'
        + '<div class="wr-bar-stack" style="height:'+maxH+'px;justify-content:flex-end;">'
        + (winH2  > 0 ? '<div class="wr-bar win-seg"  style="height:'+winH2+'px;"></div>' : '')
        + (beH2   > 0 ? '<div class="wr-bar be-seg"   style="height:'+beH2+'px;"></div>'  : '')
        + (lossH2 > 0 ? '<div class="wr-bar loss-seg" style="height:'+lossH2+'px;"></div>': '')
        + '</div>'
        + '<div class="wr-bar-day">'+dayNum+'</div>'
        + '</div>';
    }).join('');
    barsHtml = '<div class="wr-bars-wrap">'
      + '<div class="wr-bars">'
      + bars
      + '</div></div>';
  }

  return '<div class="wr-chart-nav">'
    + '<button class="wr-chart-nav-btn" onclick="event.stopPropagation();tcChartNav(\'' + db + '\',-1)">&#8592;</button>'
    + '<span class="wr-chart-month-label" onclick="event.stopPropagation();var s=this.nextElementSibling;s.style.display=s.style.display===\'block\'?\'none\':\'block\';">' + label + '</span>'
    + '<button class="wr-chart-nav-btn" onclick="event.stopPropagation();tcChartNav(\'' + db + '\',1)">&#8594;</button>'
    + '</div>'
    + '<select class="wr-month-select" onclick="event.stopPropagation();" onchange="tcChartJump(\'' + db + '\',this.value)">' + selectOpts + '</select>'
    + '<div class="wr-chart-summary">' + summaryHtml + '</div>'
    + barsHtml;
}

function wrBuildLineChart(db, trades) {
  var st = _wrChartState[db];
  var nMonths = st.lineMonths || 1;

  // Determine end date = today or latest trade
  var allFolders = trades.map(function(t){return t.folder||'';}).filter(Boolean).sort();
  if (allFolders.length === 0) return '<div class="wr-empty">Nincs adat</div>';
  var latestDate = allFolders[allFolders.length-1];
  var startStr, endStr = latestDate;
  if (nMonths >= 9999) {
    startStr = allFolders[0];
  } else {
    var endD = new Date(latestDate);
    var startD = new Date(endD);
    startD.setMonth(startD.getMonth() - nMonths + 1);
    startD.setDate(1);
    startStr = startD.getFullYear() + '-' + String(startD.getMonth()+1).padStart(2,'0') + '-01';
  }

  // Filter and sort trades in range
  var inRange = trades.filter(function(t){
    return t.folder && t.folder >= startStr && t.folder <= endStr;
  }).sort(function(a,b){ return (a.timestamp||a.folder) > (b.timestamp||b.folder) ? 1 : -1; });

  if (inRange.length === 0) return '<div class="wr-empty">Nincs adat ebben az időszakban</div>';

  // Build cumulative WR by day
  var days = [];
  var dayMap = {};
  inRange.forEach(function(t) {
    var d = t.folder;
    if (!dayMap[d]) dayMap[d] = {win:0,total:0};
    dayMap[d].total++;
    if (t.outcome==='win'||t.outcome==='be') dayMap[d].win++;
  });
  var sortedDays = Object.keys(dayMap).sort();
  var cumWin=0, cumTotal=0;
  var points = sortedDays.map(function(d) {
    cumWin   += dayMap[d].win;
    cumTotal += dayMap[d].total;
    return { d: d, wr: Math.round(cumWin/cumTotal*100), dayWr: Math.round(dayMap[d].win/dayMap[d].total*100), total: dayMap[d].total };
  });

  // SVG line chart
  var W=460, H=100, PL=6, PR=6, PT=12, PB=18;
  var cW=W-PL-PR, cH=H-PT-PB;
  var n = points.length;
  var xStep = n > 1 ? cW/(n-1) : cW;

  function px(i) { return PL + (n>1 ? i*xStep : cW/2); }
  function py(v) { return PT + cH - Math.round(v/100*cH); }

  // Line path
  var path = points.map(function(p,i){ return (i===0?'M':'L') + px(i) + ',' + py(p.wr); }).join(' ');

  // 55% baseline
  var baseY = py(55);

  // Area fill
  var areaPath = 'M'+px(0)+','+py(points[0].wr)+' '+points.slice(1).map(function(p,i){ return 'L'+px(i+1)+','+py(p.wr); }).join(' ');
  areaPath += ' L'+px(n-1)+','+(PT+cH)+' L'+px(0)+','+(PT+cH)+' Z';

  // Day labels (max 8)
  var labelStep = Math.max(1, Math.floor(n/8));
  var labels = '';
  points.forEach(function(p,i) {
    if (i%labelStep===0 || i===n-1) {
      labels += '<text x="'+px(i)+'" y="'+(PT+cH+13)+'" text-anchor="middle" fill="#44445a" font-size="7" font-family="Space Mono,monospace">'+p.d.slice(5)+'</text>';
    }
  });

  // Hover dots + invisible rects for mouse tracking
  var dots = points.map(function(p,i) {
    return '<circle class="wr-line-dot" cx="'+px(i)+'" cy="'+py(p.wr)+'" r="3" fill="'+( p.wr>=55?'#00e87a':p.wr>=45?'#ffcc00':'#ff4455')+'" stroke="var(--bg)" stroke-width="1.5" data-i="'+i+'" />';
  }).join('');

  var hitRects = points.map(function(p,i) {
    var x0 = i>0 ? (px(i-1)+px(i))/2 : PL;
    var x1 = i<n-1 ? (px(i)+px(i+1))/2 : PL+cW;
    return '<rect x="'+x0+'" y="'+PT+'" width="'+(x1-x0)+'" height="'+cH+'" fill="transparent"'
      +' onmouseenter="wrLineHoverIdx('+i+')" onmouseleave="wrLineHoverOut()" data-db="'+db+'" />';
  }).join('');

  var tooltipId = 'wrl-tt-'+db;
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:'+H+'px;display:block;overflow:visible;">'
    + '<defs><linearGradient id="wrlg'+db+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00e87a" stop-opacity="0.18"/><stop offset="100%" stop-color="#00e87a" stop-opacity="0.01"/></linearGradient></defs>'
    + '<line x1="'+PL+'" y1="'+baseY+'" x2="'+(PL+cW)+'" y2="'+baseY+'" stroke="#44445a" stroke-width="1" stroke-dasharray="3,3" />'
    + '<text x="'+(PL+cW-2)+'" y="'+(baseY-3)+'" text-anchor="end" fill="#44445a" font-size="7" font-family="Space Mono,monospace">55%</text>'
    + '<path d="'+areaPath+'" fill="url(#wrlg'+db+')" />'
    + '<path d="'+path+'" fill="none" stroke="#00e87a" stroke-width="1.5" stroke-linejoin="round" />'
    + dots
    + hitRects
    + labels
    + '</svg>';

  // Tooltip el (rendered outside SVG)
  var tooltipHtml = '<div id="'+tooltipId+'" style="display:none;position:absolute;background:var(--surface);border:1px solid var(--border);padding:6px 10px;font-family:Space Mono,monospace;font-size:9px;letter-spacing:0.1em;pointer-events:none;z-index:20;white-space:nowrap;"></div>';

  // Interval buttons
  var intervals = [1,3,6,12,9999];
  var intervalLabels = {1:'1 hó',3:'3 hó',6:'6 hó',12:'1 év',9999:'ALL'};
  var btnRow = '<div style="display:flex;gap:6px;padding:8px 12px 0;align-items:center;">'
    + '<span style="font-family:Space Mono,monospace;font-size:8px;color:var(--muted);letter-spacing:0.1em;margin-right:4px;">IDŐSZAK:</span>'
    + intervals.map(function(n){
        var sel = (st.lineMonths||1)===n;
        var lbl = intervalLabels[n] || (n+'m');
        return '<button onclick="event.stopPropagation();wrSetLineMonths(\'' + db + '\',' + n + ')" style="background:'+(sel?'var(--accent)':'transparent')+';border:1px solid '+(sel?'var(--accent)':'var(--border)')+';color:'+(sel?'#0a0a0c':'var(--muted)')+';font-family:Space Mono,monospace;font-size:8px;padding:3px 8px;cursor:pointer;border-radius:0;">'+lbl+'</button>';
      }).join('')
    + '</div>';

  return '<div style="position:relative;" onmouseenter="_wrLineHoverDb=\'' + db + '\'" onmouseleave="_wrLineHoverDb=null">'
    + btnRow
    + '<div style="padding:8px 12px 10px;position:relative;">'
    + svg
    + tooltipHtml
    + '</div></div>';
}

var _wrLineHoverDb = null;
function wrLineHoverIdx(idx) {

function wrLineHover(idx, evt, db) {
  var trades = db === 'evo' ? allTrades : realTrades;
  var st = _wrChartState[db];
  var nMonths = st.lineMonths || 1;
  var allFolders = trades.map(function(t){return t.folder||'';}).filter(Boolean).sort();
  if (!allFolders.length) return;
  var latestDate = allFolders[allFolders.length-1];
  var endD = new Date(latestDate);
  var startD = new Date(endD);
  startD.setMonth(startD.getMonth() - nMonths + 1);
  startD.setDate(1);
  var startStr = startD.getFullYear() + '-' + String(startD.getMonth()+1).padStart(2,'0') + '-01';
  var inRange = trades.filter(function(t){ return t.folder && t.folder >= startStr && t.folder <= latestDate; });
  var dayMap = {};
  inRange.forEach(function(t) {
    if (!dayMap[t.folder]) dayMap[t.folder] = {win:0,total:0};
    dayMap[t.folder].total++;
    if (t.outcome==='win'||t.outcome==='be') dayMap[t.folder].win++;
  });
  var sortedDays = Object.keys(dayMap).sort();
  var p = sortedDays[idx];
  if (!p) return;
  var d = dayMap[p];
  var cumWin=0,cumTotal=0;
  for (var i=0;i<=idx;i++){var dd=dayMap[sortedDays[i]];cumWin+=dd.win;cumTotal+=dd.total;}
  var cumWr = Math.round(cumWin/cumTotal*100);
  var dayWr  = Math.round(d.win/d.total*100);
  var tt = document.getElementById('wrl-tt-'+db);
  if (!tt) return;
  tt.innerHTML = '<strong>'+p+'</strong> &mdash; <span style="color:'+(cumWr>=55?'#00e87a':cumWr>=45?'#ffcc00':'#ff4455')+'">'+cumWr+'%</span> &mdash; <span style="color:var(--muted);">napi: '+(dayWr>=55?'<span style="color:#00e87a">':dayWr>=45?'<span style="color:#ffcc00">':'<span style="color:#ff4455">')+dayWr+'%</span></span>';
  tt.style.display = 'block';
  tt.style.left = (evt.offsetX+12)+'px';
  tt.style.top  = (evt.offsetY-8)+'px';
}

function wrLineHoverOut() {
  ['evo','real'].forEach(function(db){
    var tt = document.getElementById('wrl-tt-'+db);
    if (tt) tt.style.display='none';
  });
}

function avgBuildChart(db, trades) {
  var st = _avgChartState[db];
  if (!st.open) return '';

  var nMonths = st.lineMonths || 1;

  // Build folder counts from ALL trades (for cumulative avg)
  var allFolders = {};
  trades.forEach(function(t) {
    if (t.folder) allFolders[t.folder] = (allFolders[t.folder]||0)+1;
  });
  var allSortedDays = Object.keys(allFolders).sort();
  if (allSortedDays.length === 0) return '<div class="wr-empty">Nincs adat</div>';

  var latestDate = allSortedDays[allSortedDays.length-1];
  var startStr;
  if (nMonths >= 9999) { startStr = allSortedDays[0]; }
  else {
    var endD = new Date(latestDate); var startD = new Date(endD);
    startD.setMonth(startD.getMonth() - nMonths + 1); startD.setDate(1);
    startStr = startD.getFullYear() + '-' + String(startD.getMonth()+1).padStart(2,'0') + '-01';
  }
  var inDays = allSortedDays.filter(function(d){ return d >= startStr && d <= latestDate; });
  if (inDays.length === 0) return '<div class="wr-empty">Nincs adat ebben az időszakban</div>';

  // Cumulative average up to each day (using ALL days, not just visible window)
  // Find index of startStr in allSortedDays
  var cumTrades = 0, cumDays = 0;
  var startIdx = allSortedDays.indexOf(inDays[0]);
  // Pre-sum days before window
  for (var pi = 0; pi < startIdx; pi++) {
    cumTrades += allFolders[allSortedDays[pi]];
    cumDays++;
  }
  // Build cumulative avg points
  var points = inDays.map(function(d) {
    cumTrades += allFolders[d];
    cumDays++;
    return { d: d, cnt: allFolders[d], cumAvg: Math.round(cumTrades / cumDays * 10) / 10 };
  });

  // Max trades day info (from ALL days)
  var maxCount = Math.max.apply(null, Object.values(allFolders));
  var maxDays  = allSortedDays.filter(function(d){return allFolders[d]===maxCount;});

  // Y scale: based on max cumAvg visible + some headroom
  var maxAvg = Math.max.apply(null, points.map(function(p){return p.cumAvg;}));
  var yMax   = Math.max(maxAvg * 1.15, 1);

  var W=460, H=100, PL=6, PR=6, PT=12, PB=18;
  var cW=W-PL-PR, cH=H-PT-PB;
  var n = points.length;

  function px(i) { return PL + (n>1 ? i*(cW/(n-1)) : cW/2); }
  function py(v) { return PT + cH - Math.round(v/yMax*cH); }

  var path = points.map(function(p,i){ return (i===0?'M':'L')+px(i)+','+py(p.cumAvg); }).join(' ');
  var areaPath = 'M'+px(0)+','+py(points[0].cumAvg)+' '+points.slice(1).map(function(p,i){return 'L'+px(i+1)+','+py(p.cumAvg);}).join(' ')+' L'+px(n-1)+','+(PT+cH)+' L'+px(0)+','+(PT+cH)+' Z';

  var labelStep = Math.max(1, Math.floor(n/8));
  var labels = '';
  points.forEach(function(p,i) {
    if (i%labelStep===0 || i===n-1) {
      labels += '<text x="'+px(i)+'" y="'+(PT+cH+13)+'" text-anchor="middle" fill="#44445a" font-size="7" font-family="Space Mono,monospace">'+p.d.slice(5)+'</text>';
    }
  });

  var dots = points.map(function(p,i) {
    return '<circle cx="'+px(i)+'" cy="'+py(p.cumAvg)+'" r="2.5" fill="#888899" stroke="var(--bg)" stroke-width="1" />';
  }).join('');

  var hitRects = points.map(function(p,i) {
    var x0 = i>0 ? (px(i-1)+px(i))/2 : PL;
    var x1 = i<n-1 ? (px(i)+px(i+1))/2 : PL+cW;
    return '<rect x="'+x0+'" y="'+PT+'" width="'+(x1-x0)+'" height="'+cH+'" fill="transparent" style="cursor:pointer;" onmouseenter="avgLineHoverIdx('+i+')" onmouseleave="avgLineHoverOut()" onclick="avgGoLog('+i+')" />';
  }).join('');

  var tooltipId = 'avgl-tt-'+db;

  var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:'+H+'px;display:block;overflow:visible;">'
    + '<defs><linearGradient id="avglg'+db+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#888899" stop-opacity="0.2"/><stop offset="100%" stop-color="#888899" stop-opacity="0.02"/></linearGradient></defs>'
    + '<path d="'+areaPath+'" fill="url(#avglg'+db+')" />'
    + '<path d="'+path+'" fill="none" stroke="#888899" stroke-width="1.5" stroke-linejoin="round" />'
    + dots
    + hitRects
    + labels
    + '</svg>';

  var tooltipHtml = '<div id="'+tooltipId+'" style="display:none;position:absolute;background:var(--surface);border:1px solid var(--border);padding:6px 10px;font-family:Space Mono,monospace;font-size:9px;letter-spacing:0.1em;pointer-events:none;z-index:20;white-space:nowrap;"></div>';

  var intervals = [1,3,6,12,9999];
  var intervalLabels = {1:'1 hó',3:'3 hó',6:'6 hó',12:'1 év',9999:'ALL'};
  var btnRow = '<div style="display:flex;gap:6px;padding:8px 12px 0;align-items:center;flex-wrap:wrap;">'
    + '<span style="font-family:Space Mono,monospace;font-size:8px;color:var(--muted);letter-spacing:0.1em;margin-right:4px;">IDŐSZAK:</span>'
    + intervals.map(function(nn){
        var sel = (st.lineMonths||1)===nn;
        var lbl = intervalLabels[nn] || (nn+'m');
        return '<button onclick="event.stopPropagation();avgSetLineMonths(\'' + db + '\',' + nn + ')" style="background:'+(sel?'var(--accent)':'transparent')+';border:1px solid '+(sel?'var(--accent)':'var(--border)')+';color:'+(sel?'#0a0a0c':'var(--muted)')+';font-family:Space Mono,monospace;font-size:8px;padding:3px 8px;cursor:pointer;border-radius:0;">'+lbl+'</button>';
      }).join('')
    + '</div>';

  // Max day button — navigate log to all max days
  // Store maxDays in global so onclick can reference it safely
  _avgMaxDaysStore[db] = maxDays;
  var maxBtn = '<div style="padding:4px 12px 0;">'
    + '<button onclick="event.stopPropagation();avgGoMaxLog(\'' + db + '\')" style="background:transparent;border:none;color:var(--accent);font-family:Space Mono,monospace;font-size:9px;padding:0;cursor:pointer;letter-spacing:0.08em;">'
    + 'Max: ' + maxCount + ' kötés — ' + (maxDays.length > 1 ? maxDays.length + ' nap' : maxDays[0]) + ' &#9660;</button>'
    + '</div>';

  return '<div style="position:relative;" onmouseenter="_avgLineHoverDb=\'' + db + '\';" onmouseleave="_avgLineHoverDb=null;">'
    + btnRow
    + maxBtn
    + '<div style="padding:8px 12px 10px;position:relative;">'
    + svg
    + tooltipHtml
    + '</div></div>';
}

var _avgLineHoverDb = null;
var _avgLineHoverDays = {};

function avgLineHoverIdx(idx) {
  var db = _avgLineHoverDb; if (!db) return;
  var trades = db === 'evo' ? allTrades : realTrades;
  var st = _avgChartState[db];

  var sortedDays = Object.keys(folders).sort();

  var inDays = sortedDays.filter(function(d){return d>=startStr&&d<=latestDate;});
  var d = inDays[idx]; if (!d) return;
  var cnt = folders[d];
  // Compute cumulative avg up to this day
  var startIdx2 = sortedDays.indexOf(inDays[0]);
  var cumT2=0, cumD2=0;
  for(var pi2=0;pi2<startIdx2;pi2++){cumT2+=folders[sortedDays[pi2]];cumD2++;}

  var cumAvg2 = Math.round(cumT2/cumD2*10)/10;
  var tt = document.getElementById('avgl-tt-'+db);
  if (!tt) return;
  tt.innerHTML = '<strong>'+d+'</strong> &mdash; <span style="color:var(--muted);">'+cumAvg2+'</span> &mdash; napi: <span style="color:var(--accent);">'+cnt+' kötés</span>';
  tt.style.display = 'block';
  var evv = window.event || {};
  tt.style.left = ((evv.offsetX||0)+12)+'px';
  tt.style.top  = ((evv.offsetY||0)-8)+'px';
}

function avgLineHoverOut() {
  ['evo','real'].forEach(function(db){
    var tt = document.getElementById('avgl-tt-'+db);
    if (tt) tt.style.display='none';
  });
}
