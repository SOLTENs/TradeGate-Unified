name: Update MNB exchange rates

on:
  schedule:
    # Mon–Fri 17:30 UTC (~18:30 CET) — after MNB publishes the daily fix
    - cron: '30 17 * * 1-5'
  workflow_dispatch:
    inputs:
      date_from:
        description: 'Backfill from date (YYYY-MM-DD), optional'
        required: false
        default: ''
      date_to:
        description: 'Backfill to date (YYYY-MM-DD), optional'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch MNB rates
        env:
          DATE_FROM: ${{ github.event.inputs.date_from }}
          DATE_TO: ${{ github.event.inputs.date_to }}
        run: python scripts/update_mnb_rates.py

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add pnl/mnb_rates.json
          if git diff --cached --quiet; then
            echo "No rate changes to commit."
          else
            git commit -m "chore(pnl): update MNB rates [skip ci]"
            git push
          fi
